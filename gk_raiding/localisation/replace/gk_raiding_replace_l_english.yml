l_english:
 # Version last updated: v4.2.3
 # Overrides vanilla descriptions and effects tooltips for Barbaric Despoilers,
 # Nihilistic Acquisition, and Letters of Marque to reflect gk_raiding mechanics.

 # Barbaric Despoilers — Flavor Description
 civic_barbaric_despoilers_desc:0 "['concept_gk_raiding_mechanics']\nThis society holds few things sacred. To fight is to live, and the strongest may seize what they covet, slavering at the chance to raid and pillage the worlds of their neighbors."

 # Barbaric Despoilers — Effects Tooltip
 civic_tooltip_barbaric_despoilers_effects:0 "Cannot form §YMigration Treaties§!\nCannot form (but can join) §YFederations§! other than §YMartial Alliances§! or §YHegemonies§!\nHas the '§Y$casus_belli_cb_despoliation$§!' and '§Y$casus_belli_cb_pirate_raid$§!' casus belli, with §YRaiding§!, §YReaping§!, and §YPillage§! War Goals\n$allow_raiding$\nDecreased §YOpinion§! for most other empires"

 # Nihilistic Acquisition — Flavor Description
 ap_nihilistic_acquisition_desc:0 "['concept_gk_raiding_mechanics']\nWe have the power to take what we want. There is no need to justify it with lofty ideals or moral posturing - we are strong, and they are weak."

 # Nihilistic Acquisition / Barbaric Despoilers — Shared Raiding Tooltip
 allow_raiding:0 "Unlocks the §Y$bombardment_raiding$§! bombardment stance, enabling ['concept_gk_raiding_mechanics'] - capture pops and pillage resources from enemy worlds."

 # Letters of Marque — Flavor Description
 civic_crusader_spirit_corporate_desc:0 "['concept_gk_raiding_mechanics']\nTo combat space piracy and safeguard its borders, this megacorporation utilizes notorious pirates as military advisors and commanders for their fleets."

 # Letters of Marque — Effects Tooltip
 civic_tooltip_crusader_spirit_corporate_effects:0 "§Y$commander_plural_with_icon$§! start with the §Y$leader_trait_corsair$§! trait\nHas the '§Y$casus_belli_cb_pirate_raid$§!' casus belli on all other empires\nUnlocks the §YPillage§! War Goal\n$allow_raiding$\nThe £building£ §Y$building_military_contractors$§! $megacorp_civic_branch_office_building_effect$"

 # War Goal Name Overrides
 war_goal_wg_plunder:0 "Raiding"
 war_goal_wg_plunder_desc:0 "War is waged to raid enemy worlds for §Ypops§! and §Yresources§!.\n\n§LDuring war: up to §Y20%§! of enemy pops may be captured via bombardment or invasion.\nTotal pop capture is capped at §Y10%§! of the enemy's original population — pops captured during war count toward this limit.\nOn surrender: remaining pops up to the cap are forfeited. Enemy planets are pillaged twice.\nPop capture rates scale with §YRaiding Capacity§! modifier.§!"
 wg_plunder_accept_tooltip:0 "§Y[From.GetName]§! forfeits up to §Y[From.GkEstimatedSurrenderPops]§! remaining pops to §Y[Root.GetName]§! (§Y[Root.GkSurrenderCapPercent]%§! total cap, minus pops already captured).\nAll of §Y[From.GetName]§!'s colonies will be pillaged for resources."

 war_goal_wg_plunder_raid:0 "Pillage"
 war_goal_wg_plunder_raid_desc:0 "War is waged purely to strip enemy worlds of their resources. No populations are captured.\n\n§LOn surrender: all enemy colonies are pillaged up to §Y6§! times with §Ydoubled§! resource yields.\nNo pop capture.§!"
 wg_plunder_raid_accept_tooltip:0 "All of §Y[From.GetName]§!'s colonies will be pillaged for resources with bonus extraction.\nNo pops will be captured."

 # CB Name Overrides
 casus_belli_cb_despoliation:0 "Raiding"
 casus_belli_cb_pirate_raid:0 "Pillaging"
