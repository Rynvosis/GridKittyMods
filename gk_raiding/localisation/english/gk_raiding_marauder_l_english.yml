l_english:
 # GK Raiding — Marauder Enclave localisation

 # Civic
 civic_gk_marauder_enclave: "Marauder Enclave"
 civic_gk_marauder_enclave_desc: "This enclave operates as a marauder outpost, launching raids against nearby empires on behalf of its patron."

 # Ship design
 NAME_GK_Marauder_Enclave_Station: "Marauder Outpost"

 # Enclave founding (enclave.2 overwrite)
 GK_RAIDING_ENCLAVE_2_DESC:0 "Our scouts have identified a viable location for a permanent base of operations in the void between stars. The site offers natural concealment and defensible approaches, ideal for establishing a presence beyond the reach of conventional patrols.\n\nOur §Ydespoliation expertise§! opens an additional possibility. Rather than a standard mercenary enclave, we could establish a §Ycorsair haven§!, a marauder outpost that would launch raids on our behalf, sowing chaos among our rivals.\n\nThe choice is yours, Commander."
 GK_RAIDING_ENCLAVE_2_MERCENARY:0 "Establish Mercenary Enclave"
 GK_RAIDING_ENCLAVE_2_CORSAIR:0 "Establish Corsair Haven"
 GK_RAIDING_ENCLAVE_2_CORSAIR_TOOLTIP:0 "A Corsair Haven is founded."

 # Events — Haven Established (102)
 gk_raiding_marauder.102.name:0 "A Haven Among the Stars"
 gk_raiding_marauder.102.desc.stoic:0 "The [event_target:gk_marauder_enclave_country.GetName] is operational. The crew settled in without ceremony, fortifying the station with quiet efficiency. Their leader transmitted a brief acknowledgment:\n\n§Y\"Station secured. Defenses nominal. We await your contracts, patron. Our blades are sharp and our holds are empty.\"§!"
 gk_raiding_marauder.102.desc.screamer:0 "The [event_target:gk_marauder_enclave_country.GetName] is... established, though the volume of celebratory transmissions nearly burned out the comms relay. The crew has already begun fortifying the station between bouts of what can only be described as competitive shrieking.\n\n§Y\"HYEEEIIIEEE!!!! New home! New home for smashing dwamaks! You send us dwamaks to smash, yes? HYEEEIIIEEE!!!!\"§!"
 gk_raiding_marauder.102.desc.cultist:0 "The [event_target:gk_marauder_enclave_country.GetName] has been consecrated. The crew performed rites of dedication before taking residence, anointing the station's bulkheads with markings of devotion. Their leader's transmission carried a reverent gravity:\n\n§Y\"She of the Void has blessed this sanctuary. The station breathes with Her presence. We shall carry out Her will from this place, patron. Send us those who would be offered.\"§!"
 gk_raiding_marauder.102.desc.calculating:0 "The [event_target:gk_marauder_enclave_country.GetName] is online. Sensor arrays were calibrated before the crew even unpacked. Their leader transmitted an efficiency report within the hour:\n\n§Y\"Station operational. Defensive grid: optimal. Patrol route analysis: complete. Resource projection models loaded. We are ready to begin operations, patron. Transmit target parameters at your convenience.\"§!"
 gk_raiding_marauder.102.desc.merchant:0 "The [event_target:gk_marauder_enclave_country.GetName] is open for business! The crew wasted no time making the station feel welcoming, stringing up trophy displays and what appears to be a lounge area. Their leader's transmission was practically beaming:\n\n§Y\"Welcome, welcome to the grand opening! The [event_target:gk_marauder_enclave_country.GetName] is officially accepting clients. We look forward to a long and mutually profitable partnership, friend!\"§!"
 gk_raiding_marauder.102.desc.automaton:0 "The [event_target:gk_marauder_enclave_country.GetName] is online. Station initialization completed in 0.003 cycles. Defensive subsystems nominal. Sensor grid calibrated. A clipped synthetic voice sounds over the data link.\n\n§Y\"HAVEN PROTOCOL INITIALIZED. Station designation assigned. Defensive perimeter established. Awaiting directives from command authority. All combat subroutines are loaded and standing by.\"§!"

 # Diplomacy window — Greeting (205)
 gk_raiding_marauder.205.name:0 "Marauder Haven"
 # Friendly greetings
 gk_raiding_marauder.205.desc.stoic:0 "The marauder haven's communication array crackles to life, revealing a scarred figure sitting upright in a command chair. They regard you with professional calm.\n\n§Y\"Speak, patron. Our blades are sharp and our holds are empty. If you have work, we are listening. If not, we have duties to attend to.\"§!"
 gk_raiding_marauder.205.desc.screamer:0 "The haven's communication array erupts with noise before the visual feed even stabilizes. A wild-eyed figure is bouncing in their command chair, gesticulating enthusiastically.\n\n§Y\"HYEEEIIIEEE!!!! Is the dwamak-boss! What you want, dwamak-boss? You have dwamaks for us to smash? We very good at smashing! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_marauder.205.desc.cultist:0 "The haven's communication array hums with a low, resonant frequency before the feed resolves. A robed figure sits motionless, eyes half-closed as if in meditation. When they speak, their voice carries the weight of ritual.\n\n§Y\"She of the Void has guided your signal to us. This is no coincidence. Speak, patron, and know that She listens through us.\"§!"
 gk_raiding_marauder.205.desc.calculating:0 "The haven's communication array connects with unusual speed, as though the signal was anticipated. A composed figure studies a data display before turning their attention to the screen.\n\n§Y\"Connection established. Current operational status: nominal. Fleet readiness at 94.7%. State your requirements, patron. We have prepared several operational proposals based on projected regional threat assessments.\"§!"
 gk_raiding_marauder.205.desc.merchant:0 "The haven's communication array opens to a warmly lit interior. A grinning figure raises a drink in greeting, lounging comfortably amid trophy displays and trade ledgers.\n\n§Y\"Well, well! If it isn't our favorite client! Come in, come in. What can the [event_target:gk_marauder_enclave_country.GetName] do for you today? We have some exciting new opportunities on the table.\"§!"
 gk_raiding_marauder.205.desc.automaton:0 "The haven's communication array responds instantly, the connection established before the hail sequence completes. No face appears on screen. A tactical overlay fills the display: fleet positions, threat vectors, patrol routes updated in real time. A flat synthetic voice speaks over the data feed.\n\n§Y\"Command authority recognized. Connection secured. Current operational status: all combat platforms nominal. Query: state desired service or directive.\"§!"
 # Greeting options (205)
 gk_raiding_marauder.205.a:0 "Smuggling Network"
 gk_raiding_marauder.205.b:0 "Raider Intelligence"
 gk_raiding_marauder.205.c:0 "Raider Garrison"
 gk_raiding_marauder.205.d:0 "Recruit Raiders"
 gk_raiding_marauder.205.e:0 "Patron Panel"
 # Greeting option tooltips
 gk_marauder_tt_smuggling:0 "Temporary §Ytrade value§! boost at the cost of increased §Ycrime§!."
 gk_marauder_tt_intel:0 "Permanent §Ydamage bonus§! against your §Yrivals§! at the cost of increased §Ycrime§!."
 gk_marauder_tt_garrison:0 "Purchase a §Ystarbase building§! license."
 gk_marauder_tt_armies:0 "Hire §Yarmies§! for ground invasions."
 gk_marauder_tt_patron:0 "As §YPatron§!, upgrade the haven or share technology."

 # Hostile greetings
 gk_raiding_marauder.205.desc.stoic.hostile:0 "The haven's communication array connects after a long delay. The figure on screen regards you with cold contempt.\n\n§R\"You are no patron of ours. We have nothing to discuss. Leave this channel, or the next message you receive will be a torpedo volley.\"§!"
 gk_raiding_marauder.205.desc.screamer.hostile:0 "The haven's communication array nearly overloads as it connects. The figure on screen is visibly enraged, slamming fists against the console.\n\n§R\"HYEEEIIIEEE!!!! DWAMAK! STUPID DWAMAK! You dare hail us?! We smash your ships! We smash your stations! We smash EVERYTHING! GET OUT! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_marauder.205.desc.cultist.hostile:0 "The haven's communication array opens to near-darkness. A figure barely visible in candlelight speaks in a voice trembling with fury.\n\n§R\"She of the Void sees you, heretic. She sees you and She is wroth. Your presence profanes this channel. Begone, before we deliver you unto Her judgment.\"§!"
 gk_raiding_marauder.205.desc.calculating.hostile:0 "The haven's communication array connects with clinical efficiency. The figure on screen does not look up from their data display.\n\n§R\"Hostile contact detected. Threat assessment: negligible. Communication value: zero. Recommendation: terminate connection. Your vessels have been tagged for priority targeting. That is all.\"§!"
 gk_raiding_marauder.205.desc.merchant.hostile:0 "The haven's communication array connects, but the warmth is gone. The figure on screen regards you with the cold disappointment of a deal gone sour.\n\n§R\"I'm afraid your account has been permanently closed. Bad business, you understand. Nothing personal, but we've flagged your transponder codes for our raiding crews. I'd suggest avoiding this sector. Goodbye.\"§!"
 gk_raiding_marauder.205.desc.automaton.hostile:0 "The haven's communication array connects with mechanical precision. The display shows only a red tactical overlay with your fleet positions highlighted as hostile contacts.\n\n§R\"WARNING: Unauthorized access attempt. Transponder signature classified as hostile. All combat platforms have been allocated to intercept trajectory. Probability of your survival in this sector: declining. Terminate connection.\"§!"

 # ──────────────────────────────────────────────────────────────────
 # Diplomacy Services (300–399)
 # ──────────────────────────────────────────────────────────────────

 # Shared
 gk_raiding_marauder.300.return:0 "Discuss Another Matter"

 # .300 — Upgrade Haven
 gk_raiding_marauder.300.name:0 "Upgrade Haven"
 gk_raiding_marauder.300.1.desc:0 "The haven is functional but austere, little more than a fortified waystation. With investment in alloys and trade goods, the corsairs could expand their docking bays, improve their sensor arrays, and field a larger raiding fleet.\n\n§YUpgrade to Rank 1: §!£alloys£ §Y500§! + £energy£ §Y1,000§!"
 gk_raiding_marauder.300.2.desc:0 "The haven has grown beyond its initial foundations. Additional berths line the station's flanks, and the corsairs have begun specializing their raiding crews. Further investment would allow them to expand their operational range significantly.\n\n§YUpgrade to Rank 2: §!£alloys£ §Y1,250§! + £energy£ §Y2,500§!"
 gk_raiding_marauder.300.3.desc:0 "The corsairs have established a formidable base of operations. Their fleet has diversified, and their raids strike deeper into hostile territory. The next tier of expansion would require substantial resources but would transform the haven into a true fortress.\n\n§YUpgrade to Rank 3: §!£alloys£ §Y2,750§! + £energy£ §Y5,500§!"
 gk_raiding_marauder.300.4.desc:0 "The haven bristles with weaponry and hums with activity. Patrol craft launch around the clock, and the corsairs' reputation precedes them across the sector. One final push would elevate this outpost to its maximum potential.\n\n§YUpgrade to Rank 4: §!£alloys£ §Y5,000§! + £energy£ §Y10,000§!"
 gk_raiding_marauder.300.5.desc:0 "The haven stands as one of the most formidable independent stations in the galaxy. This final investment would push the corsairs to peak operational capacity, fielding a fleet rivaling that of minor empires.\n\n§YUpgrade to Rank 5: §!£alloys£ §Y6,500§! + £energy£ §Y13,000§!"

 # .305 — Thanks / Confirmation
 gk_raiding_marauder.305.name:0 "Transaction Complete"
 gk_raiding_marauder.305.desc.stoic:0 "A curt nod from the haven's commander.\n\n§Y\"Acknowledged. The resources will be put to use. You will see the results.\"§!"
 gk_raiding_marauder.305.desc.screamer:0 "Ecstatic shrieking erupts across the channel.\n\n§Y\"HYEEEIIIEEE!!!! YES YES YES! Good deal! VERY good deal! We do good things with this! You see! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_marauder.305.desc.cultist:0 "The haven's commander places a hand over their heart and bows deeply.\n\n§Y\"She of the Void smiles upon this exchange. Your generosity shall be repaid tenfold, patron. The covenant is sealed.\"§!"
 gk_raiding_marauder.305.desc.calculating:0 "The haven's commander updates their ledger with precise keystrokes.\n\n§Y\"Transaction logged. Resource allocation confirmed. Updated projections indicate a 14.3% improvement in operational output. A satisfactory arrangement.\"§!"
 gk_raiding_marauder.305.desc.merchant:0 "The haven's commander raises a glass with a broad grin.\n\n§Y\"Pleasure doing business! Always a pleasure! You won't regret this, friend. The [event_target:gk_marauder_enclave_country.GetName] takes care of its partners!\"§!"
 gk_raiding_marauder.305.desc.automaton:0 "A brief confirmation pulse over the data link.\n\n§Y\"Transaction complete. Resources received and allocated. Operational parameters updated. Standing by for further directives.\"§!"

 # .310 — Smuggling Network
 gk_raiding_marauder.310.name:0 "Smuggling Network"
 gk_raiding_marauder.310.desc.stoic:0 "The haven's commander leans forward, voice low and businesslike.\n\n§Y\"We can route contraband through your trade lanes. Discreet. Profitable. Your merchants will see a boost in revenue, and our fences get access to your markets. Some of your administrators may notice the uptick in illicit activity, but the credits speak for themselves.\"§!"
 gk_raiding_marauder.310.desc.screamer:0 "The haven's commander grins wide, eyes gleaming with mischief.\n\n§Y\"HYEEEIIIEEE!!!! We have GREAT idea! We sneak stuff through your space, you get cut! Nobody see nothing! Well, maybe little bit more crime but WHO CARES when you have SO MANY CREDITS! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_marauder.310.desc.cultist:0 "The haven's commander speaks with conspiratorial reverence.\n\n§Y\"She of the Void moves unseen through the spaces between stars. Let us move Her gifts through your trade routes in the same fashion. Your coffers will swell with Her blessing, though the uninitiated may call it... crime.\"§!"
 gk_raiding_marauder.310.desc.calculating:0 "The haven's commander pulls up a network diagram on the display.\n\n§Y\"Proposal: integrate our distribution network with your existing trade infrastructure. Projected revenue increase: 10%. Side effect analysis indicates a measurable increase in criminal activity on affected worlds. Cost-benefit ratio remains favorable.\"§!"
 gk_raiding_marauder.310.desc.merchant:0 "The haven's commander leans back with a knowing smile.\n\n§Y\"I have a business proposition for you, friend. We have goods. You have markets. Let us connect the two, and we both profit. Your trade value goes up, guaranteed. There may be some, shall we say, regulatory complications, but nothing your enforcers can't manage.\"§!"
 gk_raiding_marauder.310.desc.automaton:0 "A logistics schematic populates the display, showing trade lane integration points.\n\n§Y\"Service available: covert distribution network overlay. Projections indicate increased trade throughput via parallel supply channels. Side effect: elevated irregularity indices on connected worlds. Risk assessment: within acceptable parameters.\"§!"

 # .315 — Raider Intelligence
 gk_raiding_marauder.315.name:0 "Raider Intelligence"
 gk_raiding_marauder.315.desc.stoic:0 "The haven's commander studies the display before speaking.\n\n§Y\"Our raiders have gathered detailed intelligence on your rivals. Fleet compositions, patrol schedules, defensive blind spots. This data would give your forces a permanent tactical edge against any power you've designated as a rival. Our information network does require a certain... presence on your worlds.\"§!"
 gk_raiding_marauder.315.desc.screamer:0 "The haven's commander slams a data chip on the console.\n\n§Y\"HYEEEIIIEEE!!!! We spy on your enemies! We watch them! We know where they go, when they sleep, what they eat! You take this, you SMASH them extra good! We put some of our sneaky-types on your worlds to keep watching. Very sneaky! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_marauder.315.desc.cultist:0 "The haven's commander gazes into the middle distance, as if communing with something unseen.\n\n§Y\"She of the Void sees all who traverse Her domain. Through Her sight, we have learned the secrets of your rivals. Accept Her gift of knowledge, and your fleets will strike with divine precision. Her agents will walk among your people, ever watchful.\"§!"
 gk_raiding_marauder.315.desc.calculating:0 "The haven's commander displays a comprehensive threat analysis.\n\n§Y\"Intelligence compilation complete. Data package contains: rival fleet deployment patterns, defensive architecture schematics, and predictive models for force projection. Integration yields an estimated 15% improvement in combat effectiveness against designated rivals. Requires placement of intelligence operatives on your worlds.\"§!"
 gk_raiding_marauder.315.desc.merchant:0 "The haven's commander taps a sealed data container.\n\n§Y\"I have something special for you today, friend. Premium intelligence on every rival you've marked. Fleet movements, defense gaps, the works. This isn't a rental, it's a permanent advantage. We just need to station a few of our people on your worlds to keep the information flowing. Small price, big returns!\"§!"
 gk_raiding_marauder.315.desc.automaton:0 "A compressed intelligence package appears on the display, tagged with rival designations.\n\n§Y\"Service available: persistent surveillance integration. Package contains fleet composition databases, patrol route predictions, and defensive vulnerability maps for all designated rival entities. Requires deployment of monitoring nodes on your worlds. Permanent tactical advantage confirmed.\"§!"

 # .320 — Raider Garrison
 gk_raiding_marauder.320.name:0 "Raider Garrison"
 gk_raiding_marauder.320.desc.stoic:0 "The haven's commander straightens in their chair.\n\n§Y\"We can provide garrison crews for your starbases. Experienced fighters who know how to hold a chokepoint. Their presence improves the combat readiness of any fleet in the system. Our people operate outside conventional law, so expect some friction with local authorities.\"§!"
 gk_raiding_marauder.320.desc.screamer:0 "The haven's commander punches the air enthusiastically.\n\n§Y\"HYEEEIIIEEE!!!! You want TOUGH GUYS on your stations? We have TOUGHEST GUYS! They fight so good! Make all your ships nearby fight better too! Maybe they cause little trouble with your law-types but THEY SO TOUGH! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_marauder.320.desc.cultist:0 "The haven's commander places a blessed talisman on the console.\n\n§Y\"She of the Void would have Her faithful stand sentinel at your borders. Our warriors will consecrate your starbases with their presence, and their fervor will inspire all who fight alongside them. Their... devotional practices may unsettle your citizenry, however.\"§!"
 gk_raiding_marauder.320.desc.calculating:0 "The haven's commander brings up a starbase schematic.\n\n§Y\"Proposal: garrison deployment at your starbase facilities. Force multiplier effect: 15% fire rate increase for all friendly vessels within system range. Personnel overhead minimal. Note: garrison personnel operate outside standard legal frameworks, generating a measurable increase in criminal activity.\"§!"
 gk_raiding_marauder.320.desc.merchant:0 "The haven's commander spreads their hands wide.\n\n§Y\"Here's a fantastic offer for you, friend! Our finest fighters, stationed right on your starbases. They'll make every ship in the system fight harder. The license covers installation at any starport or higher. Our people do tend to run a few side businesses, but nothing too disruptive!\"§!"
 gk_raiding_marauder.320.desc.automaton:0 "A starbase integration schematic fills the display.\n\n§Y\"Service available: garrison combat platform deployment. Units will integrate with starbase defensive systems and provide force multiplication to all friendly vessels in the operational area. Note: garrison units operate on autonomous combat protocols outside standard regulatory frameworks.\"§!"

 # .325 — Recruit Raiders
 gk_raiding_marauder.325.name:0 "Recruit Raiders"
 gk_raiding_marauder.325.desc.stoic:0 "The haven's commander gestures to a roster on the display.\n\n§Y\"We have fighters available for ground operations. Battle-hardened crews who can be organized into army transports and deployed to your capital within the day. Interested?\"§!"
 gk_raiding_marauder.325.desc.screamer:0 "The haven's commander bounces excitedly.\n\n§Y\"HYEEEIIIEEE!!!! You want GROUND SMASHERS? We have them! Big ones! Mean ones! They smash planets REAL GOOD! We put them on ships, send to your big world! How many you want? HYEEEIIIEEE!!!!\"§!"
 gk_raiding_marauder.325.desc.cultist:0 "The haven's commander's eyes gleam with fervent light.\n\n§Y\"She of the Void has warriors ready to descend upon the faithless. Holy crusaders, zealous and unyielding. They will be delivered unto your capital in sacred transports, eager to carry out Her will on the surface of heretic worlds.\"§!"
 gk_raiding_marauder.325.desc.calculating:0 "The haven's commander displays personnel readiness data.\n\n§Y\"Ground force requisition available. Personnel are combat-rated and transport-ready. Deployment time to your capital system: estimated 24 standard hours. Two force packages available, scaled by mission requirements.\"§!"
 gk_raiding_marauder.325.desc.merchant:0 "The haven's commander pulls out a catalog with a grin.\n\n§Y\"Looking for some muscle? You've come to the right place! We have experienced ground fighters ready to ship out to your capital at a moment's notice. Small squad, large squad, pick your package!\"§!"
 gk_raiding_marauder.325.desc.automaton:0 "A personnel deployment manifest populates the display.\n\n§Y\"Service available: ground assault unit requisition. Combat-rated personnel are transport-ready. Estimated deployment time to command authority capital: minimal. Two force configurations available. Select desired package.\"§!"
 gk_raiding_marauder.325.a:0 "Small Squad (5 armies)"
 gk_raiding_marauder.325.b:0 "Large Squad (10 armies)"
 gk_raiding_marauder.325.a.tooltip:0 "§Y5§! mercenary armies will be deployed to our capital system."
 gk_raiding_marauder.325.b.tooltip:0 "§Y10§! mercenary armies will be deployed to our capital system."

 # .330 — Share Technology
 gk_raiding_marauder.330.name:0 "Share Technology"
 gk_raiding_marauder.330.desc.stoic:0 "The haven's commander considers the proposal in silence before responding.\n\n§Y\"You wish to share your research data with us. This would be... valuable. We can offer compensation for the transfer. Our engineers will integrate what they can into our systems. It will take time before we are ready to receive another update.\"§!"
 gk_raiding_marauder.330.desc.screamer:0 "The haven's commander tilts their head with unusual focus.\n\n§Y\"You give us SMART STUFF? Like, how to make better guns? Better shields? HYEEEIIIEEE!!!! YES! We take! We give you credits! Then we need long time to figure out all the buttons! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_marauder.330.desc.cultist:0 "The haven's commander clasps their hands in reverent anticipation.\n\n§Y\"You would share the fruits of knowledge with Her faithful? She of the Void blesses this exchange. We shall study these revelations with devotion. Accept this offering of credits in return. It will be some years before we have absorbed these teachings fully.\"§!"
 gk_raiding_marauder.330.desc.calculating:0 "The haven's commander's eyes light up with genuine interest.\n\n§Y\"Technology transfer proposal accepted. Data integration estimate: significant. Compensation authorized: 1,000 energy credits. Note: full absorption of transferred research will require approximately 10 standard years before another data package can be processed.\"§!"
 gk_raiding_marauder.330.desc.merchant:0 "The haven's commander rubs their hands together eagerly.\n\n§Y\"You want to share your tech with us? Now that is a generous offer! Tell you what, we'll send over some credits as a thank you. Fair warning, it'll be a while before our engineers can handle another batch. They're good, but they're not miracle workers!\"§!"
 gk_raiding_marauder.330.desc.automaton:0 "A data transfer interface opens on the display.\n\n§Y\"Technology transfer protocol ready. Research data will be integrated into operational systems. Compensation: 1,000 energy credits authorized. Processing time for full integration: approximately 10 standard years. Subsequent transfers will be queued until current cycle completes.\"§!"
 gk_raiding_marauder.330.tooltip:0 "The enclave copies our technology. 10-year cooldown."

 # .335 — Patron Panel
 gk_raiding_marauder.335.name:0 "Patron Panel"
 gk_raiding_marauder.335.desc.stoic:0 "The haven's commander acknowledges your patron authority with a formal salute.\n\n§Y\"Patron. As system owner, you have access to our operational command functions. State your directives.\"§!"
 gk_raiding_marauder.335.desc.screamer:0 "The haven's commander practically vibrates with excitement at seeing their patron.\n\n§Y\"HYEEEIIIEEE!!!! Is the BIG BOSS! The one who OWNS the space! What the big boss want? We do anything for big boss! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_marauder.335.desc.cultist:0 "The haven's commander drops to one knee in reverence.\n\n§Y\"Patron and protector. You who shelter Her sanctuary within your domain. The inner mysteries are open to you. Command us, and Her will shall be done.\"§!"
 gk_raiding_marauder.335.desc.calculating:0 "The haven's commander opens an administrative interface.\n\n§Y\"Patron access confirmed. System ownership verified. Administrative functions unlocked. All strategic options are available for your review.\"§!"
 gk_raiding_marauder.335.desc.merchant:0 "The haven's commander greets you with extra warmth.\n\n§Y\"The boss of bosses! Welcome to the VIP lounge, friend. As our patron and landlord, you get access to the premium services. What can we do for you today?\"§!"
 gk_raiding_marauder.335.desc.automaton:0 "An administrative interface unlocks on the display.\n\n§Y\"Command authority verified. System sovereignty confirmed. Elevated access granted. All strategic directives are available. State your command.\"§!"
 gk_raiding_marauder.335.upgrade:0 "Upgrade Haven"
 gk_raiding_marauder.335.tech:0 "Share Technology"
 gk_raiding_marauder.335.tech.timeout:0 "The enclave is still processing the last technology transfer."

