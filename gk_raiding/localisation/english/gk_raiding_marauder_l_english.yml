 # Dividend Events (500–530)
 # ──────────────────────────────────────────────────────────────────

 # .510 — Scrapped Goods
 gk_raiding_marauder.510.name:0 "Scrapped Goods"
 gk_raiding_marauder.510.desc.stoic:0 "A transmission from the [event_target:gk_marauder_enclave_country.GetName]. Brief and to the point, as always. Attached is a cargo manifest.\n\n§Y\"Patron. We have broken down several captured vessels and stripped a convoy. The salvage has been processed. Forwarding your share of the alloys and manufactured goods. Our holds grow heavy with purpose.\"§!"
 gk_raiding_marauder.510.desc.screamer:0 "An explosion of noise over the comms. The [event_target:gk_marauder_enclave_country.GetName] is celebrating again.\n\n§Y\"HYEEEIIIEEE!!!! We smash many ships! Rip apart! Take the shiny bits! Very good metal inside dwamak ships, you know? We melt down, make pretty for you! TAKE TAKE TAKE! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_marauder.510.desc.cultist:0 "A solemn transmission from the [event_target:gk_marauder_enclave_country.GetName]. The background hum of devotional chanting underscores every word.\n\n§Y\"She of the Void has guided our hands in the dismantling of the unworthy. Their vessels have been rendered unto their base components, offerings transmuted into tools for Her faithful. Accept these gifts, patron, and know they are consecrated.\"§!"
 gk_raiding_marauder.510.desc.calculating:0 "A data packet from the [event_target:gk_marauder_enclave_country.GetName], accompanied by a detailed breakdown of salvage operations.\n\n§Y\"Salvage report: 14 vessel hulls processed, 3 convoy interdictions completed. Yield analysis indicates optimal strip efficiency at 94.2%. Alloy and consumer goods allocation attached. Recommend reinvestment in fleet maintenance for maximum returns.\"§!"
 gk_raiding_marauder.510.desc.merchant:0 "A cheerful hail from the [event_target:gk_marauder_enclave_country.GetName]. Their leader is practically beaming through the viewscreen.\n\n§Y\"Good news, friend! Business has been excellent this quarter. We've scrapped quite a haul, top quality alloys and manufactured goods, barely singed! Your cut is on its way. A pleasure doing business, as always!\"§!"
 gk_raiding_marauder.510.desc.automaton:0 "An automated report from the [event_target:gk_marauder_enclave_country.GetName]. No preamble, just structured data.\n\n§Y\"Salvage cycle complete. Captured vessel hulls have been disassembled and processed. Alloy and consumer goods yield extracted at optimal efficiency. Command authority share calculated and dispatched. End of report.\"§!"

 # .515 — Intercepted Cargo
 gk_raiding_marauder.515.name:0 "Intercepted Cargo"
 gk_raiding_marauder.515.desc.stoic:0 "A secure transmission from the [event_target:gk_marauder_enclave_country.GetName]. A cargo manifest scrolls alongside the feed.\n\n§Y\"Patron. We intercepted a trade convoy transiting through neutral space. Cargo secured without incident. Forwarding your share: processed alloys and the liquid credits we extracted from their holds. Clean operation.\"§!"
 gk_raiding_marauder.515.desc.screamer:0 "Frenzied whooping erupts from the comms as the [event_target:gk_marauder_enclave_country.GetName] checks in.\n\n§Y\"HYEEEIIIEEE!!!! Dwamak traders try to sneak past! We say NO SNEAKING! Jump out, grab everything, zoom away! They cry and cry! So many shinies! So many credits! ALL FOR US! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_marauder.515.desc.cultist:0 "A ritualistic transmission from the [event_target:gk_marauder_enclave_country.GetName]. Incense smoke drifts across the viewscreen.\n\n§Y\"The Void whispered of a convoy straying too close to Her domain. We answered Her call. The cargo was claimed in Her name, and the crews were set adrift as witnesses to Her reach. Your tithe of alloys and credits awaits, patron.\"§!"
 gk_raiding_marauder.515.desc.calculating:0 "An encrypted data burst from the [event_target:gk_marauder_enclave_country.GetName], timestamped to the second.\n\n§Y\"Interdiction report: trade convoy intercepted at predicted coordinates. Cargo transfer completed in 4 minutes 12 seconds, within acceptable parameters. Resource analysis: alloy components and liquid capital secured. Allocating patron share per standard distribution model.\"§!"
 gk_raiding_marauder.515.desc.merchant:0 "A warm transmission from the [event_target:gk_marauder_enclave_country.GetName]. Their leader raises a glass.\n\n§Y\"Wonderful news! We happened upon a rather fat trade convoy, and well, one thing led to another. Don't worry, no one was hurt! Much. Your share of the alloys and credits is en route. Let's call it a redistribution of wealth, shall we?\"§!"
 gk_raiding_marauder.515.desc.automaton:0 "A flagged interdiction log from the [event_target:gk_marauder_enclave_country.GetName].\n\n§Y\"Interdiction report: trade convoy intercepted along predicted transit corridor. Cargo transfer executed within mission parameters. Alloy components and liquid capital secured. Command authority allocation dispatched. End of report.\"§!"

 # .520 — Plundered Cargo
 gk_raiding_marauder.520.name:0 "Plundered Cargo"
 gk_raiding_marauder.520.desc.stoic:0 "A terse transmission from the [event_target:gk_marauder_enclave_country.GetName]. The cargo manifest contains unusual entries.\n\n§Y\"Patron. We hit a research transport carrying strategic materials. Rare goods, carefully handled. Your share includes processed alloys and a quantity of refined strategic resources. Use them well.\"§!"
 gk_raiding_marauder.520.desc.screamer:0 "Ecstatic shrieking fills the channel as the [event_target:gk_marauder_enclave_country.GetName] reports in.\n\n§Y\"HYEEEIIIEEE!!!! You never guess what we find! Special sparkly stuff! Very rare! Very shiny! We almost keep for ourselves but NO, good corsairs share with boss! Shiny rocks AND metal bits! BEST DAY! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_marauder.520.desc.cultist:0 "An awed transmission from the [event_target:gk_marauder_enclave_country.GetName]. The speaker's voice trembles with reverence.\n\n§Y\"She of the Void has blessed us with a sign. Among the plundered cargo, rare materials, crystallized essences of the cosmos itself. We have purified them according to Her rites. Accept these sacred resources, patron. They carry Her favor.\"§!"
 gk_raiding_marauder.520.desc.calculating:0 "A priority data packet from the [event_target:gk_marauder_enclave_country.GetName], flagged with resource markers.\n\n§Y\"Priority acquisition report: secured shipment containing strategic-grade materials. Probability of this interception was calculated at 12.3%, making this an above-average outcome. Alloy and strategic resource allocation forwarded. Recommend strategic reserve allocation.\"§!"
 gk_raiding_marauder.520.desc.merchant:0 "An excited transmission from the [event_target:gk_marauder_enclave_country.GetName]. Their leader can barely contain themselves.\n\n§Y\"Jackpot, friend! Absolute jackpot! We intercepted a shipment of strategic materials along with the usual haul. Do you know what these go for on the open market? Well, you won't need to find out, because your share is already boxed and ready. What a score!\"§!"
 gk_raiding_marauder.520.desc.automaton:0 "A priority-flagged acquisition log from the [event_target:gk_marauder_enclave_country.GetName].\n\n§Y\"Priority acquisition report: shipment containing strategic-grade materials secured during routine interdiction operations. Resource classification: rare. Alloy and strategic resource allocation forwarded to command authority. End of report.\"§!"

 # .530 — Scavenged Fleet
 gk_raiding_marauder.530.name:0 "Scavenged Fleet"
 gk_raiding_marauder.530.desc.stoic:0 "An unusual transmission from the [event_target:gk_marauder_enclave_country.GetName]. Their leader appears on screen with something approaching satisfaction.\n\n§Y\"Patron. We captured several vessels intact during recent operations. They have been repaired, rearmed, and crewed. Rather than scrap them, we are transferring them to your command. Consider it a demonstration of our capabilities. They will serve you well.\"§!"
 gk_raiding_marauder.530.desc.screamer:0 "A deafening roar of celebration erupts from the [event_target:gk_marauder_enclave_country.GetName]. Their leader is practically dancing.\n\n§Y\"HYEEEIIIEEE!!!! BEST PRESENT! We catch whole ships! Not broken, not smashed, WHOLE SHIPS! We fix up, put our crew in, now they yours! You fly them, smash more dwamaks! EVERYBODY WINS! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_marauder.530.desc.cultist:0 "A reverent transmission from the [event_target:gk_marauder_enclave_country.GetName]. Sacred chanting swells in the background.\n\n§Y\"She of the Void has delivered unto us vessels whole and unbroken. A miracle, patron. We have blessed their hulls and dedicated their crews to Her service. Accept this fleet as Her gift, instruments of Her will given form and purpose.\"§!"
 gk_raiding_marauder.530.desc.calculating:0 "A detailed transmission from the [event_target:gk_marauder_enclave_country.GetName], accompanied by full technical readouts.\n\n§Y\"Asset transfer notification: multiple combat-capable vessels acquired through precision boarding operations. All systems restored to 97.8% operational capacity. Cost-benefit analysis favors transfer over salvage by a factor of 3.2. Fleet is en route to your capital. Crew complements are at standard levels.\"§!"
 gk_raiding_marauder.530.desc.merchant:0 "A beaming transmission from the [event_target:gk_marauder_enclave_country.GetName]. Their leader looks like they just closed the deal of a lifetime.\n\n§Y\"Friend, have I got a surprise for you! We managed to acquire some ships in, shall we say, lightly used condition. Rather than breaking them down, we thought, why not give them to our favorite patron? A fleet, courtesy of the [event_target:gk_marauder_enclave_country.GetName]. Consider it an investment in our partnership!\"§!"
 gk_raiding_marauder.530.desc.automaton:0 "An asset transfer notification from the [event_target:gk_marauder_enclave_country.GetName].\n\n§Y\"Asset transfer report: multiple combat-capable vessels captured intact during boarding operations. All systems restored to operational capacity. Analysis indicates transfer to command authority yields superior strategic value over salvage. Fleet is en route. End of report.\"§!"
