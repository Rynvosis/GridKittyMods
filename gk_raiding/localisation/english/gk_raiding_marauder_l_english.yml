l_english:
 # GK Raiding — Marauder Enclave localisation

 # Civic
 civic_gk_marauder_enclave: "Marauder Enclave"
 civic_gk_marauder_enclave_desc: "This enclave operates as a marauder outpost, launching raids against nearby empires on behalf of its patron."

 # Ship design
 NAME_GK_Marauder_Enclave_Station: "Marauder Outpost"

 # Enclave founding (enclave.2 overwrite)
 GK_RAIDING_ENCLAVE_2_DESC:0 "Our scouts have identified a viable location for a permanent base of operations in the void between stars. The site offers natural concealment and defensible approaches, ideal for establishing a presence beyond the reach of conventional patrols.\n\nOur §Ydespoliation expertise§! opens an additional possibility. Rather than a standard mercenary enclave, we could establish a §Ycorsair haven§!, a marauder outpost that would launch raids on our behalf, sowing chaos among our rivals.\n\nThe choice is yours, Commander."
 GK_RAIDING_ENCLAVE_2_MERCENARY:0 "Establish Mercenary Enclave"
 GK_RAIDING_ENCLAVE_2_CORSAIR:0 "Establish Corsair Haven"
 GK_RAIDING_ENCLAVE_2_CORSAIR_TOOLTIP:0 "A Corsair Haven is founded."

 # Events — Haven Established (102)
 gk_raiding_marauder.102.name:0 "A Haven Among the Stars"
 gk_raiding_marauder.102.desc.stoic:0 "The [event_target:gk_marauder_enclave_country.GetName] is operational. The crew settled in without ceremony, fortifying the station with quiet efficiency. Their leader transmitted a brief acknowledgment:\n\n§Y\"Station secured. Defenses nominal. We await your contracts, patron. Our blades are sharp and our holds are empty.\"§!"
 gk_raiding_marauder.102.desc.screamer:0 "The [event_target:gk_marauder_enclave_country.GetName] is... established, though the volume of celebratory transmissions nearly burned out the comms relay. The crew has already begun fortifying the station between bouts of what can only be described as competitive shrieking.\n\n§Y\"HYEEEIIIEEE!!!! New home! New home for smashing dwamaks! You send us dwamaks to smash, yes? HYEEEIIIEEE!!!!\"§!"
 gk_raiding_marauder.102.desc.cultist:0 "The [event_target:gk_marauder_enclave_country.GetName] has been consecrated. The crew performed rites of dedication before taking residence, anointing the station's bulkheads with markings of devotion. Their leader's transmission carried a reverent gravity:\n\n§Y\"She of the Void has blessed this sanctuary. The station breathes with Her presence. We shall carry out Her will from this place, patron. Send us those who would be offered.\"§!"
 gk_raiding_marauder.102.desc.calculating:0 "The [event_target:gk_marauder_enclave_country.GetName] is online. Sensor arrays were calibrated before the crew even unpacked. Their leader transmitted an efficiency report within the hour:\n\n§Y\"Station operational. Defensive grid: optimal. Patrol route analysis: complete. Resource projection models loaded. We are ready to begin operations, patron. Transmit target parameters at your convenience.\"§!"
 gk_raiding_marauder.102.desc.merchant:0 "The [event_target:gk_marauder_enclave_country.GetName] is open for business! The crew wasted no time making the station feel welcoming, stringing up trophy displays and what appears to be a lounge area. Their leader's transmission was practically beaming:\n\n§Y\"Welcome, welcome to the grand opening! The [event_target:gk_marauder_enclave_country.GetName] is officially accepting clients. We look forward to a long and mutually profitable partnership, friend!\"§!"

 # Diplomacy window — Greeting (205)
 gk_raiding_marauder.205.name:0 "Marauder Haven"
 # Friendly greetings
 gk_raiding_marauder.205.desc.stoic:0 "The marauder haven's communication array crackles to life, revealing a scarred figure sitting upright in a command chair. They regard you with professional calm.\n\n§Y\"Speak, patron. Our blades are sharp and our holds are empty. If you have work, we are listening. If not, we have duties to attend to.\"§!"
 gk_raiding_marauder.205.desc.screamer:0 "The haven's communication array erupts with noise before the visual feed even stabilizes. A wild-eyed figure is bouncing in their command chair, gesticulating enthusiastically.\n\n§Y\"HYEEEIIIEEE!!!! Is the dwamak-boss! What you want, dwamak-boss? You have dwamaks for us to smash? We very good at smashing! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_marauder.205.desc.cultist:0 "The haven's communication array hums with a low, resonant frequency before the feed resolves. A robed figure sits motionless, eyes half-closed as if in meditation. When they speak, their voice carries the weight of ritual.\n\n§Y\"She of the Void has guided your signal to us. This is no coincidence. Speak, patron, and know that She listens through us.\"§!"
 gk_raiding_marauder.205.desc.calculating:0 "The haven's communication array connects with unusual speed, as though the signal was anticipated. A composed figure studies a data display before turning their attention to the screen.\n\n§Y\"Connection established. Current operational status: nominal. Fleet readiness at 94.7%. State your requirements, patron. We have prepared several operational proposals based on projected regional threat assessments.\"§!"
 gk_raiding_marauder.205.desc.merchant:0 "The haven's communication array opens to a warmly lit interior. A grinning figure raises a drink in greeting, lounging comfortably amid trophy displays and trade ledgers.\n\n§Y\"Well, well! If it isn't our favorite client! Come in, come in. What can the [event_target:gk_marauder_enclave_country.GetName] do for you today? We have some exciting new opportunities on the table.\"§!"
 # Hostile greetings
 gk_raiding_marauder.205.desc.stoic.hostile:0 "The haven's communication array connects after a long delay. The figure on screen regards you with cold contempt.\n\n§R\"You are no patron of ours. We have nothing to discuss. Leave this channel, or the next message you receive will be a torpedo volley.\"§!"
 gk_raiding_marauder.205.desc.screamer.hostile:0 "The haven's communication array nearly overloads as it connects. The figure on screen is visibly enraged, slamming fists against the console.\n\n§R\"HYEEEIIIEEE!!!! DWAMAK! STUPID DWAMAK! You dare hail us?! We smash your ships! We smash your stations! We smash EVERYTHING! GET OUT! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_marauder.205.desc.cultist.hostile:0 "The haven's communication array opens to near-darkness. A figure barely visible in candlelight speaks in a voice trembling with fury.\n\n§R\"She of the Void sees you, heretic. She sees you and She is wroth. Your presence profanes this channel. Begone, before we deliver you unto Her judgment.\"§!"
 gk_raiding_marauder.205.desc.calculating.hostile:0 "The haven's communication array connects with clinical efficiency. The figure on screen does not look up from their data display.\n\n§R\"Hostile contact detected. Threat assessment: negligible. Communication value: zero. Recommendation: terminate connection. Your vessels have been tagged for priority targeting. That is all.\"§!"
 gk_raiding_marauder.205.desc.merchant.hostile:0 "The haven's communication array connects, but the warmth is gone. The figure on screen regards you with the cold disappointment of a deal gone sour.\n\n§R\"I'm afraid your account has been permanently closed. Bad business, you understand. Nothing personal, but we've flagged your transponder codes for our raiding crews. I'd suggest avoiding this sector. Goodbye.\"§!"
