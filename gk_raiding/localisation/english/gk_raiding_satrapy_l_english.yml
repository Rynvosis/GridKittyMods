l_english:

 # Specialist subject type
 specialist_satrapy:0 "Satrapy"
 specialist_satrapy_desc:0 "The Subject becomes a sworn warrior client of the Overlord — gaining army and fleet strength alongside free military techs, in exchange for autonomy, economic friction, and a contributed share of its naval capacity."
 specialist_satrapy_summary: "$text_icon_preset_satrapy_warrior$ Satrapies serve as offensive military comrades, joining all of their Overlord's wars and pooling fleet capacity in exchange for subsidies and military uplift."

 # Agreement preset
 preset_satrapy_warrior:0 "Satrapy"
 preset_satrapy_warrior_desc:0 "A Satrapy is a Specialist Subject type focused on offensive military commitment. The Subject joins all of the Overlord's wars and contributes a portion of its naval capacity, while receiving free military technology and a basic resource subsidy in return."
 preset_satrapy_warrior_flavor_desc:0 "This subject has bound itself to the Overlord as a warrior client. Its armies march under the Overlord's banner, its fleets answer his call, and its enemies become the Overlord's. In turn, the Overlord pays for its keep and shares the spoils of conquest."

