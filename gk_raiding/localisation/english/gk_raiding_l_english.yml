l_english:
 # War Goals

 war_goal_wg_gk_reaping:0 "Reaping"
 war_goal_wg_gk_reaping_desc:0 "War is waged to harvest the enemy's entire population. No limits. No mercy.\n\n§LDuring war: §Runlimited§! pop capture.\nOn surrender: §Rall§! enemy pops are forfeited.§!"
 wg_gk_reaping_accept_tooltip:0 "§Y[From.GetName]§! forfeits §Rall§! of their population to §Y[Root.GetName]§!."

 war_goal_wg_gk_emancipation:0 "Emancipation"
 war_goal_wg_gk_emancipation_desc:0 "War is waged to free enslaved populations from their oppressors.\n\n§LDuring war: up to §Y20%§! of enemy enslaved pops may be captured.\nTotal pop capture is capped at §Y10%§! of the enemy's original population — pops captured during war count toward this limit.\nOn surrender: remaining enslaved pops up to the cap are forfeited.\nPop capture rates scale with §YRaiding Capacity§! modifier.§!"
 wg_gk_emancipation_accept_tooltip:0 "§Y[From.GetName]§! forfeits up to §Y[From.GkEstimatedSurrenderPops]§! remaining enslaved pops to §Y[Root.GetName]§! (§Y[Root.GkSurrenderCapPercent]%§! total cap, minus pops already captured)."
 wg_gk_emancipation_status_quo_tooltip:0 "No pops are transferred on status quo."

 war_goal_wg_gk_robo_liberation:0 "Robo-Liberation"
 war_goal_wg_gk_robo_liberation_desc:0 "War is waged to liberate synthetic life forms from organic oppressors.\n\n§LDuring war: up to §Y20%§! of enemy robotic pops may be captured.\nTotal pop capture is capped at §Y10%§! of the enemy's original population — pops captured during war count toward this limit.\nOn surrender: remaining robotic pops up to the cap are forfeited.\nPop capture rates scale with §YRaiding Capacity§! modifier.§!"
 wg_gk_robo_liberation_accept_tooltip:0 "§Y[From.GetName]§! forfeits up to §Y[From.GkEstimatedSurrenderPops]§! remaining robotic pops to §Y[Root.GetName]§! (§Y[Root.GkSurrenderCapPercent]%§! total cap, minus pops already captured)."
 wg_gk_robo_liberation_status_quo_tooltip:0 "No pops are transferred on status quo."

 # Fail texts
 gk_requires_enemy_has_slaves:0 "Target must have enslaved pops"
 gk_requires_enemy_has_robots:0 "Target must have robotic pops"
 gk_requires_despoiler_civic:0 "Requires Barbaric Despoilers or equivalent civic"
 
 # Policies
 policy_gk_raiding_focus:0 "Raiding Focus"
 policy_gk_raiding_focus_desc:0 "Determines how our raiders prioritize their targets and what bonuses they receive."
 
 gk_focus_plunder_name:0 "Plunder"
 gk_focus_emancipation_name:0 "Emancipation"
 gk_focus_no_pop_raiding_name:0 "No Pop-Raiding"
 
 gk_raiding_focus_plunder:0 "Plunder"
 gk_raiding_focus_plunder_desc:0 "Our raiders seek captives and resources in equal measure. The baseline raiding approach.\n\n§LBase capture rate scales with §YRaiding Capacity§! modifier.§!"
 
 gk_raiding_focus_emancipation:0 "Emancipation"
 gk_raiding_focus_emancipation_desc:0 "Our raiders focus on liberating enslaved populations. Unlocks the §YEmancipation§! war goal.\n\n§LCapture rate scales with §YRaiding Capacity§! modifier.\nOnly enslaved pops may be taken in Emancipation wars.§!"
 
 gk_raiding_focus_robo_liberation:0 "Robo-Liberation"
 gk_raiding_focus_robo_liberation_desc:0 "Our raiders focus on liberating synthetic life forms from organic oppressors. Unlocks the §YRobo-Liberation§! war goal.\n\n§LCapture rate scales with §YRaiding Capacity§! modifier.\nOnly robotic pops may be taken in Robo-Liberation wars.§!"
 gk_focus_robo_liberation_name:0 "Robo-Liberation"
 
 gk_raiding_focus_no_raiding:0 "No Pop-Raiding"
 gk_raiding_focus_no_raiding_desc:0 "Our forces will not conduct pop-raiding wars. Resource pillaging via the §YPillage§! war goal remains available.\n\n§RDisables all pop-raiding war goals (Raiding, Reaping, Emancipation, Robo-Liberation).§!"
 
 # Robot Raiding Policy
 policy_gk_robot_raiding:0 "Robot Raiding"
 policy_gk_robot_raiding_desc:0 "Determines whether our raiders will capture robotic units from enemy worlds."
 
 gk_allow_robot_raiding_name:0 "Allow"
 gk_forbid_robot_raiding_name:0 "Forbid"
 
 gk_robot_raiding_allowed:0 "Capture Robots"
 gk_robot_raiding_allowed_desc:0 "Our raiders will capture robotic pops along with organic ones. Machines are valuable labor."
 
 gk_robot_raiding_forbidden:0 "Organics Only"
 gk_robot_raiding_forbidden_desc:0 "Our raiders will only capture organic pops. Machines are soulless abominations not worth the trouble."
 
 gk_robot_raiding_only:0 "Robots Only"
 gk_robot_raiding_only_desc:0 "Our raiders will only capture robotic pops. Synthetic life is what we seek to liberate."
 gk_robots_only_raiding_name:0 "Robots Only"
 
 # Scripted Modifiers
 mod_gk_pillage_efficiency:0 "Resources from Pillaging"
 mod_gk_raiding_capacity:0 "Raiding Capacity"
 
 # Static Modifiers
 gk_pillaged:0 "Pillaged"
 gk_pillage_tier_1_name:0 "Lightly Pillaged"
 gk_pillage_tier_2_name:0 "Pillaged"
 gk_pillage_tier_3_name:0 "Moderately Pillaged"
 gk_pillage_tier_4_name:0 "Heavily Pillaged"
 gk_pillage_tier_5_name:0 "Severely Pillaged"
 gk_pillage_tier_6_name:0 "Completely Pillaged"
 gk_pillaged_desc:0 "This planet has been pillaged by raiders. [This.GkPillageTierName]. The economy is disrupted but the community has united in solidarity."
 gk_pillaged.tooltip:0 "[This.GkPillageTierName]."
 
 gk_plunder_recovery:0 "Raided"
 gk_plunder_recovery_desc:0 "Our people are working harder and growing faster after being raided. We will rebuild."
 gk_plunder_recovery.tooltip:0 "§Y[This.GkRaideePlundered]§! pops have been plundered from our empire. This modifier scales with the percentage of our population lost and will decay by §Y10%§! each year."
 # Events
 gk_raiding.200.title:0 "Planet Raided"
 gk_raiding.200.desc:0 "Our forces have successfully invaded §Y[event_target:gk_target_planet.GetName]§! and pillaged it for resources. We have also captured §Y[Root.GkForfeitedPops]§! pops."
 gk_raiding.200.accept:0 "Take everything!"
 
 gk_raiding.400.title:0 "Emancipation Complete"
 gk_raiding.400.desc:0 "With the enemy's surrender, we have liberated §Y[Root.GkForfeitedPops]§! enslaved souls from their bondage. They will be resettled across our empire."
 gk_raiding.400.accept:0 "Freedom for all!"
 gk_raiding.400.tooltip:0 "§Y[Root.GkForfeitedPops]§! enslaved pops have been transferred to your empire."
 
 gk_raiding.500.title:0 "Raiding Complete"
 gk_raiding.500.desc:0 "The enemy has surrendered. Our forces have extracted resources from all their worlds and captured §Y[Root.GkForfeitedPops]§! pops."
 gk_raiding.500.accept:0 "Claim our spoils!"
 
 gk_raiding.600.title:0 "Robo-Liberation Complete"
 gk_raiding.600.desc:0 "With the enemy's surrender, we have liberated §Y[Root.GkForfeitedPops]§! synthetic beings from their organic oppressors. They will be granted citizenship in our empire."
 gk_raiding.600.accept:0 "Welcome to freedom!"
 gk_raiding.600.tooltip:0 "§Y[Root.GkForfeitedPops]§! robotic pops have been transferred to your empire."

 gk_raiding.700.title:0 "Reaping Complete"
 gk_raiding.700.desc:0 "The enemy has surrendered unconditionally. Our forces have reaped §Y[Root.GkForfeitedPops]§! pops from §Y[From.GetName]§!'s worlds. Their population has been harvested and integrated into our empire."
 gk_raiding.700.accept:0 "The harvest is complete."
 gk_raiding.700.tooltip:0 "§Y[Root.GkForfeitedPops]§! pops have been forcibly transferred to your empire."

 # Game Concepts
 db_gk_raiding:0 "Raiding"
 
 concept_gk_raiding_mechanics:0 "Raiding Mechanics"
 concept_gk_raiding_mechanics_desc:0 "Capture pops and ['concept_gk_pillaging'] from enemy worlds during war.\nRaiding can be conducted via the §YRaiding§! bombardment stance and successfully invading enemy planets.\n\nPop capture is subject to a §Ytotal cap§! based on war type and §Y['concept_gk_raiding_capacity']§!:\n- §YRaiding wars§!: §Y20%§! during war, §Y10%§! total cap on surrender\n- §YNon-raiding wars§!: §Y10%§! during war, §Y5%§! total cap on surrender\n- §YReaping§!: Unlimited\n- §YTotal wars§!/§YPrimitives§!: Unlimited\n\nPops captured during war count toward the surrender cap. The §YRaiding Capacity§! modifier scales these rates."

 concept_gk_pop_raiding_limit:0 "Pop Raiding Limit"
 concept_gk_pop_raiding_limit_desc:0 "Maximum percentage of an enemy's total population you can capture across the entire war.\n- §YRaiding wars§!: up to §Y20%§! during war, §Y10%§! total cap (pops captured during war count toward this)\n- §YNon-raiding wars§!: up to §Y10%§! during war, §Y5%§! total cap\n- §YReaping§!: Unlimited\n- §YTotal Wars§! and §YPrimitives§!: No limit\n\nCivics like §YEmancipators§! and §YRobo-Liberators§! add §Y+50%§! Raiding Capacity, scaling all rates."

 concept_gk_pillaging:0 "Pillage Resources"
 concept_gk_pillaging_desc:0 "Extract resources from enemy planets based on their economic output and your efficiency modifiers.\n- §YRaiding wars§!: up to §Y2§! tiers, normal yield\n- §YPillage wars§!: up to §Y6§! tiers, §Ydoubled§! yield\nEach pillage applies the §RPillaged§! modifier, reducing the planet's output."
 
 concept_gk_raiding_focus:0 "Raiding Focus"
 concept_gk_raiding_focus_desc:0 "Policy determining your raiding strategy:$TABBED_NEW_LINE$- §YPlunder§!: Pops and resources$TABBED_NEW_LINE$- §YNo Pop-Raiding§!: Disables pop-raiding war goals. Pillaging remains available independently$TABBED_NEW_LINE$- §YEmancipation§!: Only enslaved pops (requires an Emancipators civic)$TABBED_NEW_LINE$- §YRobo-Liberation§!: Only robots (requires a Robo-Liberators civic)\n\n§YReaping§! is available as a war goal to Barbaric Despoilers and equivalent civics regardless of policy."
 
