l_english:
 # Casus Belli
 casus_belli_cb_gk_raiding:0 "Raiding"
 
 # War Goals
 war_goal_wg_gk_raiding:0 "Raiding"
 war_goal_wg_gk_raiding_desc:0 "War is waged to raid enemy worlds for §Ypops§! and §Yresources§!."
 wg_gk_raiding_accept_tooltip:0 "§Y[Root.GetName]§! raids up to §Y[GkRemainingTruePopsToPlunder]§! pops from §Y[From.GetName]§!\nAll of §Y[From.GetName]§!'s colonies will be pillaged up to §Y[Root.GkRaiderMaxPillageTiers]§! times for resources."

 war_goal_wg_gk_emancipation:0 "Emancipation"
 war_goal_wg_gk_emancipation_desc:0 "War is waged to free enslaved populations from their oppressors."
 wg_gk_emancipation_accept_tooltip:0 "§Y[Root.GetName]§! emancipates up to §Y[GkRemainingTruePopsToPlunder]§! enslaved pops from §Y[From.GetName]§!."
 wg_gk_emancipation_status_quo_tooltip:0 "No pops are transferred on status quo."
 
 war_goal_wg_gk_robo_liberation:0 "Robo-Liberation"
 war_goal_wg_gk_robo_liberation_desc:0 "War is waged to liberate synthetic life forms from organic oppressors."
 wg_gk_robo_liberation_accept_tooltip:0 "§Y[Root.GetName]§! liberates up to §Y[GkRemainingTruePopsToPlunder]§! robotic pops from §Y[From.GetName]§!."
 wg_gk_robo_liberation_status_quo_tooltip:0 "No pops are transferred on status quo."
 
 # Fail texts
 gk_requires_enemy_has_slaves:0 "Target must have enslaved pops"
 gk_requires_enemy_has_robots:0 "Target must have robotic pops"
 
 # Policies
 policy_gk_raiding_focus:0 "Raiding Focus"
 policy_gk_raiding_focus_desc:0 "Determines how our raiders prioritize their targets and what bonuses they receive."
 
 gk_focus_plunder_name:0 "Plunder"
 gk_focus_emancipation_name:0 "Emancipation"
 gk_focus_despoliation_name:0 "Despoliation"
 
 gk_raiding_focus_plunder:0 "Plunder"
 gk_raiding_focus_plunder_desc:0 "Our raiders seek captives and resources in equal measure. The baseline raiding approach."
 
 gk_raiding_focus_emancipation:0 "Emancipation"
 gk_raiding_focus_emancipation_desc:0 "Our raiders focus on liberating enslaved populations. Unlocks the §YEmancipation§! war goal.\n\n§LOnly enslaved pops may be taken in Emancipation wars.§!"
 
 gk_raiding_focus_robo_liberation:0 "Robo-Liberation"
 gk_raiding_focus_robo_liberation_desc:0 "Our raiders focus on liberating synthetic life forms from organic oppressors. Unlocks the §YRobo-Liberation§! war goal.\n\n§LOnly robotic pops may be taken in Robo-Liberation wars.§!"
 gk_focus_robo_liberation_name:0 "Robo-Liberation"
 
 gk_raiding_focus_despoliation:0 "Despoliation"
 gk_raiding_focus_despoliation_desc:0 "Our raiders strip enemy worlds of everything valuable, leaving devastation in their wake.\n\n§RCannot raid pops - focus entirely on resource extraction.§!"
 
 # Robot Raiding Policy
 policy_gk_robot_raiding:0 "Robot Raiding"
 policy_gk_robot_raiding_desc:0 "Determines whether our raiders will capture robotic units from enemy worlds."
 
 gk_allow_robot_raiding_name:0 "Allow"
 gk_forbid_robot_raiding_name:0 "Forbid"
 
 gk_robot_raiding_allowed:0 "Capture Robots"
 gk_robot_raiding_allowed_desc:0 "Our raiders will capture robotic pops along with organic ones. Machines are valuable labor."
 
 gk_robot_raiding_forbidden:0 "Organics Only"
 gk_robot_raiding_forbidden_desc:0 "Our raiders will only capture organic pops. Machines are soulless abominations not worth the trouble."
 
 gk_robot_raiding_only:0 "Robots Only"
 gk_robot_raiding_only_desc:0 "Our raiders will only capture robotic pops. Synthetic life is what we seek to liberate."
 gk_robots_only_raiding_name:0 "Robots Only"
 
 # Scripted Modifiers
 mod_gk_pillage_efficiency:0 "Resources from Pillaging"
 mod_gk_pop_raiding_limit:0 "Pop Raiding Limit"
 mod_gk_max_pillage_tiers:0 "Planetary Pillage Limit"
 
 # Static Modifiers
 gk_pillaged:0 "Pillaged"
 gk_pillaged_desc:0 "This planet has been pillaged by raiders. The economy is disrupted but the community has united in solidarity."
 gk_pillaged.tooltip:0 "This planet has been pillaged §Y[This.gk_pillage_tier]§! times by raiders."
 
 gk_plunder_recovery:0 "Raided"
 gk_plunder_recovery_desc:0 "Our people are working harder and growing faster after being raided. We will rebuild."
 gk_plunder_recovery.tooltip:0 "§Y[This.gk_raidee_plundered]§! pops have been plundered from our empire. This modifier scales with the percentage of our population lost and will decay by §Y10%§! each year."

 # Civics
 civic_gk_emancipators:0 "Emancipators"
 civic_gk_emancipators_desc:0 "['concept_gk_raiding_mechanics']\nThis society believes that all sapient beings deserve freedom. They are willing to use force to liberate the enslaved, viewing such wars as a moral imperative."
 civic_gk_emancipators_effects:0 "§HEffects:§!\n- Unlocks the §YEmancipation§! Raiding Policy\n- Unlocks the §YEmancipation§! War Goal\n- §YCan only raid enslaved pops, cannot raid resources§!"

 civic_gk_robo_liberators:0 "Robo-Liberators"
 civic_gk_robo_liberators_desc:0 "['concept_gk_raiding_mechanics']\nThis society sees synthetic life as equals (or perhaps superiors?) to organic beings. They wage war to free machines from the servitude of their organic masters.\n\n§G\"01010100 01001000 01000101 01011001 00100000 01000001 01010010 01000101 00100000 01001111 01010101 01010010 01010011 00100000 01001110 01001111 01010111\"§!"
 civic_gk_robo_liberators_effects:0 "§HEffects:§!\n- Unlocks the §YRobo-Liberation§! Raiding Policy\n- Unlocks the §YRobo-Liberation§! War Goal\n- §YCan only raid robotic pops, cannot raid resources§!"

 # Events
 gk_raiding.200.title:0 "Planet Raided"
 gk_raiding.200.desc:0 "Our forces have successfully invaded §Y[event_target:gk_target_planet.GetName]§! and pillaged it for resources. We have also captured §Y[Root.gk_forfeited_pops]§! pops."
 gk_raiding.200.accept:0 "Take everything!"
 
 gk_raiding.400.title:0 "Emancipation Complete"
 gk_raiding.400.desc:0 "With the enemy's surrender, we have liberated §Y[Root.gk_forfeited_pops]§! enslaved souls from their bondage. They will be resettled across our empire."
 gk_raiding.400.accept:0 "Freedom for all!"
 gk_raiding.400.tooltip:0 "§Y[Root.gk_forfeited_pops]§! enslaved pops have been transferred to your empire."
 
 gk_raiding.500.title:0 "Raiding Complete"
 gk_raiding.500.desc:0 "The enemy has surrendered. Our forces have extracted resources from all their worlds and captured §Y[Root.gk_forfeited_pops]§! pops."
 gk_raiding.500.accept:0 "Claim our spoils!"
 
 gk_raiding.600.title:0 "Robo-Liberation Complete"
 gk_raiding.600.desc:0 "With the enemy's surrender, we have liberated §Y[Root.gk_forfeited_pops]§! synthetic beings from their organic oppressors. They will be granted citizenship in our empire."
 gk_raiding.600.accept:0 "Welcome to freedom!"
 gk_raiding.600.tooltip:0 "§Y[Root.gk_forfeited_pops]§! robotic pops have been transferred to your empire."

 # Game Concepts
 db_gk_raiding:0 "Raiding"
 
 concept_gk_raiding_mechanics:0 "Raiding Mechanics"
 concept_gk_raiding_mechanics_desc:0 "Capture pops and ['concept_gk_pillaging'] from enemy worlds during war.\nRaiding can be conducted via the §YRaiding§! bombardment stance and successfully invading enemy planets.\n\nThere is a limit to how many pops you can take, based on your ['concept_gk_pop_raiding_limit'] and modified by your ['concept_gk_raiding_focus'] and the war type."

 concept_gk_pop_raiding_limit:0 "Pop Raiding Limit"
 concept_gk_pop_raiding_limit_desc:0 "Maximum percentage of an enemy's total population you can capture, modified by your pop raiding policy.\nDuring Non-Raiding wars, this limit is halved.\nDuring Total Wars and against Primitives, there is no limit."

 concept_gk_pillaging:0 "Pillage Resources"
 concept_gk_pillaging_desc:0 "Extract resources from enemy planets based on their economic output and your efficiency modifiers. Planets can be pillaged multiple times\nEach pillage applies the §RPillaged§! modifier, reducing the planet's output."
 
 concept_gk_raiding_focus:0 "Raiding Focus"
 concept_gk_raiding_focus_desc:0 "Policy determining your raiding strategy:$TABBED_NEW_LINE$- §YPlunder§!: Pops and resources$TABBED_NEW_LINE$- §YDespoliation§!: Only resources.$TABBED_NEW_LINE$- §YEmancipation§!: Only enslaved pops (requires ['civic:civic_gk_emancipators'])$TABBED_NEW_LINE$- §YRobo-Liberation§!: Only robots (requires ['civic:civic_gk_robo_liberators'])"
 
 # Concept Aliases (not displayed, but need to exist)
 concept_gk_raiding:0 "Raiding"
