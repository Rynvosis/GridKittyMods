l_english:
 concept_gk_material_liberator:0 "$leader_trait_corsair$"
 concept_gk_material_liberator_desc:0 "An admiral trait that yields £energy£ §YEnergy§! from destroyed enemy ships."
 concept_gk_privateer:0 "$leader_trait_corsair$"
 concept_gk_privateer_desc:0 "An admiral trait that yields £energy£ §YEnergy§! from destroyed enemy ships."
 concept_gk_shipbreaker:0 "$leader_trait_shipbreaker$"
 concept_gk_shipbreaker_desc:0 "An admiral trait that yields £alloys£ §YAlloys§! from destroyed enemy ships."
 concept_gk_plunderer:0 "$leader_trait_plunderer$"
 concept_gk_plunderer_desc:0 "An admiral trait that yields resources from raiding enemy worlds and destroyed enemy ships."
 building_gk_forward_raiding_base:0 "Forward Raiding Base"
 building_gk_forward_raiding_base_desc:0 "A staging post for raiding parties. It skims a share of the output of nearby rival and at-war colonies and feeds the loot back to us."

 concept_gk_privateer_enclave:0 "Privateer Enclave"
 concept_gk_privateer_enclave_desc:0 "When founding a §YMercenary Enclave§!, a §YPrivateer Enclave§! can be established instead.\n\nPrivateer Enclaves raid nearby empires, either autonomously or when hired by other empires, delivering dividends of £energy£ §YEnergy§!, £alloys£ §YAlloys§!, §YStrategic Resources§!, and occasionally captured §Yships§! or rare §Yspecimens§!."

 tradition_gk_raiding_despoliation:0 "Despoliation"
 tradition_gk_raiding_despoliation_desc:0 "These warriors wage war to plunder. They strip the enemy's worlds and fleets for resources."
 tr_gk_raiding_despoliation_adopt:0 "Despoliation Traditions"
 tr_gk_raiding_despoliation_finish:0 "Despoliation Traditions Finished"

 tr_gk_raiding_despoliation_1:0 "Raider's Fervor"
 tr_gk_raiding_despoliation_1_delayed:0 "Every ship and army we destroy is stripped for spoils, and our crews bombard enemy worlds without mercy."
 tr_gk_raiding_despoliation_2:0 "Forward Raiding Bases"
 tr_gk_raiding_despoliation_2_delayed:0 "We plant raiding bases on the frontier to bleed nearby rivals and enemies of their riches."
 tr_gk_raiding_despoliation_2_void_reavers:0 "Forward Raiding Bases"
 tr_gk_raiding_despoliation_2_void_reavers_delayed:0 "Our pirate waystations take a bigger cut of the plunder from the systems they prey upon."
 tr_gk_raiding_despoliation_3:0 "Restless Raiders"
 tr_gk_raiding_despoliation_3_delayed:0 "Our people are made for war. They steady under fire and grow restless in long peace."
 tr_gk_raiding_despoliation_4:0 "Boarding Cables"
 tr_gk_raiding_despoliation_4_delayed:0 "Boarding cables and cutting crews turn disabled enemy hulls into prizes. Our fleets are ordered to scavenge every battlefield."
 tr_gk_raiding_despoliation_5:0 "Acquisitive Officers"
 tr_gk_raiding_despoliation_5_delayed:0 "Our best commanders learn to pull extra resources from every ship they destroy."

 council_agenda_agenda_gk_raiding_despoliation_recovery_fleets_name:0 "Recovery Fleets"
 council_agenda_agenda_gk_raiding_despoliation_recovery_fleets_desc:0 "Every battlefield can be revisited, every hull cut apart, and every fleet kept lean enough to turn spoils into fresh strength."
 agenda_gk_raiding_despoliation_recovery_fleets_finish:0 "$council_agenda_agenda_gk_raiding_despoliation_recovery_fleets_name$ $agenda_ref$"
 agenda_gk_raiding_despoliation_recovery_fleets_finish_desc:0 "$council_agenda_agenda_gk_raiding_despoliation_recovery_fleets_desc$"

 GK_RAIDING_TR_GK_RAIDING_DESPOLIATION_ADOPT_EFFECT:0 "Unlocks ['concept_gk_plundering']\nUnlocks the §Y$casus_belli_cb_pirate_raid$§! Casus Belli and §Y$war_goal_wg_plunder_raid$§! War Goal"
 GK_RAIDING_TR_GK_RAIDING_DESPOLIATION_ADOPT_NATIVE_EFFECT:0 "Increases ['concept_gk_plundering'] effectiveness in all war types."
 GK_RAIDING_TR_GK_RAIDING_DESPOLIATION_1_EFFECT:0 "Gain £unity£ §YUnity§! for each enemy §Yship§! and §Yarmy§! we destroy, scaled by its size.\n§G+50%§! army damage from orbital §Ybombardment§!"
 GK_RAIDING_TR_GK_RAIDING_DESPOLIATION_2_EFFECT:0 "Unlocks the §Y$building_gk_forward_raiding_base$§! starbase building, which raids §G3%§! of the output of nearby §Ynon-ally§! colonies within §Y3§! systems."
 GK_RAIDING_TR_GK_RAIDING_DESPOLIATION_2_VOID_REAVERS_EFFECT:0 "§G+50%§! resources collected by §Ypirate waystations§!"
 GK_RAIDING_TR_GK_RAIDING_DESPOLIATION_2_NOMAD_EFFECT:0 "Unlocks the three §Ypirate waystation§! modules: §Y$sm_waystation_pirate_hideout$§!, §Y$sm_waystation_concealment_field$§! and §Y$sm_waystation_reaver_stronghold$§!."
 GK_RAIDING_TR_GK_RAIDING_DESPOLIATION_3_EFFECT:0 "Won a war in the last §Y10§! years: §G+10§! ['concept_stability'] and §G-15%§! £amenities£ §YAmenities§! usage.\nAt war, or war within the last §Y10§! years: §G+5§! ['concept_stability'].\nAfter §Y20§! years of peace: §R-5§! ['concept_stability']."
 GK_RAIDING_TR_GK_RAIDING_DESPOLIATION_4_EFFECT:0 ""
 GK_RAIDING_TR_GK_RAIDING_DESPOLIATION_4_ARCHIVE_EFFECT:0 "Technology granted: ['technology:tech_boarding_cables', £engineering£$tech_boarding_cables$]"
 GK_RAIDING_TR_GK_RAIDING_DESPOLIATION_5_EFFECT:0 "£commander£ §YCommanders§! gain one of: ['concept_gk_plunderer'], ['concept_gk_material_liberator'], or ['concept_gk_shipbreaker']\n\nGain §G50%§! more resources from §H$leader_trait_corsair$§!, §H$leader_trait_shipbreaker$§! and §H$leader_trait_plunderer$§!."

 GK_RAIDING_TR_GK_RAIDING_DESPOLIATION_FINISH_EFFECT:0 "Unlocks ['concept_gk_privateer_enclave']."
