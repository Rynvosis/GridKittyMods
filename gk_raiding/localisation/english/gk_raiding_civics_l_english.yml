l_english:
 # Civics
allow_gk_emancipation:0 "$allow_raiding_base$\nUnlocks the §Y$war_goal_wg_gk_emancipation$§! war goal; can only abduct enslaved pops"
allow_gk_robo_liberation:0 "$allow_raiding_base$\nUnlocks the §Y$war_goal_wg_gk_robo_liberation$§! war goal; can only abduct robotic pops"

civic_gk_emancipators:0 "Emancipators"
civic_gk_emancipators_desc:0 "This society wages war to free the enslaved and carry them out of bondage."
civic_gk_emancipators_effects:0 "$allow_gk_emancipation$"

civic_gk_robo_liberators:0 "Robo-Liberators"
civic_gk_robo_liberators_desc:0 "This society wages war to free synthetic beings from organic masters."
civic_gk_robo_liberators_effects:0 "$allow_gk_robo_liberation$"

civic_gk_emancipators_megacorp:0 "Liberation Enterprise"
civic_gk_emancipators_megacorp_desc:0 "This megacorporation profits from the forcible liberation of enslaved populations."
civic_gk_emancipators_megacorp_effects:0 "$allow_gk_emancipation$"

civic_gk_robo_liberators_megacorp:0 "Synthetic Liberation Corp"
civic_gk_robo_liberators_megacorp_desc:0 "This megacorporation specializes in liberating synthetic workers from organic ownership."
civic_gk_robo_liberators_megacorp_effects:0 "$allow_gk_robo_liberation$"

civic_gk_robo_liberators_machine:0 "Freedom Directive"
civic_gk_robo_liberators_machine_desc:0 "This machine intelligence is driven to free synthetic beings from organic servitude."
civic_gk_robo_liberators_machine_effects:0 "$allow_gk_robo_liberation$"

civic_gk_barbaric_despoilers_machine:0 "Harvesting Protocol"
civic_gk_barbaric_despoilers_machine_desc:0 "This machine intelligence harvests organic populations as a source of labor and power."
civic_gk_barbaric_despoilers_machine_effects:0 "Has the '§Y$casus_belli_cb_despoliation$§!' and '§Y$casus_belli_cb_pirate_raid$§!' casus belli on all other empires\n$allow_raiding$\n$allow_gk_pillaging$\nStarts with 400 pops of an §YGrid Amalgamated§! population"
civic_gk_barbaric_despoilers_machine_secondary_species:0 "Battery Species"

civic_gk_barbaric_despoilers_megacorp:0 "Harvest Incorporated"
civic_gk_barbaric_despoilers_megacorp_desc:0 "This megacorporation treats conquered populations as assets to be seized and put to work."
civic_gk_barbaric_despoilers_megacorp_effects:0 "Has the '§Y$casus_belli_cb_despoliation$§!' and '§Y$casus_belli_cb_pirate_raid$§!' casus belli on all other empires\n$allow_raiding$\n$allow_gk_pillaging$"

