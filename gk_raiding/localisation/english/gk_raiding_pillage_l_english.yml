 # Pillage Concepts
 concept_gk_pillaging:0 "Pillage Resources"
 concept_gk_pillaging_desc:0 "Extract resources from hostile planets during war.\n\n- §YBombardment§!: every §Y10§! devastation produces §Y1 month§! of planet output\n- §YInvasion§!: produces planet output on conquest\n- £trade_value£ §YTrade§! is doubled; £unity£ §YUnity§! and £research£ §YResearch§! are turned into £consumer_goods£ §YConsumer Goods§!\n- §YPillage§! wars produce significantly more and guarantee enemy surrender tribute"
 concept_gk_pillage:0 "Pillage"
 concept_gk_resource_raiding:0 "Resource Raiding"

 concept_gk_wg_pillage:0 "Pillage"
 concept_gk_wg_pillage_desc:0 "Strip enemy worlds of resources.\n\n§L- Greatly increases pillage yields\n- Guarantees enemy surrender tribute from defeated colonies§!"

