# Asset paths are relative to this file's directory.
# Any format ImageMagick supports works (PNG, DDS, etc).
# You can reference mod files directly: ../../../gfx/interface/icons/foo.dds

canvas: [1280, 720]
background: assets/bg.png
border: assets/border.png

font:
  path: assets/PixeloidSans-Bold.ttf
  sizes:
    title: { pt: 36, pad: 4, kern: 0 }
    heading: { pt: 27, pad: 3, kern: 0 }
    flavour: { pt: 18, pad: 2, kern: -1 }
    label: { pt: 18, pad: 2, kern: -1 }

colors:
  beige: "#FBF1C7"
  red: "#CC241D"
  black: "#1D2021"

layout:
  margin: 30
  top_y: 72

theme:
  image:
    border: true
    radius: 4
    stroke: "rgba(160,150,140,0.6)"
    stroke_width: 1
  decorator:
    default:
      fill: "rgba(60,56,54,0.45)"
      stroke: "rgba(160,150,140,0.6)"
      stroke_width: 1
      radius: 6
