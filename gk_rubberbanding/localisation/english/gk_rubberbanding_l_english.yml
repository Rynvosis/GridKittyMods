# econ rubberbanding loc
 gkrb_econ_relative: "Relative Galactic Economy: §Y[this.GKRBEconRelativeToGlobalPercent]%§! §L([this.GKRBEconScoreRounded])§!"

 gkrb_econ_mod: "Economic Overextension"
 gkrb_econ_mod.tooltip: "$gkrb_econ_relative$[This.GKRBBlocPowerIncrease]\n\nEffects:[this.GKRBEnergyRow][this.GKRBMineralsRow][this.GKRBFoodRow][this.GKRBTradeRow][this.GKRBConsumerGoodsRow][this.GKRBAlloysRow][this.GKRBVolatileMotesRow][this.GKRBExoticGasesRow][this.GKRBRareCrystalsRow][this.GKRBLivingMetalRow][this.GKRBZroRow][this.GKRBDarkMatterRow][this.GKRBNanitesRow][this.GKRBUnityRow][this.GKRBPhysicsResearchRow][this.GKRBSocietyResearchRow][this.GKRBEngineeringResearchRow]"
 
 gkrb_econ_behind_mod: "Economic Revitalization"
 gkrb_econ_behind_mod.tooltip: "$gkrb_econ_relative$[This.GKRBBlocPowerIncrease]\n\nEffects:"


# tech rubberbanding loc
 gkrb_tech_relative: "Relative Technology: §Y[this.GKRBTechPercentage]§!% of galactic average"

 gkrb_tech_mod: "Technological Burnout"
 gkrb_tech_mod.tooltip: "$gkrb_tech_relative$\n\nEffects:[this.GKRBTechPhysicsResearchRow][this.GKRBTechSocietyResearchRow][this.GKRBTechEngineeringResearchRow]"

 gkrb_tech_behind_mod: "Technological Resurgence"
