l_english:

 # --- static modifier umbrellas ---
 gk_diet_upkeep_mult_tt:0 "Diet Upkeep: $VARIABLE|=%-$"

 # --- triggered-modifier tooltips (these do not auto-localise) ---
 trait_gk_zealous_effect:0 "Per §YRival§!:\n    - Governing Ethics Attraction: §G+10%§!\n    - Specialist Workforce: §G+2%§!\n    - Worker Workforce: §G+4%§!"
 trait_gk_mycorrhizal_effect:0 "Diet Upkeep per Natural Blocker on the planet: §G-5%§!"
 trait_gk_ferroelectric_effect:0 "While not in an ['concept_energy'] deficit:\n    - Soldier Workforce: §G+25%§!\n    - Worker Workforce: §G+10%§!\nWhile in an ['concept_energy'] deficit:\n    - Soldier Workforce: §R-20%§!\n    - Worker Workforce: §R-10%§!"
 trait_gk_aeroplankton_effect:0 "Pop Growth Speed increases on smaller planets, up to §G+16%§! on the smallest worlds."
 trait_gk_weak_immune_systems_effect:0 "Pop Growth Speed on non-ideal worlds: §R-25%§!"
 trait_gk_sleepless_effect:0 "Pop Upkeep: §R+15%§!\n    - Unemployed and ['concept_denizen'] Pop Upkeep: §R+75%§!"
 trait_gk_cannibalistic_effect:0 "Pop Growth Speed per §Y100§! Pops with this Trait on the same planet: §R-0.1%§! (Max: §R-20%§!)"
 trait_gk_last_children_effect:0 "Workforce per §Y100§! Pops with this Trait in the empire: §R-0.5%§!"

 # --- GLOBAL positive ---
 trait_gk_ascetic:0 "Ascetic"
 trait_gk_ascetic_desc:0 "This species has little in the way of worldly desires, opting instead to focus on personal enlightenment."
 trait_gk_gifted:0 "Gifted"
 trait_gk_gifted_desc:0 "This species has a marked tendency to produce exceptional leaders, and to weed the poor ones out before they rise."
 trait_gk_stoic:0 "Stoic"
 trait_gk_stoic_desc:0 "Dampened emotions enables members of this species to withstand most psychological attacks that would leave lesser species frozen in fear."
 trait_gk_hale:0 "Hale"
 trait_gk_hale_desc:0 "Leaders of this species serve well past the age at which others would have retired or worse."
 trait_gk_zealous:0 "Zealous"
 trait_gk_zealous_desc:0 "This species works hardest when it has someone to work against."
 trait_gk_huge:0 "Huge"
 trait_gk_huge_desc:0 "Members of this species are much larger relative to other species."
 trait_gk_sadistic:0 "Sadistic"
 trait_gk_sadistic_desc:0 "Members of this species take genuine pleasure in the suffering of others, and are conscientious about arranging for it."
 trait_gk_undemanding:0 "Undemanding"
 trait_gk_undemanding_desc:0 "Members of this species ask very little of their surroundings, and are content with a good deal less than most would tolerate."

 # --- GLOBAL negative ---
 trait_gk_pessimistic:0 "Pessimistic"
 trait_gk_pessimistic_desc:0 "This species expects the worst as a matter of course, and is rarely in good spirits even when things go well."
 trait_gk_technophobes:0 "Technophobes"
 trait_gk_technophobes_desc:0 "Members of this species have a hard time grasping many of the fundamental concepts of engineering and tend to fear it."
 trait_gk_territorial:0 "Territorial"
 trait_gk_territorial_desc:0 "Members of this species demonstrate territorial behavior. Violating their personal area is considered a serious taboo."
 trait_gk_unamuseable:0 "Unamuseable"
 trait_gk_unamuseable_desc:0 "Nothing is ever quite good enough for this species, and keeping it content costs a great deal more than it should."
 trait_gk_unwarlike:0 "Unwarlike"
 trait_gk_unwarlike_desc:0 "Members of this species are terrible warriors and likely should be avoided by recruiters."
 trait_gk_tiny:0 "Tiny"
 trait_gk_tiny_desc:0 "Members of this species are small relative to other species. They can grow to be a few dozen centimeters long."
 trait_gk_incurious:0 "Incurious"
 trait_gk_incurious_desc:0 "This species aren't interested in questioning the world around them. Its sciences advance at a leisurely pace."
 trait_gk_insubordinate:0 "Insubordinate"
 trait_gk_insubordinate_desc:0 "For members of this species, it is considered extremely humiliating to be ruled over."
 trait_gk_arrested_learning:0 "Arrested Learning"
 trait_gk_arrested_learning_desc:0 "Members of this species are slow to learn from their experiences and usually reach the plateau of their skills at low levels."
 trait_gk_mutinous:0 "Mutinous"
 trait_gk_mutinous_desc:0 "This species has a rigid hierarchy and lower ranking members must obey their superiors. Lesser members can challenge the higher ranks for their position through a rite of succession. Once a challenge is issued, they are bound to their goal until victory or death."

 # --- COMMON positive ---
 trait_gk_efficient_metabolism:0 "Efficient Metabolism"
 trait_gk_efficient_metabolism_desc:0 "The digestion of this species is close to total, extracting from a meal what others leave behind, and it eats accordingly less."
 trait_gk_extremophiles:0 "Extremophiles"
 trait_gk_extremophiles_desc:0 "This species is extremely environmentally resilient, even when compared to similarly adapted species."
 trait_gk_teeming:0 "Teeming"
 trait_gk_teeming_desc:0 "This species breeds without pause or plan."
 trait_gk_warrior_caste:0 "Warrior Caste"
 trait_gk_warrior_caste_desc:0 "Members of this species possess exceptional talent in ground combat tactics and martial arts."
 trait_gk_herbalists:0 "Herbalists"
 trait_gk_herbalists_desc:0 "This species are biologically in tune with the natural world. If there is an ailment to cure, they will find a herb that remedies it."

 # --- COMMON negative ---
 trait_gk_high_metabolism:0 "High Metabolism"
 trait_gk_high_metabolism_desc:0 "This species possesses an extremely high metabolism, requiring a much higher dietary intake than others."
 trait_gk_ephemeral:0 "Ephemeral"
 trait_gk_ephemeral_desc:0 "This species measures its lives in a handful of seasons; its ablest are gone before their experience has had the chance to ripen."
 trait_gk_weak_immune_systems:0 "Weak Immune Systems"
 trait_gk_weak_immune_systems_desc:0 "A badly functioning immune system with a tendency to react at blazingly slow speeds has resulted in a high offspring mortality rate."

 # --- PHENOTYPE positive ---
 trait_gk_lignified:0 "Lignified"
 trait_gk_lignified_desc:0 "This species tissue becomes fibrous and woody with time."
 trait_gk_pestilent_byproducts:0 "Pestilent Byproducts"
 trait_gk_pestilent_byproducts_desc:0 "This species seeps foul substances from their corrupted flesh, but if collected can be refined to serve all sorts of industrial usecases."
 trait_gk_courtship_displays:0 "Courtship Displays"
 trait_gk_courtship_displays_desc:0 "This species partakes in particularly entertaining courtship displays that are a wonder to witness."
 trait_gk_fire_breath:0 "Fire Breath"
 trait_gk_fire_breath_desc:0 "All mature members of this species are walking living flamethrowers."
 trait_gk_mycorrhizal:0 "Mycorrhizal"
 trait_gk_mycorrhizal_desc:0 "This species is connected to a mycelium network, providing additional nutrients for their development."
 trait_gk_ferroelectric:0 "Ferroelectric"
 trait_gk_ferroelectric_desc:0 "Members of this species display conductive properties."
 trait_gk_aeroplankton:0 "Aeroplankton"
 trait_gk_aeroplankton_desc:0 "This species is known to move throughout the air in a less controlled fashion. Planets that have lower gravity or a denser atmosphere are preferable, due to a better ability to spread their offspring."
 trait_gk_radiotoxic:0 "Radiotoxic"
 trait_gk_radiotoxic_desc:0 "This species concentrates in its own flesh every poison and radionuclide it encounters."
 trait_gk_gregarious:0 "Gregarious"
 trait_gk_gregarious_desc:0 "This species has a magnificent fur or feathers, so nice, so soft. People love them."
 trait_gk_elders:0 "Elders"
 trait_gk_elders_desc:0 "This species matures at a slow rate, but learn much throughout their adolescence."
 trait_gk_extrasensory:0 "Extrasensory"
 trait_gk_extrasensory_desc:0 "This species has an additional method of perception beyond the physical senses. They exhibit a seemingly intuitive understanding of ongoing situations."
 trait_gk_death_echoes:0 "Death Echoes"
 trait_gk_death_echoes_desc:0 "This species has the ability to experience the final thought from the minds of the dead."

 # --- PHENOTYPE negative ---
 trait_gk_hoarders:0 "Hoarders"
 trait_gk_hoarders_desc:0 "TODO"
 trait_gk_sprawling_overgrowth:0 "Sprawling Overgrowth"
 trait_gk_sprawling_overgrowth_desc:0 "TODO"

 # --- CYBER / BIOGENESIS positive ---
 trait_gk_durasteel_plating:0 "Durasteel Plated"
 trait_gk_durasteel_plating_desc:0 "Members of this species are always covered in hardened alloy armour, be it biological or hand crafted."
 trait_gk_dragon_scales:0 "Dragon Scales"
 trait_gk_dragon_scales_desc:0 "Members of this species are well protected from impacts, electricity, heat and other hostile factors by their mysterious scales. Unfortunately, there is no sustainable way to use this protection for their spaceships."
 trait_gk_hosts:0 "Hosts"
 trait_gk_hosts_desc:0 "All members of this species have been inoculated with a sentient parasite. When they encounter problems, they can just transfer to another host or may try to modify their current host to solve the problem."
 trait_gk_regenerative:0 "Regenerative"
 trait_gk_regenerative_desc:0 "Members of this species have the rare ability to regenerate any lost body tissue in a short period of time, at a high metabolic cost."
 trait_gk_natural_artisans:0 "Natural Artisans"
 trait_gk_natural_artisans_desc:0 "This species is naturally gifted with artistic talent."
 trait_gk_intrauterine_cannibalism:0 "Intrauterine Cannibalism"
 trait_gk_intrauterine_cannibalism_desc:0 "While many young may develop in the womb at the same time, only one will survive to see the light of day."
 trait_gk_polycephalous:0 "Polycephalous"
 trait_gk_polycephalous_desc:0 "Members of this species possess multiple heads, be that through larval fusion or prenatal development."
 trait_gk_tinkerers:0 "Tinkerers"
 trait_gk_tinkerers_desc:0 "Engineering is the main point of interest for members of this species, as they have a strange attraction to all things mechanical."
 trait_gk_panoptics:0 "Panoptics"
 trait_gk_panoptics_desc:0 "This species are natural observers."
 trait_gk_radiation_shielding:0 "Radiation Shielding"
 trait_gk_radiation_shielding_desc:0 "The body of this species is shielded against radiation and fallout, able to settle worlds too poisoned and blasted with it is slow and costly protection."
 trait_gk_etched_frames:0 "Etched Frames"
 trait_gk_etched_frames_desc:0 "The bodies of this species are carved and marked in rite."
 trait_gk_sanguivore:0 "Sanguivore"
 trait_gk_sanguivore_desc:0 "Members of this species can ingest the blood of other creatures. Since blood is considered as a delicacy for this species, some farmers have an uncontrollable urge to suck the blood of livestock."

 # --- CYBER / BIOGENESIS negative ---
 trait_gk_burnout_susceptibility:0 "Burnout Susceptibility"
 trait_gk_burnout_susceptibility_desc:0 "TODO"
 trait_gk_sleepless:0 "Sleepless"
 trait_gk_sleepless_desc:0 "TODO"
 trait_gk_cannibalistic:0 "Cannibalistic"
 trait_gk_cannibalistic_desc:0 "TODO"
 trait_gk_hypermetabolism:0 "Hypermetabolism"
 trait_gk_hypermetabolism_desc:0 "The metabolism of this species has escaped all regulation, consuming without pause and without limit."

 # --- SPECIAL ---
 trait_gk_last_children:0 "Last Children"
 trait_gk_last_children_desc:0 "This clever species genetically modified themselves decades ago, but this advance had catastrophic side effects resulting in low birth rates. They might be the last children of their species."
