 newfrontiers_action.4.desc: "§Y[FromFrom.GetName]§! has a high pressure and atmosphere that is toxic to most life forms. Nevertheless, a thriving biocenosis has developed here, using ammonia instead of water as a solvent. The development of life has followed an ecological model that is significantly different from those that we know. Its study will significantly expand our knowledge in xenobiology."
 
 
