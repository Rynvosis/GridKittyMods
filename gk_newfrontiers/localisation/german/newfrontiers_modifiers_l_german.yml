 ####################################
 # Modifiers
 ####################################
 
 ####################################
 # Planet Modifiers
 ####################################
 
 nf_death_world: "Death World"
 nf_death_world_desc: "At first glance, this planet may seem like a paradise, but beneath the treacherous beauty and enticing richness of this world lies nothing but death. Constant biological competition between flora and fauna forces every species to develop deadly and horrific features. The biosphere is thus hostile towards colonizers, but settlers who are able to adapt and survive will emerge as hardened warriors."
 ancient_cities: "Ancient Cities"
 ancient_cities_desc: "This planet was once home to an highly developed civilization, and the ruins of its once great-cities still dot the surface. It is a paradise for archaeologists who want to immerse themselves in the wonders of history."
 meteorite_showers: "Meteorite Showers"
 meteorite_showers_desc: "The atmosphere of this planet is unable to shield it from regular meteorite showers, so the surface is constantly exposed to massive bombardments."
 incessant_thunderstorm: "Ceaseless Thunderstorms"
 incessant_thunderstorm_desc: "Because of unstable solar activity and uneven heating, the atmosphere of this planet is in constant motion. Fierce thunderstorms frequently rage across the planet's surface."
 terrible_hurricanes: "Terrible Hurricanes"
 terrible_hurricanes_desc: "The surface of this planet is subject to rapid temperature variations, creating a favorable environment for atmospheric weather extremes. Terrible storms and tornadoes rage constantly in many regions, bringing nothing but chaos and destruction."
 heavy_sandstorms: "Relentless Sandstorms"
 heavy_sandstorms_desc: "Huge, fierce sandstorms blow across this planet and disperse what little topsoil it has across its entire surface. It is not easy to survive in this world, but the natural exposure of solid rock provides good opportunities for mining."
 heavy_blizzards: "Dense Blizzards"
 heavy_blizzards_desc: "Near-constant snowstorms and blizzards disrupt communications, causing settlements on this planet to be periodically cut off from each other."
 prolonged_drought: "Persistent Drought"
 prolonged_drought_desc: "The planet's water resources are extremely scarce, resulting in a season of persistent drought that can last for decades during phases of hightened solar activity."
 toxic_atmosphere: "Toxic Atmosphere"
 toxic_atmosphere_desc: "There are very rare and toxic gases in the atmosphere of this planet. Colonists  would be forced to use special protective equipment to venture beyond sealed living modules, but the unique gases promise great rewards in terms of biological research."
 picturesque_rings: "Picturesque Rings"
 picturesque_rings_desc: "The asteroid ring that surrounds this planet gives it an awe-inspiring appearance. Crowds of tourists are eager to flock here to experience the incredible scenery."
 desynchronous_rings: "Misaligned Rings"
 desynchronous_rings_desc: "The multiple asteroid rings around this planet differ in speed and tilt. This strange anomaly arouses interest in scientific circles and by itself provokes heated theories."
 long_night: "Long Night"
 long_night_desc: "Caused by the neighboring celestial bodies, the solar eclipses on this planet can last several months."
 eternal_night: "Eternal Night"
 eternal_night_desc: "Because of its star's dimness, the planet is almost always shrouded in night. The low temperatures and sparse vegetation lead to very harsh conditions on the surface for anyone willing to settle."
 geomagnetic_storm: "Geomagnetic Storms"
 geomagnetic_storm_desc: "The solar wind of the mother star creates strong turmoil in the magnetosphere, causing electromagnetic anomalies across the planet's surface that disrupt its production capacity."
 coriolis_storm: "Coriolis Storms"
 coriolis_storm_desc: "The rotation of this planet causes winds to hit absurd speeds, resulting in devastating global dust storms."
 ion_storm: "Ion Storms"
 ion_storm_desc: "The planet’s weak magnetosphere allows a stream of cosmic particles to wreak havoc on the upper layers of the atmosphere."
 wild_hunt: "Wild Hunt"
 wild_hunt_desc: "Swarms of predators on the planet's surface are in a hunting frenzy. Any colony here will eventually succumb to this wildlife."
 insatiable_swarm: "Insatiable Swarm"
 insatiable_swarm_desc: "Swarms of monstrous insectoids emerge from nests on the planet’s surface in a constant feeding frenzy. Any colony here will eventually succumb to these creatures."
 abyssal_devourers: "Abyssal Devourers"
 abyssal_devourers_desc: "Terrible monsters in the depths of the planet’s waters devour everything that gets in their way. Any colony here will eventually succumb to these abyssal horrors."
 sea_monsters: "Sea Monsters"
 sea_monsters_desc: "From the depths of the ocean, marine monsters have risen to terrorize all marine settlements on the planet. Unfourtunately, the leviathans find colonists to be especially tasty and return for regular feasts."
 tremor_earth: "Tremor Earth"
 tremor_earth_desc: "Giant monsters are surfacing in the middle of settlements and causing terrible destruction."
 vast_beasts: "Behemoths"
 vast_beasts_desc: "Herds of colossal monsters have left their hiding places and are crushing everything in their path."
 iron_planet: "Iron Planet"
 iron_planet_desc: "The planet’s outher mantle is nearly absent, almost entirely revealing the metal core."
 coreless_planet: "Coreless Planet"
 coreless_planet_desc: "This planet has no metal core. The entire planet consists only of a thick mantle and completely lacks any magnetic field."
 old_star: "Old Star"
 old_star_desc: "This star is in the final stage of its evolution, its hydrogen almost completely burned out."
 cold_subdwarf: "Cold Subdwarf"
 cold_subdwarf_desc: "These are very old, low-mass stars with heavy elements. They belong to the first generation of stars and are, in fact, relics from the very beginning of creation. They have survived into the present thanks only to their small mass. Cold subdwarfs belong to classes G to M and are characterized by low metallicity."
 hot_subdwarf: "Hot Subdwarf"
 hot_subdwarf_desc: "These are class B and O stars. They occur in the late evolutionary stage of some stars. A hot subdwarf is formed when a red giant loses hydrogen from its outer layers before reactions involving helium begin near its gravitational center."
 rich_rings: "Rich Rings"
 rich_rings_desc: "This planet's rings are rich in valuable minerals."
 diamond_rings: "Diamond Rings"
 diamond_rings_desc: "The planet's rings are rich in deposits of diamonds and other precious stones."
 active_processes: "Active Processes"
 active_processes_desc: "This brown dwarf shows active nuclear reactions, although under all known physical laws this should not happen."
 planemo: "Planemo"
 planemo_desc: "The thermonuclear activity of this red dwarf is low, bordering the early stage of a brown dwarf. As it cools down over the next billions of years, this late M dwarf will become a characteristic class L brown dwarf."
 hot_jupiter: "Hot Jupiter"
 hot_jupiter_desc: "This gas giant is too close to its parent star, heating its surface to monstrous temperatures and gradually vaporizing the atmosphere. In the future, this gas giant will develop a loose, unstable chemical composition."
 puffy_planet: "Bloated Planet"
 puffy_planet_desc: "Being very close to its star, the planet's gravity could not counter its thermal expansion. Its density has dropped to extremely low values, making it more of a gas giant than a solid planet. In the future it could vaporize completely or leave behind only a solid core, becoming a chthonic planet."
 alien_star: "Alien Star"
 alien_star_desc: "This star was born in an alien cluster, and now serves only as a silent reminder of its own inglorious death as the result of a galactic collision."
 beautiful_sky: "Beautiful Sky"
 beautiful_sky_desc: "This planet's system is in a very beautiful and bright nebula. A lot of tourists are waiting to come and see this spectacle."
 apocalypse: "Apocalypse"
 apocalypse_desc: "This planet faces a terrible cataclysm that will destroy all life on its surface. The inhabitants of this planet must leave immediately, before it is too late to go."
 protective_equipment: "Protective Equipment"
 protective_equipment_desc: "As part of the project to improve the survivability of the colony, every colonist on the planet was provided with equipment to withstand the harsh conditions of this world."
 secret_disaster: "Concealed Disaster"
 secret_disaster_desc: "The inhabitants of this planet are ignorant of the terrible fate that their planet is facing."
 moon_collision: "Colliding Moon"
 moon_collision_desc: "Soon this moon will be struck by disaster. Its orbit will shift and a collision with its mother planet is inevitable."
 moon_fall: "Falling Moon"
 moon_fall_desc: "This moon will soon crash into its planet’s surface, causing a massive cataclysm on a global scale."
 orbit_reduction: "Shrinking Orbit"
 orbit_reduction_desc: "This planet’s orbit is shrinking. It is rapidly approaching its mother star."
 orbit_increase: "Increasing Orbit"
 orbit_increase_desc: "This planet’s orbit is increasing. It is rapidly moving away from its mother star."
 volcanic_activity: "Volcanic Activity"
 volcanic_activity_desc: "This planet will soon be devastated by increasingly active volcanoes on the surface. The constant emissions of poisonous gases will make soon make it uninhabitable."
 production_boost: "Production Boost"
 production_boost_desc: "This planet is experiencing an unprecedented increase in production in all sectors generating crude materials."
 significant_damage: "Significant Damage"
 significant_damage_desc: "There has been a major incident on this planet. It will take time to repair the damage it caused."
 melting_glaciers: "Melting Glaciers"
 melting_glaciers_desc: "The last glaciers on the planet are melting at the end of a long ice age. With each month, more and more inhabitable regions will emerge from the receeding ice."
 new_home: "New Home"
 new_home_desc: "The acquisition of a new homeworld led to an active growth in production and a record pace of development of untouched territories."
 preserve_planet: "Planet-preserve"
 preserve_planet_desc: "This world has been declared a protected natural area. Mineral extraction and any industrial activity are prohibited. Civil society has committed to meticulously preserving this unique natural environment."
 civil_disobedience: "Civil Disobedience"
 civil_disobedience_desc: "Civil society in the empire reacted very strongly to the refusal to grant special protection to the ecosystem of this unique place. Active protests by environmentalists are taking place across the planet."
 rejected_beauty: "Rejected Beauty"
 rejected_beauty_desc: "The Empire's inhabitants are frustrated by the news broadcast by environmentalists. Colorful reports from an exotic planet about how yet another beautiful corner of the galaxy will be lost forever are fueling melancholy and despondency."
 environmentalists_protests: "Environmentalists Protests"
 environmentalists_protests_desc: "Environmental protests have taken a serious turn around the world. Activists are attacking factories and blocking production. Discontent is flaring up across the planet."
 