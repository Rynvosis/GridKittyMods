 ####################################
 
 nf_death_world: "Мир смерти"
 nf_death_world_desc: "Внешне эта планета может показаться раем, но за предательски пленяющей красотой и манящим богатством природы этого мира скрывается смерть. Постоянная конкуренция в биосфере заставляет всех - от грибов до деревьев, - для разработки смертельных контрмер. Поселенцы, которые смогут адаптироваться на планете, предлагающей им тысячу способов умереть немедленно, станут самыми выносливыми воинами, способными выжить в самых чудовищных условиях."
 ancient_cities: "Древние города"
 ancient_cities_desc: "В далеком прошлом эта планета была домом для разумной цивилизации, которая однажды исчезла. Сейчас об их былом величии напоминают лишь древние руины городов. Эта планета настоящий рай для археологов, желающих погрузиться в глубины истории."
 meteorite_showers: "Метеоритный дождь"
 meteorite_showers_desc: "Атмосфера этой планеты не способна сдержать смертоносные метеоритные потоки, из-за чего поверхность постоянно подвергается массированным бомбардировкам."
 incessant_thunderstorm: "Непрекращающиеся грозы"
 incessant_thunderstorm_desc: "Из-за неравномерного нагрева, вызванного нестабильной солнечной активностью, атмосфера этой планеты пребывает в постоянном движении и сопровождается яростными штормами с обильными грозовыми разрядами."
 terrible_hurricanes: "Ужасные ураганы"
 terrible_hurricanes_desc: "Поверхность этой планеты способна быстро нагреваться, в отличие от более холодной атмосферы, что является благоприятной средой для зарождения зон вечных штормов. Страшные ураганы и торнадо бушуют на этих землях, неся с собой хаос и разрушения."
 heavy_sandstorms: "Сильные песчаные бури"
 heavy_sandstorms_desc: "Огромные и яростные песчаные бури поднимают в атмосферу скудную почву этой планеты и разносят на многие километры. Выжить в этом мире непросто, но естественная фильтрация породы, предоставляет хорошие возможности для добычи полезных ископаемых."
 heavy_blizzards: "Сильные снежные бури"
 heavy_blizzards_desc: "Практически непрекращающиеся снежные бури и метели на этой планете нарушают работу средств связи и затрудняют коммуникацию, из-за чего поселения на этой планете периодически будут отрезаны друг от друга."
 prolonged_drought: "Продолжительная засуха"
 prolonged_drought_desc: "На этой планете крайне скудные запасы воды, из-за чего периодически возникают сезоны продолжительной засухи, которые могут идти десятилетиями."
 toxic_atmosphere: "Токсичная атмосфера"
 toxic_atmosphere_desc: "В атмосфере этой планеты присутствуют очень редкие и токсичные газы, которые интересны с точки зрения биологических изысканий, но жизнь на такой планете будет непростой, так как все обитатели должны будут использовать специальные средства защиты."
 picturesque_rings: "Живописные кольца"
 picturesque_rings_desc: "Кольцо астероидов, опоясывающее эту планету, придает её неповторимое очертание. Толпы туристов будут стремиться попасть сюда, чтобы запечатлеть невероятные природные пейзажи."
 desynchronous_rings: "Асинхронные кольца"
 desynchronous_rings_desc: "Кольца астероидов вокруг этой планеты имеют разное направление движения и скорость потоков. Эта странная аномалия вызывает интерес и провоцирующий жаркие дискуссии в научных кругах."
 long_night: "Долгая ночь"
 long_night_desc: "Затмения солнца на этой планете, вызванные соседними небесными телами, приводят к очень долгой ночи, которая может длиться несколько месяцев."
 eternal_night: "Вечная ночь"
 eternal_night_desc: "Из-за очень слабого света звезды на планете практически всегда царит вечная ночь. Это приводит к очень тяжелым условиям на поверхности, низким температурам и скудной растительности."
 geomagnetic_storm: "Геомагнитная буря"
 geomagnetic_storm_desc: "Солнечный ветер создает сильные возмущения в магнитосфере, порождая электромагнитные аномалии по всей поверхности планеты и падению производственной мощности."
 coriolis_storm: "Кориолисова буря"
 coriolis_storm_desc: "Чудовищный ветер, ускоренный вращением планеты, развивает огромную скорость и проносится по всей планете, создавая разрушительную пылевую бурю глобальных масштабов."
 ion_storm: "Ионная буря"
 ion_storm_desc: "Разрушительный шторм формируется в верхних слоях атмосферы под действием потока заряженных частиц, которые не способна остановить слабая магнитосфера планеты.\n§RНаселение на планете будет постепенно убавляться!§!"
 wild_hunt: "Дикая охота"
 wild_hunt_desc: "Стаи хищных зверей вышли на охоту и ничто не может встать у них на пути.\n§RНаселение на планете будет постепенно убавляться!§!"
 insatiable_swarm: "Ненасытный рой"
 insatiable_swarm_desc: "Множество насекомоподобных монстров вылезет из своих нор, чтобы устроить себе пир по всей планете.\n§RНаселение на планете будет постепенно убавляться!§!."
 abyssal_devourers: "Глубинные пожиратели"
 abyssal_devourers_desc: "Пробил час, когда из темных вод планеты появляются ужасные монстры, чтобы съесть все что встретится на их пути.\n§RНаселение на планете будет постепенно убавляться!§!"
 sea_monsters: "Морские чудовища"
 sea_monsters_desc: "Из глубин океана выбрались гигантские левиафаны, чтобы терроризировать все морские поселения на планете.\n§RНаселение на планете будет постепенно убавляться!§!."
 tremor_earth: "Дрожь земли"
 tremor_earth_desc: "Гигантские чудовища выбираются прямо из-под земли посреди поселений и устраивают ужасные разрушения.\n§RНаселение на планете будет постепенно убавляться!§!"
 vast_beasts: "Огромные звери"
 vast_beasts_desc: "Стада колоссальных монстров вышли из своих укрытий и сминают все на своем пути, куда бы они не направились.\n§RНаселение на планете будет постепенно убавляться!§!"
 iron_planet: "Железная планета"
 iron_planet_desc: "Железная планета практически целиком состоит из металлического ядра с тонким или практически отсутствующим слоем мантии."
 coreless_planet: "Безъядерная планета"
 coreless_planet_desc: "У этой планеты полностью отсутствует металлическое ядро. Вся планета состоит только из огромной мантии, вследствие чего у неё полностью отсутствует магнитное поле."
 old_star: "Старая звезда"
 old_star_desc: "Эта звезда находиться на завершающей стадии своей эволюции и водород в её недрах почти полностью выгорел."
 cold_subdwarf: "Холодный субкарлик"
 cold_subdwarf_desc: "Это очень старые, маломассивные, бедные тяжелыми элементами звезды. Они принадлежат к первому поколению звезд и по сути являются реликтами времён самого начала звездообразования, дожившие до наших дней благодаря малой массе. Холодные субкарлики принадлежат к классам от G до M и отличаются низкой металличностью."
 hot_subdwarf: "Горячий субкарлик"
 hot_subdwarf_desc: "Это звёзды классов B и O. Они представляют собой позднюю стадию эволюции некоторых звёзд. Горячий субкарлик образуется, когда красный гигант теряет водород из своих внешних слоёв, прежде чем в ядре начинаются реакции с участием гелия."
 rich_rings: "Богатые кольца"
 rich_rings_desc: "Система колец астероидов этой планеты богата ценными минералами."
 diamond_rings: "Алмазные кольца"
 diamond_rings_desc: "Система колец астероидов этой планеты богата месторождениями алмазов и других драгоценных камней."
 active_processes: "Активные процессы"
 active_processes_desc: "Недра этого коричневого карлика демонстрируют показатели активных ядерных реакций, хотя по всем физическим законам такого не должно происходить."
 planemo: "Планемо"
 planemo_desc: "Термоядерная реакция этого красного карлика проявляет низкую активность и по сути представляет собой раннюю стадию коричневого карлика. В процессе остывания в течении многих миллиардов лет этот поздний M-карлик перейдет в более характерный для коричневых карликов класс L."
 hot_jupiter: "Горячий юпитер"
 hot_jupiter_desc: "Этот газовый гигант находится слишком близко к звезде, в результате чего его поверхность нагревается до чудовищных температур, а атмосфера постепенно испаряется. В будущем этот газовый гигант может стать рыхлой планетой."
 puffy_planet: "Рыхлая планета"
 puffy_planet_desc: "При очень малом расстоянии до звезды и не очень большой массе, эта планета не удерживалась своей гравитацией от разогрева, что привело к её сильному термическому расширению и падению плотности до экстремально низких значений. Такая планета скорее представляет собой газовое облако, нежели полноценную планету. В будущем этот газовый гигант можем испарить себя полностью или оставить твердое ядро, которая станет хтонической планетой."
 alien_star: "Чужая звезда"
 alien_star_desc: "Эта звезда была рождена в чужом скоплении и теперь служит лишь безмолвным напоминанием о его бесславной гибели в результате столкновения с нашей галактикой."
 beautiful_sky: "Прекрасное небо"
 beautiful_sky_desc: "Эта планета находиться в системе с очень красивой и яркой туманностью. Множество туристов захотят увидеть это зрелище."
 apocalypse: "Апокалипсис"
 apocalypse_desc: "Эту планету ожидает ужасный катаклизм, который уничтожит всё живое на её поверхности. Жители планеты должны немедленно покинуть её, иначе их ждет смерть."
 protective_equipment: "Средства индивидуальной защиты"
 protective_equipment_desc: "В рамках проекта по повышению выживаемости колонии, каждому колонисту планеты было предоставлено оборудование что бы переносить тяжелые условия этого сурового мира."
 secret_disaster: "Катастрофа держится в тайне"
 secret_disaster_desc: "Жители этой планеты находятся в неведении, что в скором времени их планету постигнет ужасная судьба."
 moon_collision: "Столкновение луны"
 moon_collision_desc: "В скором времени эту планету настигнет катастрофа, ее орбита смещается и столкновение с материнской планетой неизбежно."
 moon_fall: "Падение луны"
 moon_fall_desc: "В скором времени луна этой планеты упадет на ее поверхность, вызвав колоссальный катаклизм."
 orbit_reduction: "Уменьшение орбиты"
 orbit_reduction_desc: "В скором времени эту планету настигнет катастрофа, ее орбита сокращается, и она стремительно приближается к солнцу."
 orbit_increase: "Увеличение орбиты"
 orbit_increase_desc: "В скором времени эту планету настигнет катастрофа, ее орбита увеличивается, и она стремительно удаляется от солнца."
 volcanic_activity: "Вулканическая активность"
 volcanic_activity_desc: "В скором времени эту планету настигнет катастрофа, на поверхности участилась активность вулканов, а постоянные выбросы ядовитых газов, сделают ее необитаемой."
 production_boost: "Рост производства"
 production_boost_desc: "Эта планета переживает небывалый рост производства во всех отраслях промышленности, сельском хозяйстве и добыче полезных ископаемых."
 significant_damage: "Значительный ущерб"
 significant_damage_desc: "На этой планете произошла крупная авария. На устранение ее последствий потребуется время."
 melting_glaciers: "Тающие ледники"
 melting_glaciers_desc: "На планете происходит таяние последних ледников, последствие долго ледникового периода. С каждым готом все больше обитаемых областей освобождается от ледяного плена."
 new_home: "Новый дом"
 new_home_desc: "Обретение нового родного мира, привело к активному росту производства и рекордным темпам освоения нетронутых территорий."
 harmful_mold_1: "Пагубная плесень (Споры)"
 harmful_mold_1_desc: "В биосфере этого мира обнаружены споры экзогрибка. Споры очень быстро распространяются в воздушной и водной среде."
 harmful_mold_2: "Пагубная плесень (Заражение)"
 harmful_mold_2_desc: "Экзогрибок продолжает размножатся в биосфере и вырабатывает патоген, поражающий любую органику и механизмы."
 harmful_mold_3: "Пагубная плесень (Ассимиляция)"
 harmful_mold_3_desc: "Ужасный экзогрибок распространяется по всюду. Атмосфера насыщена ядовитыми спорами, а черная плесень покрывает инфраструктуру, живые организмы и любые механизмы."
 planetary_quarantine: "Планетарный карантин"
 planetary_quarantine_desc: "Эта планета подвержена опасному заражению и находится в блокаде."
 planetary_quarantine_gestalt: "$planetary_quarantine$"
 planetary_quarantine_gestalt_desc: "$planetary_quarantine_desc$"
 terrible_measures_1: "Ужасные меры"
 terrible_measures_1_desc: "Население империи пребывает в панике и охвачено страхом от новостей об убийстве зараженных колонистов."
 terrible_measures_2: "$terrible_measures_1$"
 terrible_measures_2_desc: "$terrible_measures_1_desc$"
 terrible_measures_3: "$terrible_measures_1$"
 terrible_measures_3_desc: "$terrible_measures_1_desc$"
 terrible_measures_4: "$terrible_measures_1$"
 terrible_measures_4_desc: "$terrible_measures_1_desc$"
 terrible_measures_5: "$terrible_measures_1$"
 terrible_measures_5_desc: "$terrible_measures_1_desc$"
 terrible_measures_6: "$terrible_measures_1$"
 terrible_measures_6_desc: "$terrible_measures_1_desc$"
 terrible_measures_7: "$terrible_measures_1$"
 terrible_measures_7_desc: "$terrible_measures_1_desc$"
 terrible_measures_8: "$terrible_measures_1$"
 terrible_measures_8_desc: "$terrible_measures_1_desc$"
 preserve_planet: "Планета-заповедник"
 preserve_planet_desc: "Этот мир был объявлен охраняемой природной территорией. Здесь запрещена добыча минералов и любое промышленное производство. Гражданское общество приняло на себя обязательства тщательно следить за сохранением уникальной природы этого места."
 civil_disobedience: "Гражданское неповиновение"
 civil_disobedience_desc: "Гражданское общество в империи очень остро отреагировало на отказ об особой охране экосистемы этого уникального места. На планете проходят активные акции протеста защитников природы."
 rejected_beauty: "Отвергнутая красота"
 rejected_beauty_desc: "Жители империи раздосадованы новостями, которые транслируют защитники природы. Красочные репортажи с экзотической планеты о том, что очередной прекрасный уголок в галактике, будет потерян навсегда, нагнетают тоску и уныние."
 environmentalists_protests: "Протесты защитников природы"
 environmentalists_protests_desc: "Акции протестов защитников природы приобрели серьёзный оборот в этом мире. Активисты атакуют предприятия и блокируют производство. На планете разгорается недовольство."
 
 