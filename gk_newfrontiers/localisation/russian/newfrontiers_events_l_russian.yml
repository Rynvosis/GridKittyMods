 newfrontiers_action.4.desc: "§Y[From.GetName]§! обладает высоким давлением и атмосферой, токсичной для большинства форм жизни. Тем не менее, здесь сложился процветающий биоценоз, использующий в качестве растворителя аммиак вместо воды. Развитие жизни пошло по экологической модели, существенно отличающейся от тех, что нам известны. Её изучение существенно расширит наши познания в ксенобиологии."
 
 
