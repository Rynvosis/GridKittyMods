 newfrontiers.8.name: "New Frontiers: выбор стартового подкласса планеты"
 newfrontiers.8.desc: "Мод §WNew Frontiers§! создает большое разнообразие видов планет, не добавляя множество новых планетарных классов. Вместо этого, уже выбранный вами стандартный класс планеты может иметь несколько различных подклассов с собственным внешним видом и особыми характеристиками.\n\nПодклассы бывают нескольких типов: §Bнормальный§!, §Rэкстремальный§! и §Gрайский§!.\n\nНиже представлен список доступных вариантов для вашего стартового класса."
