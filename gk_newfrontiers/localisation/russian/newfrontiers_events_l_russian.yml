 newfrontiers_terraforming_event.27.name: "[Target.GetName]: Фригидный мир"
 newfrontiers_terraforming_event.27.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение температуры привело к образованию сурового каменистого мира, скованного постоянными морозами. Большая часть планеты представляет собой замерзшие пустоши, продуваемые холодными ветрами. Немногочисленные формы жизни в основном обитают в горных пещерах."
 newfrontiers_terraforming_event.28.name: "[Target.GetName]: Мир морен"
 newfrontiers_terraforming_event.28.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение температуры привело к образованию мира, замкнутого в цикле коротких периодов оледенения и потепления. В результате ледниковый щит планеты находится в постоянном движении. Большая часть поверхности планеты представляет собой подвижный слой осколков горных пород и льда."
 newfrontiers_terraforming_event.29.name: "[Target.GetName]: Мир айсбергов"
 newfrontiers_terraforming_event.29.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение температуры привело к образованию океанического мира, который стремительно освобождается от ледяного плена. Шельфовые ледники на полюсах постоянно порождают множество айсбергов, некоторые из которых могут достигать несколько километров в диаметре."
 newfrontiers_terraforming_event.30.name: "[Target.GetName]: Таежный мир"
 newfrontiers_terraforming_event.30.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение температуры привело к образованию мира, с относительно умеренным сезонным климатом и влажностью. Благодаря чему эта планета обладает обширным лесным покровом в экваториальной зоне. Суровые таежные леса хорошо приспособлены к продолжительным зимам. Ближе к полюсам встречается множество областей лесотундры и болот, которые сменяются мерзлыми пустошами."
 newfrontiers_terraforming_event.31.name: "[Target.GetName]: Мир плато"
 newfrontiers_terraforming_event.31.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение температуры привело к образованию холодного мира, в котором большая часть поверхности представляет собой обширные плато, изрезанные ущельями и разделённые лощинами. Возвышенные пространства отлично подходят для электростанций, а открытые эрозией месторождения упрощают разработку минералов."
 newfrontiers_terraforming_event.32.name: "[Target.GetName]: Бореальный мир"
 newfrontiers_terraforming_event.32.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение температуры привело к образованию мира с умерено холодным климатом. Бурные реки и скрытые в глубинах отступающих ледников геотермальные зоны послужат хорошим источником энергии. Низкая температура и не богатые промерзшие земли очень суровы и лишь хвойные растения смогли здесь выжить и стать главенствующими в этом мире, конкурируя с разными мхами и лишайниками."
 newfrontiers_terraforming_event.33.name: "[Target.GetName]: Мир меза"
 newfrontiers_terraforming_event.33.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение температуры привело к образованию мира в котором частое, а порою непредсказуемое, изменение теплых и холодных сезонов, приводит к сильным ветрам и засухе. Постоянное выветривание превратило рельеф планеты в изрезанные каньонами плато и обширные формации столовых гор. Скудная биосфера планеты процветает лишь вблизи редких водоемов в приполярной зоне."
 newfrontiers_terraforming_event.34.name: "[Target.GetName]: Атолловый мир"
 newfrontiers_terraforming_event.34.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение температуры привело к образованию мира в котором нет крупных континентов, однако из-под его водной глади всегда поднимались сотни и тысячи вулканов. Постепенно угасающие, они размывались и с участием кораллов превращаясь в прекрасные атоллы. Почти равномерно распространённые от одного полюса до другого, эти атоллы представляют собой настоящий тропический рай."
 newfrontiers_terraforming_event.35.name: "[Target.GetName]: Мир вельд"
 newfrontiers_terraforming_event.35.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение температуры привело к образованию мира с полузасушливым субтропическим климатом и преимущественно горным ландшафтом, который подобен лоскутному одеялу из пышных прибрежных прерий, затопленных лугов, жарких саванн и пустынных плато. Местная биосфера формируется вокруг некоторых видов деревьев, которые развивают обширную корневую систему, чтобы компенсировать продолжительные засушливые сезоны. Обширная корневая система с трудом может существовать дольше нескольких десятилетий, но те, которые продолжают расти, позволяют деревьям развиваться в мега-акации и создавать вокруг себя подобие оазисов с постоянными очагами цветущей жизни."
 newfrontiers_terraforming_event.36.name: "[Target.GetName]: Болотный мир"
 newfrontiers_terraforming_event.36.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение температуры привело к образованию мира мрачных болот, ядовитых испарений и каменноугольных лесов. На планете почти нет открытых источников воды, а гидросфера представляет из себя бесконечные болота и затопленные джунгли с небольшими илистыми островками. Благодаря таким условиям этот мир является отличным источником различных газов органического происхождения."
 newfrontiers_terraforming_event.37.name: "[Target.GetName]: Мир дюн"
 newfrontiers_terraforming_event.37.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение температуры привело к образованию мира, целиком состоящего из бесконечного песчаного моря дюн с редкими горными хребтами. Здесь полностью отсутствуют открытые источники воды. Воду можно найти только в скудных полярных шапках и глубоко под землей. Частые песчаные бури бывают очень сильными и разрушительными."
 newfrontiers_terraforming_event.38.name: "[Target.GetName]: Мир мегафлоры"
 newfrontiers_terraforming_event.38.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение температуры привело к образованию мира душных, густых джунглей и гигантских ползучих корней покрывающих всю поверхность. Богатая флора этого мира проявляет невероятное упорство и скорость роста, в попытках завладеть любым свободным участком пространства. В условиях такого агрессивного распространения местной растительности, развитие и поддержание инфраструктуры представляется весьма сложной задачей."
 newfrontiers_terraforming_event.39.name: "[Target.GetName]: Мезоциклонный мир"
 newfrontiers_terraforming_event.39.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение температуры привело к образованию равнинного мира с сильными перепадами давления в атмосфере. Которые приводят к частому образованию множества воздушных вихрей различных размеров. В этом суровом мире разрушительных торнадо выживают только самые выносливые формы жизни."
 newfrontiers_terraforming_event.40.name: "[Target.GetName]: Адиабатический мир"
 newfrontiers_terraforming_event.40.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение влажности привело к образованию мира, где чересчур активное горообразование в прошлом заключило в ловушку изначально скудную гидросферу планеты. В результате постоянных процессов охлаждения и сжатия влаги в верхних частях атмосферы, большая часть планеты находится в дождевой тени. Редкая жизнь существует вблизи водоемов, в то время как 90% поверхности представляет собой очень сухую пустыню."
 newfrontiers_terraforming_event.41.name: "[Target.GetName]: Мир пыли"
 newfrontiers_terraforming_event.41.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение влажности привело к образованию крайне засушливого мира, который подвергся чудовищной деградации почвенного покрова, из-за чего поверхность пострадала от непрерывной и бесконтрольной ветряной эрозии. Могучие ветра стачивают горы и периодически поднимают огромные пылевые бури, способные погрузить во мрак всю планету."
 newfrontiers_terraforming_event.42.name: "[Target.GetName]: Мир-оазис"
 newfrontiers_terraforming_event.42.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение влажности привело к образованию пустынного мира, который обладает единственным океаном, занимающим примерно 15% поверхности. Остальная часть планеты покрыта обширными пустынными биомами, куда практически не выпадают осадки.  На побережье внутреннего моря изобилует растительность, которая порою может распространятся далеко в глубь материковой части планеты."
 newfrontiers_terraforming_event.43.name: "[Target.GetName]: Мир топей"
 newfrontiers_terraforming_event.43.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение влажности привело к образованию холодного мира, практически не имеющего твердой почвы для строительства. Вся поверхность планеты покрыта торфяными болотами и грязными озерами. Несмотря на холодный, суровый климат планеты, высокая влажность и плодородная почва делают этот мир привлекательным для сельского хозяйства."
 newfrontiers_terraforming_event.44.name: "[Target.GetName]: Средиземноморский мир"
 newfrontiers_terraforming_event.44.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение влажности привело к образованию засушливого каменистого мира с несколькими крупными внутренними морями, побережья которых в меньшей степени страдают от жаркого климата. Множество плодородных регионов сосредоточено в приморских областях, где преобладает умеренный климат с редкими сухими сезонами."
 newfrontiers_terraforming_event.45.name: "[Target.GetName]: Горный мир"
 newfrontiers_terraforming_event.45.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение влажности привело к образованию холодного мира, большая часть поверхности которого представляет собой очень запутанную систему горных хребтов. Эти горные массивы формируют рельеф из котловин, плато и долин с внутренними морями. Для этого мира характерны сильные перепады высот и почти полное отсутствие обширных равнин."
 newfrontiers_terraforming_event.46.name: "[Target.GetName]: Степной мир"
 newfrontiers_terraforming_event.46.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение влажности привело к образованию мира, который почти полностью лишен деревьев. Поверхность покрыта множеством внутренних морей, которые отделены бескрайними равнинами травянистых лугов и степных пастбищ."
 newfrontiers_terraforming_event.47.name: "[Target.GetName]: Снежный мир"
 newfrontiers_terraforming_event.47.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение влажности привело к образованию горного мира в котором большая часть равнинных поверхностей, свободных от обширных горных хребтов, покрыта ледниками. В экваториальной зоне преобладает умеренный бореальный климат с неравномерными сезонными перепадами температур. Внутренние моря подолгу сохраняют тепло, а горные цепи сдерживают холодные потоки воздуха.  Таким образом возникают постоянные перепады атмосферного давления. На планете происходит постоянная борьба холодных ледниковых и теплых экваториальных воздушных масс, которые порождают сильные снежные бури."
 newfrontiers_terraforming_event.48.name: "[Target.GetName]: Лесной мир"
 newfrontiers_terraforming_event.48.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение влажности привело к образованию мира с лесами и джунглями из гигантских деревьев, которые своими кронами могут задевать облака. Бескрайние леса представляют собой сеть и имею уровневую структуру. Животный мир так же разнообразен, но зачастую становится кормом для хищных растений. Которые присутствуют в избытке на этой планете."
 newfrontiers_terraforming_event.49.name: "[Target.GetName]: Мир рифов"
 newfrontiers_terraforming_event.49.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение влажности привело к образованию океанического мира почти не имеющего водных глубин. Вся поверхность планеты представляет собой мелководные океаны со сложными системами скалистых рифов вулканического происхождения."
 newfrontiers_terraforming_event.50.name: "[Target.GetName]: Муссонный мир"
 newfrontiers_terraforming_event.50.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение влажности привело к образованию мира, где необычное расположение суши и океанов создаёт регулярные сезонные изменения направлений ветров. Летом глубины континентов обильно орошаются осадками и даже полностью затапливаются, а зимой, наоборот, наступает сухой климат. Этот мир можно было бы назвать практически идеальным для жизни, если бы не регулярные и опустошительные ураганы и тайфуны, порождаемые этими ветрами."
 newfrontiers_terraforming_event.51.name: "[Target.GetName]: Ледниковый мир"
 newfrontiers_terraforming_event.51.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение влажности привело к образованию мира в котором значительная часть поверхности покрыта огромным ледяным панцирем. Здесь царит невероятный холод, а смертоносные снежные бури не дают развиваться и без того скудной биосфере. Безжизненный пейзаж из ледяных скал изредка перемежается обветренными утесами, открывая доступ к редким минералам под поверхностью планеты."
 newfrontiers_terraforming_event.52.name: "[Target.GetName]: Панталассический мир"
 newfrontiers_terraforming_event.52.desc: "В результате продолжительного терраформирования климат на планете [Target.GetName] претерпел перемены. Изменение влажности привело к образованию океанического мира полностью лишенного суши. Вся поверхность планеты покрыта цельным океаном, который постоянно находится в движении и редко бывает спокойным. Возведение зданий на этой планете возможно только на глубине, под водной поверхностью, или на специально сооруженных плавучих платформах."
 newfrontiers_terraforming_event.53.name: "[Target.GetName]: Карстовый мир"
 newfrontiers_terraforming_event.53.desc: "В процессе терраформирования океанической планеты [Target.GetName] произошла досадная ошибка, которая привела к катастрофе. Гидросфера планеты стала стремительно испарятся, обнажив покрытую глубокими шрамами и кавернами поверхность. Теперь вся планета покрыта гигантскими ущельями и огромной сетью пещер, которые значительно упрощают доступ к полезным ископаемы. При этом наличие такого огромного количества скрытых мест так же привлечет множество пиратских и террористических группировок."
 UNEXPECTED_RESULT: "Неожиданный результат…"
 newfrontiers_terraforming_event.55.name: "[Target.GetName]: Эффузивный мир"
 newfrontiers_terraforming_event.55.desc: "В результате геологического вмешательства облик планеты [Target.GetName] претерпел большие перемены. Из множества вулканических расщелин этого мира вырываются ядовитые испарения серы и других газов."
 newfrontiers_terraforming_event.56.name: "[Target.GetName]: Первобытный мир"
 newfrontiers_terraforming_event.56.desc: "В результате геологического вмешательства облик планеты [Target.GetName] претерпел большие перемены. Теперь буйные джунгли этого мира, могут резко сменится мертвыми пустошами. Потоки лавы вырывающиеся из недр планеты растекаются по долинам и каньонам, поглощая некогда цветущий край, и превращая его в адский пейзаж."
 newfrontiers_terraforming_event.57.name: "[Target.GetName]: Геотермальный мир"
 newfrontiers_terraforming_event.57.desc: "В результате геологического вмешательства облик планеты [Target.GetName] претерпел большие перемены. Множество областей этого мира полностью освободилось от ледяного покрова. Теперь это планета горячих источников и частых гейзеров, где ледниковые пустоши соседствуют с пышными джунглями."
 newfrontiers_terraforming_event.58.name: "[Target.GetName]: Соляной мир"
 newfrontiers_terraforming_event.58.desc: "В процессе терраформирования океанической планеты [Target.GetName] произошла досадная ошибка, которая привела к катастрофе. Гидросфера планеты стала стремительно испарятся. Теперь немногая оставшаяся влага пересолена до предела, а на месте океанов бесконечные соляные плато, накалённые жарким воздухом и пригодные только для экстремофильных организмов."
 newfrontiers_terraforming_event.59.name: "[Target.GetName]: Суперконтинентальный мир"
 newfrontiers_terraforming_event.59.desc: "В процессе геологического вмешательства на планете [Target.GetName] произошла досадная ошибка, которая привела к катастрофе. Тектонические плиты неожиданно пришли в движение и облик планеты изменился до неузнаваемости. В течение недель непрекращающихся и разрушительных землетрясений все континенты этого объединились в один суперконтинент. Теперь жизнь процветает в основном на побережьях морей. В глубине континента, вдали от плодородных долин рек раскинулись испепеляемые солнцем сухие степи и полпустыни. Они тянутся на многие тысячи километров, продуваемые чудовищными ветрами."
 newfrontiers_terraforming_event.60.name: "[Target.GetName]: Минеральный мир"
 newfrontiers_terraforming_event.60.desc: "В процессе геологического вмешательства на планете [Target.GetName] произошла досадная ошибка, которая привела к катастрофе. Тектонические плиты неожиданно пришли в движение и облик этой горной планеты изменился до неузнаваемости. В течение недель непрекращающихся и разрушительных землетрясений сформировались новые горные массивы из богатых рудами скальных образований, имеющих преимущественно кристаллическую структуру. В то же время, теперь этот мир практически лишен мягкого почвенного покрова, а суровые климатические условия не дают активно развиваться биосфере планеты."
 newfrontiers_terraforming_event.61.name: "[Target.GetName]: Грибной мир"
 newfrontiers_terraforming_event.61.desc: "В процессе озеленения планеты [Target.GetName] произошла ошибка. Состав микроэлементов, которыми мы обрабатывали почву привел к мутации местных грибковых форм. В результате все другие виды жизни были почти полностью вытеснены грибами. Теперь поверхность этого холодного мира представляет собой множество островков бурной жизни, состоящих из лесов гигантских грибов, разделенных заболоченной тундрой и ветреными пустошами."
 newfrontiers_terraforming_event.62.name: "[Target.GetName]: Молодой мир"
 newfrontiers_terraforming_event.62.desc: "В результате продолжительного терраформирования облик планеты [Target.GetName] претерпел перемены. Поверхность планеты представляет собой бескрайние каменистые пустоши и пепловые долины с активными вулканами, а в глубинах океанов развиваются сложные формы жизни."
 newfrontiers_terraforming_event.63.name: "[Target.GetName]: Мир лавы"
 newfrontiers_terraforming_event.63.desc: "В результате продолжительного терраформирования облик планеты [Target.GetName] претерпел перемены. Вся поверхность этой планеты представляет собой огромный лавовый котел. Сотни вулканов, одновременно выбрасывают на поверхность магму, которая растекается по поверхности и формирует целые моря раскаленной породы. Из-за загрязнения вулканическими выбросами скудная азотно-кислородная атмосфера почти не пригодна для дыхания."
 newfrontiers_terraforming_event.64.name: "[Target.GetName]: Мир пепла"
 newfrontiers_terraforming_event.64.desc: "В результате продолжительного терраформирования облик планеты [Target.GetName] претерпел перемены. Этот скалистый мир переживает острую фазу глобальной вулканической зимы. Активные тектонические процессы на планете прекратились, но атмосфера сильно загрязнена пеплом и сернистыми газами. Плотный покров вулканических выбросов привел к антипарниковому эффекту и солнечный свет почти не достигает поверхности."
 newfrontiers_terraforming_event.65.name: "[Target.GetName]: Архейский мир"
 newfrontiers_terraforming_event.65.desc: "В результате продолжительного терраформирования облик планеты [Target.GetName] претерпел перемены. Эта планета находится на очень раннем этапе формирования органической жизни. Благодаря фотосинтезу микробиоты, активно развивающейся в неглубоких морях, сформировалась устойчивая азотно-кислородная атмосфера. Продолжающийся рост насыщения атмосферы кислородом однажды приведет к кислородной катастрофе и наступлению глобального оледенения."
 newfrontiers_terraforming_event.66.name: "[Target.GetName]: Стерильный мир"
 newfrontiers_terraforming_event.66.desc: "В результате продолжительного терраформирования облик планеты [Target.GetName] претерпел перемены. Этот каменистый мир с азотно-кислородной атмосферой практически лишен жизни. Экстремальные условия на поверхности обусловлены резким перепадом температур и атмосферой с примесями различных вредных газов от вулканической активности."
 newfrontiers_terraforming_event.67.name: "[Target.GetName]: Эоловый мир"
 newfrontiers_terraforming_event.67.desc: "В процессе изменения климата на планете [Target.GetName] произошла досадная ошибка, которая привела к катастрофе. Волна чудовищных ураганов пронеслась по всей поверхности этого мира сметая все на своем пути. Недели непрекращающейся эрозии вулканических пород, создали причудливые искажения массивов скал. Бушующие здесь песчаные бури крайне разрушительны из-за крупных и острых песчинок, которые разгоняются ураганным ветром до такой скорости, что способны деформировать даже самые прочные конструкции."
 newfrontiers_terraforming_event.68.name: "[Target.GetName]: Мир лавы"
 newfrontiers_terraforming_event.68.desc: "В процессе геологического вмешательства на планете [Target.GetName] произошла досадная ошибка, которая привела к катастрофе. Вся поверхность этого мира превратилась в огромный лавовый котел. Сотни вулканов, одновременно выбрасывают на поверхность магму, которая растекается по поверхности и формирует целые моря раскаленной породы. Из-за загрязнения вулканическими выбросами скудная азотно-кислородная атмосфера почти не пригодна для дыхания."
 newfrontiers_terraforming_event.71.name: "[Target.GetName]: Радиоактивный мир"
 newfrontiers_terraforming_event.71.desc: "В результате процесса восстановления экосистемы облик планеты [Target.GetName] претерпел перемены. Этот мир еще больше погрузился в пучину ядерного апокалипсиса, который вызвал цепную реакцию, стремительно разрушающую экосистему планеты. Масштабное радиоактивное загрязнение окружающей среды привело к почти полному вымиранию жизни. Здесь практически не осталось мест, которых не коснулась бы техногенная катастрофа. Планета находится на грани уничтожения."
 newfrontiers_terraforming_event.72.name: "[Target.GetName]: Мир-гробница"
 newfrontiers_terraforming_event.72.desc: "В результате процесса восстановления экосистемы облик планеты [Target.GetName] претерпел перемены. Сейчас здесь царит ядерная зима, и в атмосфере содержится большое количество частиц сажи. Сильное радиоактивное излучение на поверхности. Минимальные признаки жизни."
 newfrontiers_terraforming_event.73.name: "[Target.GetName]: Мир-пустоши"
 newfrontiers_terraforming_event.73.desc: "В результате процесса восстановления экосистемы облик планеты [Target.GetName] претерпел перемены. Великая война, уничтожившая большую часть жизни, давно отгремела на этой планете. Почти вся поверхность превратилась в жаркую пустыню, истязаемую пылевыми бурями, а в некоторых областях этого мира все еще сохраняется высокий радиационный фон."
 newfrontiers_terraforming_event.74.name: "[Target.GetName] больше не мертвый мир!"
 newfrontiers_terraforming_event.74.desc: "Проект создания экосистемы на планете [Target.GetName] был успешно завершен! Теперь здесь есть устойчивая и постоянно развивающаяся биосфера, Буйные джунгли и зеленые луга повсюду, несмотря на все еще активную тектонику этого молодого мира."
 
 newfrontiers_terraforming_event.200.name: "[Root.GetName]: Значительные последствия экспорта воды"
 newfrontiers_terraforming_event.200.desc.monsoon: "Значительные потери водных ресурсов, для проектов терраформирования непригодных для обитания миров, привели к ощутимым изменениям климата планеты [Root.GetName]. Изменение влажности привело к образованию парникового эффекта, благодаря которому на всей поверхности царит жаркий климат. Чрезмерная растительность и болота покрывают всю планету."
 newfrontiers_terraforming_event.200.desc.swamp: "$newfrontiers_terraforming_event.200.desc.monsoon$"
 newfrontiers_terraforming_event.200.desc.panthalassic: "Значительные потери водных ресурсов, для проектов терраформирования непригодных для обитания миров, привели к ощутимым изменениям климата планеты [Root.GetName]. Изменение влажности привело к образованию водного мира с умеренным климатом. Почти вся поверхность покрыта бескрайними океанами с россыпью множества островных архипелагов."
 newfrontiers_terraforming_event.200.desc.storm: "$newfrontiers_terraforming_event.200.desc.panthalassic$"
 newfrontiers_terraforming_event.200.desc.snow: "Значительные потери водных ресурсов, для проектов терраформирования непригодных для обитания миров, привели к ощутимым изменениям климата планеты [Root.GetName]. Изменение влажности привело к образованию холодного мира с множеством горных регионов. Высокие снежные пики разделяют долины с замершими озерами, где способны выживать морозоустойчивые растения."
 