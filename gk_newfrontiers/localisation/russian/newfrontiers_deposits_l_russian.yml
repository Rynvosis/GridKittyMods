l_russian:

 #bloker deposits

 d_dune_sea: "Дюнное море"
 d_dune_sea_desc: "Огромное дюнное море раскинулось на многие сотни километров, покрывая этот регион движущимися песками."
 d_thick_forest: "Дремучий лес"
 d_thick_forest_desc: "Этот суровый регион покрывают густые хвойные леса и заболоченный бурелом, которые очень трудно преодолеть."
 d_large_ice_ridge: "Большой торос"
 d_large_ice_ridge_desc: "Этот ледяной барьер вздымается высоко вверх подобно горному хребту."
 d_blocked_tunnell: "Заваленный тоннель"
 d_blocked_tunnell_desc: "Этот природный тоннель обрушился и заблокировал проход, ведущий в обширную пещеру."
 d_ice_crust: "Ледянной панцирь"
 d_ice_crust_desc: "За этим ледянным покровом скрывается естественная ледниковая пещера."
 d_industrial_boneyard: "Индустриальное кладбище"
 d_industrial_boneyard_desc: "Этот регион покрыт множеством заброшенных металлических конструкций и свалками радиоактивных отходов."
 d_igneous_traps: "Магматические траппы"
 d_igneous_traps_desc: "Из многочисленных трещин этого региона постоянно изливаются колоссальные потоки лавы, заполняя огромные площади. Лавовые реки сначала заполняют ущелья и естественные углубления, а затем растекаются на равнинных участках."
 d_exofungus_contamination: "Экзогрибковое заражение"
 d_exofungus_contamination_desc: "$exofungus_blocker_desc$"
 
 #event bloker deposits
 
 d_rusty_debris: "Ржавые обломки"
 d_rusty_debris_desc: "Гигантские горы обломков древних механизмов – мрачные свидетельства давних сражений примитивных машин."
 d_giant_fossils: "Гигантские окаменелости"
 d_giant_fossils_desc: "Обширное кладбище костей огромных органических существ, которые населяли этот, некогда цветущий, мир."
 
 d_turbulent_currents: "Бурное течение"
 d_turbulent_currents_desc: "В этом регионе океана наблюдается очень сильное и постоянное течение."
 d_underground_springs: "Подземные источники"
 d_underground_springs_desc: "В эти пещеры представляют собой термальные источники подземных вод, которые подогреваются недрами планеты."
 d_salt_flat: "Солончак"
 d_salt_flat_desc: "Некогда здесь был океан, теперь на многие сотни километров вокруг здесь только безжизненная соленая равнина."
 d_peat_moors: "Торфяные топи"
 d_peat_moors_desc: "Эти обширные болота представляют собой богатое месторождение торфа, который может служить отличным топливом для энергостанций."
 d_submerged_gas_eruption: "Подводные выбросы газа"
 d_submerged_gas_eruption_desc: "В этом регионе океанического дна происходит высвобождение различных газов, которые скапливаются под поверхностью в результате внутренних геологических процессов планеты."
 d_ice_geyser: "Ледяной гейзер"
 d_ice_geyser_desc: "В этом месте из-под ледниковой корки планеты на поверхность под давлением выбрасываются огромные фонтаны воды."
 d_gaseous_eruption: "Газовые испарения"
 d_gaseous_eruption_desc: "Из гигантских разломов происходит выброс различных газов, которые скапливаются под поверхностью планеты в результате геологических процессов."
 d_scorched_badlands: "Выжженные бесплодные земли"
 d_scorched_badlands_desc: "В этом регионе никогда не наступает ночь. Палящее солнце нагревает поверхность и воздух до чудовищных температур, делая этот регион безжизненным, но это место имеет огромный энергетический потенциал."
 d_offshore_fields: "Шельфовые месторождения"
 d_offshore_fields_desc: "Это океаническое плато богатое полезными ископаемыми поднялось из глубины на мелководье в результате геологических процессов."
 d_abundant_atoll: "Изобилующий атолл"
 d_abundant_atoll_desc: "В глубине этого древнего кораллового образования накоплено множество ценных минералов."
 d_rich_lodes: "Богатые залежи"
 d_rich_lodes_desc: "Этот регион подземных пещер изобилует месторождениями различных полезных ископаемых."
 d_seagrass_shelf: "Морская трава"
 d_seagrass_shelf_desc: "Этот регион мелководья покрывают огромные поля морской травы."
 d_kelp_forest: "Лес водорослей"
 d_kelp_forest_desc: "Эта область океана является уникальным биомом с большим разнообразием морской флоры и фауны."
 d_estuary_meadows: "Лиманные луга"
 d_estuary_meadows_desc: "Обширные дельты рек этого региона образуют большие орошаемые поля, которые отлично подходят для сельского хозяйства."
 d_huge_tree: "Огромное дерево"
 d_huge_tree_desc: "Исполинские деревья колоссальных размеров сами по себе являются уникальными биомами, с удивительным разнообразием жизни."
 d_underground_reservoir: "Подземный водоем"
 d_underground_reservoir_desc: "На берегах и под поверхностью этого подземного озера образовался удивительный цветущий разнообразием биом."
 
 #rare deposits
 
 d_great_vortex: "Большой вихрь"
 d_great_vortex_desc: "Значительная циркуляция воздушных масс в этом регионе, породила гигантский торнадо."
 d_stormy_water: "Штормовые воды"
 d_stormy_water_desc: "Пересечение воздушных потоков в этом регионе океана, образует чудовищную бурю."
 d_sand_worm: "Песчаный червь"
 d_sand_worm_desc: "У этой бескрайней пустыни есть хозяин, которого лучше не беспокоить."
 d_grand_canyon: "Великий каньон"
 d_grand_canyon_desc: "Глубокий, живописный каньон со множеством ответвлений и ущелий, протянулся на тысячи километров."
 d_vast_crevasse: "Обширная расселина"
 d_vast_crevasse_desc: "В массивном панцире реликтового ледника образовалась глубокая трещина."
 d_maze_cliff_formations: "Скальный лабиринт"
 d_maze_cliff_formations_desc: "Эрозия вулканических пород на мелководье, создала причудливые скальные рельефы. Морской прибой и множество гротов образуют густой туман, затянувший всю местность."
 d_boneyard: "Кладбище костей"
 d_boneyard_desc: "Множество костей гигантских обитателей этого мира, хранят тайну давно минувшей катастрофы."
 d_ancient_ruins: "Древние руины"
 d_ancient_ruins_desc: "В этой долине до самого края горизонта раскинулись причудливые строения давно забытой эпохи."
 d_relic_landfill: "Реликтовая свалка"
 d_relic_landfill_desc: "Горы технологического мусора, брошены здесь какой-то древней высокоразвитой цивилизации."
 d_levitating_rocks: "Парящие скалы"
 d_levitating_rocks_desc: "Неизученные физические процессы, заставляют эти массивные скалы хаотично парить над поверхностью."
 d_karst_cave: "Карстовая пещера"
 d_karst_cave_desc: "Обширная сеть глубоких подземных пещер с собственной экосистемой."
 d_serene_coastline: "Безмятежное побережье"
 d_serene_coastline_desc: "Завораживающая природа, золотистые пляжи и манящий океан. Это необычайно красивое место отлично подходит для отдыха."
 
 #starting deposits
 
 d_solar_array: "Комплекс солнечных батарей"
 d_solar_array_desc: "Обширные территории, покрытые бесчисленным количеством зеркал солнечных энергостанций."
 d_urban_agglomeration: "Городская агломерация"
 d_urban_agglomeration_desc: "Множество мегаполисов планеты соединились в единый инфраструктурный кластер."
 d_reactor_zone: "Реакторная зона"
 d_reactor_zone_desc: "Вся инфраструктура этого региона направлена на поддержание стабильного функционирования мощных термоядерных реакторов."
 d_reserve_deposits: "Резервные месторождения"
 d_reserve_deposits_desc: "Некоторые открытые месторождения планеты были законсервированы и долгое время оставались не тронутыми."
 d_deep_ore_mines: "Глубокие рудные шахты"
 d_deep_ore_mines_desc: "Крупная инфраструктурная сеть для добычи полезных ископаемых из недр планеты."
 d_rich_abyss: "Богатая бездна"
 d_rich_abyss_desc: "В самых глубоких областях океана находится огромное количество нетронутых запасов полезных ископаемых."
 d_hydroponic_complex: "Гидропонный комплекс"
 d_hydroponic_complex_desc: "Эти агрокультурные сооружения способны выращивать различные пищевые культуры без необходимости в плодородной почве."
 d_agrothermal_plains: "Агротермальные равнины"
 d_agrothermal_plains_desc: "При помощи специальных мер термальной мелиорации этот холодный регион был преобразован для сельского хозяйства."
 d_converted_lands: "Преобразованные земли"
 d_converted_lands_desc: "Эти территории были очищены от джунглей и превращены в плодородные поля с удобрениями."
 d_irrigated_fields: "Орошаемые поля"
 d_irrigated_fields_desc: "Инфраструктура этого, некогда пустынного региона, направлена на поддержание достаточного количества воды для почвы."
 d_agrarian_dome: "Аграрный купол"
 d_agrarian_dome_desc: "Этот купол создан специально, чтобы поддерживать благоприятный климат и почву для сельскохозяйственных нужд."
 d_algae_tracts: "Водорослевые пространства"
 d_algae_tracts_desc: "$d_pacific_algae_tracts_desc$"
 
 #special deposits
 
 d_subway_tunnel_network: "Сеть тоннелей метро"
 d_subway_tunnel_network_desc: "Эта старая сеть подземных тоннелей, оставшаяся от прежних владельцев планеты и покрывающая всю планету, теперь служит укрытием от радиоактивных дождей на поверхности."
 d_remains_of_ark: "Останки Ковчега"
 d_remains_of_ark_desc: "Эта часть Ковчега, которая высадилась на планету и основала новую колонию. Это место имеет большое значение и является напоминанием о прошлом цивилизации, заселившей этот мир."
 d_settler_camp: "Лагерь поселенцев"
 d_settler_camp_desc: "Обитатели Rовчега возвели это обширное поселение в короткие сроки из подручных материалов."
 d_cloud_platform: "Облачная платформа"
 d_cloud_platform_desc: "Это громадное инфраструктурное сооружение возвышается на безопасном расстоянии от поверхности, покрытой смертоносными испарениями."
 d_ancient_temple_ruins: "Руины древнего храма"
 d_ancient_temple_ruins_desc: "Таинственный храм старых богов привлекает пилигримов, ученых и представителей различных сект."
 d_enigmatic_remnants: "Загадочные останки"
 d_enigmatic_remnants_desc: "Занесенные песком обширные руины агломерата древних городов забытой эпохи – мечта любого археолога."
 d_medicinal_algae: "Лечебные водоросли"
 d_medicinal_algae_desc: "В этом регионе обнаружен уникальный вид водорослей, чьи целебные свойства превосходят многие современные медицинские препараты. Этот ценный ресурс значительно увеличивает торговый оборот планеты и отрывает простор для работы биологов и фармацевтической отрасли."
 d_nature_preserve: "Природный заповедник"
 d_nature_preserve_desc: "Этот регион с уникальной экосистемой находится под защитой природоохранных организаций."
 has_preserve_planet: "$TRIGGER_FAIL$§RЭто препятствие будет неустранимым, пока существует §Y$preserve_planet$§!.§!"
 d_crystalline_array: "Кристаллический массив"
 d_crystalline_array_desc: "Огромные кристаллические образования в этом регионе абсолютно уникальны и не имеют аналогов в галактике. Это место содержит практически неисчерпаемый ресурс редких кристаллов и минералов."
 d_gemstone_quarry: "Карьер драгоценных камней"
 d_gemstone_quarry_desc: "Открытая разработка редких минералов в этом месте делает эту планету поистине бесценной."
 
 
 #event deposits
 
 d_collapsed_caves: "Обрушенная пещера"
 d_collapsed_caves_desc: "В этой подземной области произошло обрушение и завал тоннелей."
 d_sunken_cavity: "Затонувшая полость"
 d_sunken_cavity_desc: "Этот регион ледниковых пещер был полностью затоплен океаническими водами."
 d_troubled_waters: "Беспокойные воды"
 d_troubled_waters_desc: "Активная деятельность левиафанов в этой области привела к серьезным аномалиям водных течений и появлению водоворотов."
 d_dooms_rift: "Роковой разлом"
 d_dooms_rift_desc: "Множество левиафанов выбралось из-под земли в этом регионе, оставив после себя разрушения."
 d_destruction_marks: "Следы разрушений"
 d_destruction_marks_desc: "Стада левиафанов, которые прошли в этой области оставили после себя множественные разрушения."
 
