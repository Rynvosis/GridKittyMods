l_russian:
  
  ####################################
  # Planet Decision
  ####################################

  decision_protective_equipment: "Средства защиты"
  decision_protective_equipment_desc: "Данное решение создает ряд правительственных программ для обязательного обеспечения всех колонистов в неблагоприятных мирах индивидуальными средствами защиты."
  decision_ark_project: "Запуск проекта «Ковчег»"
  decision_ark_project_desc: "Наш родной мир будет уничтожен катастрофой. Одной из мер по спасению нашей цивилизации был предложен проект «Ковчег». Огромный колониальный корабль, обеспеченный всем для долгих перелетов, отправится на поиски нового дома."
  decision_ark_project_effect_desc: "Начнет строительство космического корабля «Ковчег».\n\n§YПосле того как планета погибнет, ‘Ковчег’ станет новой империей. Если «Ковчег» колонизирует новый мир до того, как планета будет уничтожена, то будет создана новая империя. Вы будете вправе выбрать какой империей вы продолжите управлять.§!"
  decision_planetary_excavation: "Начать планетарные раскопки"
  decision_planetary_excavation_desc: "Под заросшей поверхностью этого древнего мира находятся руины огромного планетарного города. Планетарные раскопки убьют нетронутую красоту этого мира, но это первый шаг к изучению забытых технологий и восстановлению былого величия планеты."
  decision_planetary_excavation_effect_desc: "Превращает планету в §Y$pc_relic$§!."
  decision_megamicelium_assimilation: "Начать ассимиляцию мегамицелия"
  decision_megamicelium_assimilation_desc: "Этот мир будет поглощен экзогрибком и полностью перестроен для наших нужд."
  decision_megamicelium_assimilation_effect_desc: "Планета превратится в §Y$mycelium_world$§!."
  decision_infestation: "Создать зараженный регион"
  decision_infestation_desc: "Отдельные регионы планеты полностью поглощаются плесенью для быстрого роста колоний."
  decision_quarantine: "Объявить карантин"
  decision_quarantine_desc: "Это решение позволит применить все административные ресурсы чтобы изолировать этот мир и ограничить распространение болезни."
  decision_abolish_quarantine: "Отменить карантин"
  decision_abolish_quarantine_desc: "Снятие карантина отменит все меры ограничений, наложенные на эту планету."
  decision_build_cloud_platform: "Начать строительство небесной платформы"
  decision_build_cloud_platform_desc: "Строительство специальных платформ, на которых можно возводить целые города, позволит осваивать территории, покрытые ядовитыми испарениями, и откроет доступ к добыче полезных ископаемых."
  decision_demolish_cloud_platform: "Разобрать небесную платформу"
  decision_demolish_cloud_platform_desc: "Если содержание небесной платформы становится не рентабельным, ее можно утилизировать."
  decision_start_ecosystem_creation_project_effect_desc: "Запускает особый процесс терраформирования. Для прогресса вам потребуются различные сооружения для терраформирования."
  
  
  ####################################
  # Origins
  ####################################
  
  origin_subterranean: "Подземные жители"
  origin_subterranean_desc: "Изменение активности солнца превратило родной мир этой цивилизации в безжизненную пустошь и им пришлось уйти глубоко под землю. Многие столетия они рыли тоннели и строили города, пока наконец не поняли, что этот подземный склеп не может быть их домом вечно."
  origin_scavengers: "Мусорщики"
  origin_scavengers_desc: "До сих пор точно неизвестно как эта цивилизация оказалась на опустошенном мире. Абсолютно точно известно только то, что индустриальные руины не принадлежали им в прошлом. Может древние хозяева этой планеты завезли их в качестве животных или рабов, или она сами каким-то образом попали сюда. Они смогли приспособиться и быстро развивались, изучая брошенные технологии этой планеты."
  civic_tooltip_scavengers_effects: "Вы начинаете игру в §Yиндустриальном кладбище§!, на котором находятся §Y$d_subway_tunnel_network$§!.\nВы обладаете способностью получать £alloys£ §Yсплавы§! после очистки блокираторов §Y$d_industrial_boneyard$§!."
  origin_ark: "Ковчег"
  origin_ark_desc: "Родной мир этой цивилизации был уничтожен. Немногие выжившие спаслись на гигантском космическом корабле, чтобы отправится в долгое путешествие сквозь безжизненную пустоту на поиски нового дома."
  civic_tooltip_ark_effects: "Вы начнете игру с одним единственным кораблем §YКосмический ковчег§! на орбите вашего погибшего родного мира. Необходимо доставить Ковчег на орбиту пригодной для обитания планеты, которую вы хотите сделать столицей своей империи."
  civic_tooltip_exomycosis_effects: "Ваш родной мир — §Y$mycelium_world$§!.\nПредпочтительная пригодность — §Y$trait_pc_tropical_preference$§!.\nНаселение получает признак §Y$trait_molded$§!, дающий следующее:\n  $MOD_POP_ENVIRONMENT_TOLERANCE$: §G+10%§!.\n  $MOD_ARMY_MORALE_DAMAGE_MULT$: §G+30%§!.\nВы сможете превращать любые влажные миры в §Y$mycelium_world$§!."
  
  
