  building_ark: "Останки Ковчега"
  building_ark_desc: "Эта часть Ковчега, которая высадилась на планету и основала новую колонию. Внутренние комплексы в этом огромном сооружении предоставляют жилье для колонистов."
  building_pharmaceutical_production_complex: "Фармацевтический производственный комплекс"
  building_pharmaceutical_production_complex_desc: "Это сооружение использует уникальные водоросли планеты для производства более совершенных медицинских препаратов."
  
  
