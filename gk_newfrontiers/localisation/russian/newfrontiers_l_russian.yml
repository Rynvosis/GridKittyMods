  sm_stellar_reducer: "Звездный редуктор"
  sm_stellar_reducer_desc: "§YЭто устройство призвано остановить старение звезды в этой системе и тем самым предотвратить катастрофу.§!"
  
  project_ark_ship: "Космический ковчег"
  project_ark_ship_plural: "Космические ковчеги"
  
