  pc_sterile: "Стерильный мир"
  pc_sterile_desc: "Каменистый мир с азотно-кислородной атмосферой и почти полным отсутствием сложных форм жизни. Экстремальные условия на поверхности обусловлены резким перепадом температур и атмосферой с примесями различных вредных газов от вулканической активности."
  
