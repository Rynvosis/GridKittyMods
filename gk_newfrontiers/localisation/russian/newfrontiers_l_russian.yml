  trait_subterranean_desc: "§LЭта раса долгое время прожила под землей и привыкла к тесным помещениям.§!\n"
  
  trait_pc_sterile_preference: "Предпочтительный стерильный мир"
  trait_pc_sterile_preference_desc: "$trait_pc_arctic_preference_desc$"
  
  
