 trait_subterranean: "深地种"
 trait_subterranean_desc: "§L此物种在地下生活了很长时间，习惯于狭窄的空间。§!\n"
 trait_molded: "霉化"
 trait_molded_desc: "§L这些生物是一种寄宿于其他有机体的菌群。§!\n"
 trait_infected: "被感染"
 trait_infected_desc: "§L这些定居点已受到真菌感染。§!\n"
 trait_corrupted: "腐化"
 trait_corrupted_desc: "$trait_infected_desc$"
  
 trait_pc_sterile_preference: "贫瘠星球偏好"
 trait_pc_sterile_preference_desc: "$trait_pc_arctic_preference_desc$"
  
  
