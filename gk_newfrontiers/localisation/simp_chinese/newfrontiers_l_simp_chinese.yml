 sm_stellar_reducer: "恒星抑制器"
  sm_stellar_reducer_desc: "§Y这个装置被设计用来减缓恒星内核的核聚变老化——减缓恒星老化对恒星系的影响以防止灾难的发生。§!"
  
 project_ark_ship: "太空方舟"
 project_ark_ship_plural: "太空方舟"
  
