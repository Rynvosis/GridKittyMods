 infected_army: "受感染突变体"
 infected_army_desc: "这些外星霉菌怪物已经完全失去了原先的外表。"
  
  
  ####################################
  # Technology
  ####################################
  
 tech_blocked_tunnell: "高温钻孔"
 tech_blocked_tunnell_desc: "我们可以利用这项新技术将岩石加热至熔点，从而提高挖掘隧道网络的速度。"
 tech_igneous_traps: "喷发稳定化"
 tech_igneous_traps_desc: "对星球地壳内部运动的充分了解为我们提供了大规模地质作业的机会。复杂的技术能检测到可能强岩浆活动的中心和喷出岩与侵入岩的冷却区域。"
 tech_ice_crust: "冰隧道"
 tech_ice_crust_desc: "建造稳定的冰川隧道是在寒冷世界生存的必要措施。"
 tech_dune_sea: "沙旋"
 tech_dune_sea_desc: "使用针对复杂垦荒过程所研发的重型机械，是对恶劣星球地貌改造的下一步骤。自动化开垦站能够使流沙移动停滞，并将流质土壤转化为固态土壤。"
 tech_thick_forest: "生态基础设施编绘"
 tech_thick_forest_desc: "在规划季度森林网络时使用人工智能协议，可以利用星球上的资源而不致破坏脆弱的生态平衡。"
 tech_large_ice_ridge: "冰川压力调控"
 tech_large_ice_ridge_desc: "自主锁系统将允许调节寒冷星球上的大陆冰川的运动。"
 tech_igneous_traps: "喷发稳定化"
 tech_igneous_traps_desc: "对星球地壳内部运动的充分了解为我们提供了大规模地质作业的机会。复杂的技术能检测到可能强岩浆活动的中心和喷出岩与侵入岩的冷却区域。"
 tech_megamycete: "外星菌症"
 tech_megamycete_desc: "对外星真菌进行研究，可以开发出应对这种危险病原体的有效措施，并在未来用于我们自身的需求。"
 tech_invasive_necrotoxication: "侵入性坏死毒素作用"
 tech_invasive_necrotoxication_desc: "详细研究受外星真菌影响的细胞对各种坏死毒素的反应，有助于找到治疗感染者的方法。"
 tech_structural_calcification: "结构钙化"
 tech_structural_calcification_desc: "进行将毒素用于外星真菌样本的实验，确定对这些微观有机体进行即时脱水和消灭的方法，将有利于防范固体材料的侵蚀。"
 tech_cloud_platform: "云上平台"
 tech_cloud_platform_desc: "为了开发毒物星球上的封闭区域并开采资源，需要研发特殊的工程措施。"
  
  
  ####################################
  # Buildings
  ####################################
  
 building_ark: "方舟残骸"
  building_ark_desc: "这是方舟的残骸，它降落在这个星球上，一个新的殖民地由此建成。这座巨大建筑的内部综合体为殖民者提供了安栖之所。"
  building_pharmaceutical_production_complex: "Pharmaceutical Production Complex"
  building_pharmaceutical_production_complex_desc: "This facility uses the planet's unique algae to produce more advanced medical products."
  
  
