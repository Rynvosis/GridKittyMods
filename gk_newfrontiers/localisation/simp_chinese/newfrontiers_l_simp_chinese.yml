l_simp_chinese:
 
  ####################################
  # Planet Decision
  ####################################

 decision_protective_equipment: "防护装备"
 decision_protective_equipment_desc: "这些政府项目旨在为生活于恶劣环境的居民提供个人防护装备，分发供强制使用。"
  decision_ark_project: "启动方舟计划"
  decision_ark_project_desc: "我们的家园将被灾难所毁灭。拯救我们文明的措施之一是方舟计划。一艘为远航提供了所有必需品的巨大殖民船，将前往寻找一个新的家园。"
  decision_ark_project_effect_desc: "方舟飞船将开始建造。\n\n§Y在行星毁灭后，方舟将成为一个新的帝国。如果方舟在母星被摧毁之前殖民了一个新的世界，一个新的帝国将被创建。你将能够选择继续统治这个新帝国。§!"
 decision_planetary_excavation: "开始挖掘行星计划"
 decision_planetary_excavation_desc: "在这个古老世界杂草丛生的表面下，是一个巨大的行星城市的废墟。行星挖掘将破坏这个世界的原始之美，但这是研究被遗忘的技术并最终恢复这个星球昔日的伟大的第一步。"
 decision_planetary_excavation_effect_desc: "将这个行星转变为§Y$pc_relic$§!。"
 decision_megamicelium_assimilation: "开始巨型菌丝体同化"
 decision_megamicelium_assimilation_desc: "这个星球会被外星真菌吞噬，并完全按照我们的需求重塑。"
 decision_megamicelium_assimilation_effect_desc: "该星球会转变为§Y$mycelium_world$§!。"
 decision_infestation: "建立感染区"
 decision_infestation_desc: "星球上的部分区域会被霉菌完全吸收，以迅速进行殖民。"
 decision_quarantine: "宣布隔离"
 decision_quarantine_desc: "这种措施会使用所有行政资源来隔离这个星球，并限制疾病的传播。"
 decision_abolish_quarantine: "取消隔离"
 decision_abolish_quarantine_desc: "取消隔离，会移除所有施加于该星球的隔离措施。"
 decision_liquidation_of_infected: "清理感染者"
 decision_liquidation_of_infected_desc: "极端举措一旦被人知晓，就会在社会上引发不可预料的后果。但是，艰难时期也需要严苛举措。"
 decision_liquidation_of_infected_effect_desc: "摧毁所有被感染的定居点。警告！这种措施并非完全有效。一些感染者可能会躲藏起来，避免被消灭。"
 decision_purge_of_contagion: "开始消灭传染病"
 decision_purge_of_contagion_desc: "有些时候，你需要砍掉自己的手，这样你才不会失去自己的脑袋。"
 decision_purge_of_contagion_effect_desc: "毁灭所有被感染子个体。警告！这种措施并非完全有效。一些感染个体可能不会听从死亡指令。"
 decision_rejection: "开始【否决】"
 decision_rejection_desc: "破损的工具是最容易丢弃的。"
 decision_rejection_effect_desc: "摧毁所有故障子个体。警告！这种措施并非完全有效。一些故障子个体可能不会接受自毁命令。"
 decision_disinfection: "开始消毒"
 decision_disinfection_desc: "对外星真菌进行研究后所开发的一系列措施将会终止霉菌在星球上的传播并消除其后果。"
 decision_disinfection_effect_desc: "除了被感染的定居点外，星球上所有霉菌痕迹都会被消除。"
 decision_vaccination: "开始疫苗接种"
 decision_vaccination_desc: "在外星菌症的早期阶段，使用坏死毒素，可以完全清除该病原体在有机活体中的生长。"
 decision_vaccination_effect_desc: "所有被感染人口会被治愈。"
 decision_sterilization_process: "开始灭菌处理"
 decision_sterilization_process_desc: "用特殊的毒素处理受损材料，会使菌斑变为易于剥离的矿物。"
 decision_sterilization_process_effect_desc: "正在根除感染。"
 decision_build_cloud_platform: "开始建造云上平台"
 decision_build_cloud_platform_desc: "特殊的平台，整座城市都会被筑于其上。通过建造此类平台，我们可以开发那些被有毒烟雾覆盖的土地，也可以进行矿物开采作业。"
 decision_demolish_cloud_platform: "拆除云上平台"
 decision_demolish_cloud_platform_desc: "如果空中平台的维护变得无利可图，就可以将这些平台处理掉。"
 decision_start_ecosystem_creation_project: "Start Ecosystem Creation Project"
 decision_start_ecosystem_creation_project_desc: "This decision launches one of the projects for terraforming the planet.\n\nDead worlds can be revived by creating favorable conditions on the surface and in the atmosphere of the planet. Then plant the seeds of life and carefully care for the sprouts that will rapidly develop in the warm oceans of this world under our supervision."
 decision_start_ecosystem_creation_project_effect_desc: "Triggers a special terraforming process. To progress, you will need various terraforming structures."
 decision_end_ecosystem_creation_project: "End Ecosystem Creation Project"
 decision_end_ecosystem_creation_project_desc: "This decision will stop the ecosystem creation project. The result will not be achieved."
 decision_abolish_nature_preserves: "Abolish Nature Preserves"
 decision_abolish_nature_preserves_desc: "This decision will revoke the planet's status as a nature reserve and open the way for mineral extraction. However, civil society environmental organizations will almost certainly be displeased."
  
  
  ####################################
  # Origins
  ####################################
  
  origin_subterranean: "厚土之下"
  origin_subterranean_desc: "恒星活动的变化将这个文明的母星化成一片了无生机的废土，他们被迫深入地下。数个世纪以来，他们不断挖掘隧道，建造地下城市，直到有一天他们终于意识到地底之所不可能永远是他们的家园。"
  origin_scavengers: "拾荒者"
  origin_scavengers_desc: "至今仍不清楚这个文明是如何找到并定居于这个满目疮痍的世界之上。我们只知道这片工业废墟并不出自他们之手。也许是这个星球的古代主人把他们作为牲畜或奴隶携带至此。然而，现在他们已经够适应并能研究这个星球上的废弃技术来发展他们自己的文明。"
  civic_tooltip_scavengers_effects: "开局以一个§Y枯竭星球§!作为母星，拥有§Y$d_subway_tunnel_network$§!。\n清除§Y$d_industrial_boneyard$§!障碍后能获得 £alloys£ §Y合金§!。"
 origin_ark: "方舟计划"
 origin_ark_desc: "这个文明的母星被摧毁了。剩下的幸存者登上一艘巨大的宇宙飞船，而他们将穿越无尽的虚空，开启漫长的旅程去寻找新的家园。"
 civic_tooltip_ark_effects: "选择停靠在被摧毁的母星轨道上的§Y太空方舟§!开始游戏。你需要操作方舟来寻找宜居星球作为帝国首都。"
 origin_exomycosis: "感染"
 origin_exomycosis_desc: "这种集体性生物是一种寄生虫，被创造用以征服宇宙中所有的活物和死物。也许，这个菌群曾是某个未知文明的环境改造机制的一部分，但是一场可怕的实验失去了控制。现在，这团宇宙霉菌已经产生了思想，并有一种强烈的冲动，去吞食其他世界和其他文明。"
 civic_tooltip_exomycosis_effects: "你的母星为§Y$mycelium_world$§!。\n宜居偏好为§Y$trait_pc_tropical_preference$§!。\n你可以将任何湿润气候星球改造为§Y$mycelium_world$§!。\n人口获得§Y$trait_molded$§!特质，拥有如下效果：\n $MOD_POP_ENVIRONMENT_TOLERANCE$：§G+10%§!\n $MOD_ARMY_MORALE_DAMAGE_MULT$：§G+30%§!"
  
  
