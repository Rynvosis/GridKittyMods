l_simp_chinese:
 
 #bloker deposits
 
 d_dune_sea: "沙海"
 d_dune_sea_desc: "绵延数百公里的巨大沙海，流动的沙丘覆盖了这片区域。"
 d_thick_forest: "茂密森林"
 d_thick_forest_desc: "这个严酷的地区覆盖着茂密的针叶林和浸满水的防风林，这是很难克服的。"
 d_large_ice_ridge: "大冰脊"
 d_large_ice_ridge_desc: "这道冰障像山脉一样高高耸立。"
 d_blocked_tunnell: "阻塞通道"
 d_blocked_tunnell_desc: "这条天然隧道坍塌了，堵住了通向巨型洞穴的道路。"
 d_ice_crust: "冰壳"
 d_ice_crust_desc: "被厚厚的冰层封住的天然洞穴。"
 d_industrial_boneyard: "工业墓地"
 d_industrial_boneyard_desc: "此地区中到处都是被遗弃的金属结构和放射废物填埋场。"
 d_igneous_traps: "火成圈闭"
 d_igneous_traps_desc: "巨大的熔岩河流不断地从这个地区的众多裂缝中涌出，淹没了大半的地区。熔岩河首先淹没了峡谷和天然洼地，然后在平原上上蔓延开来。"
 d_exofungus_contamination: "外星菌种污染"
 d_exofungus_contamination_desc: "$exofungus_blocker_desc$"
 
 #event bloker deposits
 
 d_rusty_debris: "锈迹斑斑的残骸"
 d_rusty_debris_desc: "巨大的古代机械残骸山，是原始机械之间的古老战斗的严峻证据。"
 d_giant_fossils: "巨型化石"
 d_giant_fossils_desc: "巨大有机生物的骨骼的广阔墓地，它们在这个曾经生机勃勃的世界上居住过。"
 
 #planet deposits
 
 d_turbulent_currents: "湍急的海流"
 d_turbulent_currents_desc: "在这片海域中，有非常强大而持久的海流。"
 d_underground_springs: "地下泉"
 d_underground_springs_desc: "这些洞穴是地下水热泉，在星球最深处被加热。"
 d_salt_flat: "盐滩"
 d_salt_flat_desc: "很久以前这里曾经有一片海洋，但是它早已干涸，留下了数百公里的盐滩。"
 d_peat_moors: "泥炭沼泽"
 d_peat_moors_desc: "这些广阔的沼泽地中蕴藏着丰富的泥炭，可以作为发电厂的优良燃料。"
 d_submerged_gas_eruption: "水下气体逸散"
 d_submerged_gas_eruption_desc: "在这片海底中，各种气体被释放出来，由于星球内部的地质过程，这些气体积聚在地表下。"
 d_ice_geyser: "冰间歇泉"
 d_ice_geyser_desc: "在这个地方，巨大的水喷流在压力下从行星的冰壳下被喷射到地表。"
 d_gaseous_eruption: "气体喷发"
 d_gaseous_eruption_desc: "各种气体从巨大的断层中排放出来，这些气体由于地质过程而积聚在星球表面之下。"
 d_scorched_badlands: "烧焦的恶地"
 d_scorched_badlands_desc: "在这个地区，夜幕从未降临。炙热的恒星将地表和空气加热到可怕的温度，使这个地区没有生命，但这个地方有巨大的能源潜力。"
 d_offshore_fields: "近海矿原"
 d_offshore_fields_desc: "由于地质过程的影响，这个富含矿物的海台已经从深海上升到浅海。"
 d_abundant_atoll: "丰饶环礁"
 d_abundant_atoll_desc: "在这个古老珊瑚构造的深处，积累了许多有价值的矿物。"
 d_rich_lodes: "丰饶矿脉"
 d_rich_lodes_desc: "这一地区的地下洞穴中充满了各种矿物的矿藏。"
 d_seagrass_shelf: "海草架"
 d_seagrass_shelf_desc: "这个浅水区里覆盖着大片的海草。"
 d_kelp_forest: "海带丛林"
 d_kelp_forest_desc: "这个海域是一个独特的生物群落，有各种各样的海洋生物。"
 d_estuary_meadows: "河口草甸"
 d_estuary_meadows_desc: "该地区广阔的河流三角洲形成了大面积的灌溉原野，是农业的最佳选择。"
 d_huge_tree: "巨树"
 d_huge_tree_desc: "巨大的树木构成了一个罕见的生物群落，容纳了种类丰富的生命。"
 d_underground_reservoir: "地下蓄水池"
 d_underground_reservoir_desc: "在这个地下湖的岸边和表面之下，形成了一个奇妙的生物群落，各式生命蓬勃发育。"
 
 #rare deposits
 
 d_great_vortex: "大涡漩"
 d_great_vortex_desc: "该地区显著的气团旋流导致了一场巨大的龙卷风。"
 d_stormy_water: "风暴水域"
 d_stormy_water_desc: "这片海域的气流交汇形成了一场可怕的风暴。"
 d_sand_worm: "沙虫"
 d_sand_worm_desc: "这片广袤的沙漠有一位主宰，最好不要打扰它。"
 d_grand_canyon: "大海峡"
 d_grand_canyon_desc: "一个幽邃、美丽如画的峡谷，许多分支和山峡绵延有数千公里之远。"
 d_vast_crevasse: "巨大裂隙"
 d_vast_crevasse_desc: "遗迹冰川的巨大壳层上形成了一道很深的裂缝。"
 d_maze_cliff_formations: "迷宫般的悬崖构造"
 d_maze_cliff_formations_desc: "浅水区的火山岩侵蚀创造出了奇特的岩质浮雕。海浪与岩洞产生了覆盖整个区域的浓雾。"
 d_boneyard: "墓地"
 d_boneyard_desc: "该星球的巨大居民留下的许多骸骨，保守着关于一场古老灾难的秘密。"
 d_ancient_ruins: "古代废墟"
 d_ancient_ruins_desc: "在这个山谷中，怪异的遗迹一直延伸至遥远的天际，它属于一个被遗忘已久的时代。"
 d_relic_landfill: "填埋场遗迹"
 d_relic_landfill_desc: "一堆堆的科技垃圾，被一些高度发达的古代文明扔在这里。"
 d_levitating_rocks: "悬浮岩石"
 d_levitating_rocks_desc: "未知的物理过程使得这些巨岩混乱地漂浮在地表之上。"
 d_karst_cave: "溶洞"
 d_karst_cave_desc: "一个深部地下洞穴的巨大网络，拥有自己的生态系统。"
 d_serene_coastline: "宁静的海岸线"
 d_serene_coastline_desc: "迷人的大自然、金色的海滩和诱人的海洋。这个格外美丽的地方是放松的最佳选择。"
 
 #starting deposits
 
 d_urban_agglomeration: "城市聚居地"
 d_urban_agglomeration_desc: "这个星球上的许多巨城已经统合为一个单一的基础设施群。"
 d_reactor_zone: "反应堆区域"
 d_reactor_zone_desc: "该地区的全部基础设施都被用于维持强大的热核反应堆的稳定运转。"
 d_reserve_deposits: "预备矿储"
 d_reserve_deposits_desc: "星球上一些已被探知的矿储被封存起来，并在很长时间内保持原样。"
 d_deep_ore_mines: "深部矿山"
 d_deep_ore_mines_desc: "从行星内部开采矿物的大型基础设施网络。"
 d_rich_abyss: "富饶深渊"
 d_rich_abyss_desc: "在海洋的最深处，有大量未被开采的矿物资源。"
 d_hydroponic_complex: "水培复合体"
 d_hydroponic_complex_desc: "这些农业设施能够在无需沃土的情况下种植各式粮食作物。"
 d_agrothermal_plains: "农业热平原"
 d_agrothermal_plains_desc: "通过采用特殊的热回收措施，这个寒冷的地区已经转为农用。"
 d_converted_lands: "转化过的陆地"
 d_converted_lands_desc: "这些区域的丛林已经被清除，并且用肥料改造为了沃田。"
 d_irrigated_fields: "灌溉田野"
 d_irrigated_fields_desc: "这个一度是沙漠的地区的基础设施被用于维持土壤有充足的水分。"
 d_agrarian_dome: "农业穹顶"
 d_agrarian_dome_desc: "这个穹顶专门设计用于维持满足农业需求的有利气候和土壤。"
 d_algae_tracts: "藻类区"
 d_algae_tracts_desc: "$d_pacific_algae_tracts_desc$"
 
 #special deposits
 
 d_subway_tunnel_network: "地下隧道网络"
 d_subway_tunnel_network_desc: "这个星球前主人留下的跨越星球的古老运输隧道网络，现在是躲避辐射雨的庇护所。"
 d_remains_of_ark: "方舟遗迹"
 d_remains_of_ark_desc: "这些是“方舟”的残骸，它降落在星球上并作为新殖民地的基础。这是一座纪念碑，提醒人们曾经居住在这个世界上的文明。"
 d_settler_camp: "定居者营地"
 d_settler_camp_desc: "方舟的居民在短时间内用废旧材料搭建出这个庞大的定居点。"
 d_cloud_platform: "云上平台"
 d_cloud_platform_desc: "此巨型基础设施的结构处于一个安全的高度上，远离被致命烟雾覆盖的地表。"
 d_ancient_temple_ruins: "古代神殿遗迹"
 d_ancient_temple_ruins_desc: "这座旧日神灵的神秘圣殿吸引了朝圣者、科学家和各宗派的代表。"
 d_enigmatic_remnants: "神秘遗迹"
 d_enigmatic_remnants_desc: "这座巨大的城市遗迹，属于一个被沙尘掩盖的失落时代，是诸多考古学家的梦想之地。"
 d_medicinal_algae: "Medicinal Algae"
 d_medicinal_algae_desc: "A unique species of algae has been discovered in this region, with healing properties surpassing many modern medications. This valuable resource significantly increases global trade and opens up new opportunities for biologists and the pharmaceutical industry."
 d_crystalline_array: "Crystalline Array"
 d_crystalline_array_desc: "The enormous crystalline formations in this region are absolutely unique and unparalleled in the galaxy. This place contains a virtually inexhaustible resource of rare crystals and minerals."
 
 #event deposits
 
 d_collapsed_caves: "坍塌洞穴"
 d_collapsed_caves_desc: "此区域的地下隧道已经坍塌。"
 d_sunken_cavity: "淹没洞穴"
 d_sunken_cavity_desc: "这片区域的冰川洞穴已被海水完全淹没。"
 d_troubled_waters: "浑水"
 d_troubled_waters_desc: "这一地区巨型生命体的大量活动导致了水体的异常和奇怪漩涡的出现。"
 d_dooms_rift: "灾厄裂缝"
 d_dooms_rift_desc: "大量巨型生命体从这片区域的地表破土而出，在土地上留下了一道道又深又宽的裂缝。"
 d_destruction_marks: "破坏痕迹"
 d_destruction_marks_desc: "成群的巨型生命体在经过这个地区后留下了一片废墟。"

