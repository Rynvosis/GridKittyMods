 newfrontiers_decision_event.2.name: "方舟建造完成！"
 newfrontiers_decision_event.2.desc: "我们做到了！巨型方舟工程的建造已经完成，舰船停泊在我们母星的轨道上。我们已经开始选出殖民者来进入方舟。他们代表着[Root.Owner.GetSpeciesName]最优秀的人，在[Root.Capital.GetName]灭亡后他们会在新世界上复兴我们的文明。\n\n§Y方舟舰停在[Root.Capital.GetName]轨道上。它必须安全到达另一个宜居行星，来使[Root.Owner.GetSpeciesNamePlural]幸存下来。你所拥有的时间不会受限于[Root.Capital.GetName]的毁灭。在你位于[Root.Capital.GetName]上的文明被摧毁以后，方舟上的殖民者会变成一个新的帝国。如果方舟在[Root.Capital.GetName]毁灭前就殖民了一个新世界，那么会形成一个新的帝国。你可以选择一个帝国来继续统治。§!"
 newfrontiers_decision_event.2.a: "祝你们好运！为了[Root.Owner.GetSpeciesName]！"
 newfrontiers_decision_event.3.name: "发现一个宜居星球！"
 newfrontiers_decision_event.3.desc: "方舟进入了[From.GetName]的星球轨道。初步探测分析该星球具有氮氧大气层，可能适合我们的种族居住。有必要决定是在这个星球上定居，还是继续我们跨越恒星的旅途。"
 newfrontiers_decision_event.3.a: "准备殖民！这里就是我们的新家！"
 newfrontiers_decision_event.3.a.tooltip: "注意! 该选项不可撤销。\n星球[From.GetName]将成为你帝国的首都，方舟将被拆除。方舟的一部分将成为恒星轨道上的哨站，其余部分将被移到星球表面，成为我们新帝国的基石。\n[From.GetName]现在是我们的母星。\n在星球上添加独特特征：§Y$d_remains_of_ark$§!。"
 newfrontiers_decision_event.3.b: "这个星球不适合我们。我们必须继续寻找。"
 newfrontiers_decision_event.3.c: "这个星球会成为我们的新家！我们不会忘记我们的母星！"
 newfrontiers_decision_event.3.c.tooltip: "§R注意！该选项不可被撤销。§!\n你将控制一个新的方舟帝国。星球[From.GetName]将成为你的帝国的首都。方舟将会变为无保护状态，这艘船只的部分会变为可使用的并存在于轨道上，这颗星星将成为我们新帝国遗产的一部分。\n行星[From.GetName]现在是我们的母星。\n在星球上添加独特星球特征：§Y$d_remains_of_ark$§!。"
 newfrontiers_decision_event.3.d: "这个星球会是我们子嗣的一个新的机遇！我们希望他们好运！"
 newfrontiers_decision_event.3.d.tooltip: "§R注意！该选项不可被撤销。§!\n方舟将会创造一个新的独立帝国。[From.GetName]将成为这个帝国的首都。\n当我们试图拯救我们的世界或者步入灭亡的时候，我们文明的种子将在独立于我们之外的地方生根发芽。"
 newfrontiers_decision_event.4.name: "[FromFrom.Owner.GetSpeciesName]找到了一个新家。"
 newfrontiers_decision_event.4.desc: "我们得到消息，由于[FromFrom.Owner.GetSpeciesName]的母星即将灭亡，这迫使他们建造了一艘巨大的方舟，并派出他们最优秀的代表去寻找新的家园。现在他们已经完成了任务，在[FromFrom.Owner.Capital.solar_system.GetName]找到了新家。"
 newfrontiers_decision_event.6.name: "方舟上的革命"
 newfrontiers_decision_event.6.desc: "方舟上的一些殖民者终于决定了结过去并想要一种新的政体。他们发动了一场革命，说服大多数人站在自己这边，并将方舟上的官员撤职。现在，[Root.Owner.GetSpeciesNamePlural]到达了他们的目的地，开始建设新的未来。"
 newfrontiers_decision_event.6.tooltip: "新的方舟文明将不再继承原帝国的政治原则。"
 newfrontiers_decision_event.7.name: "方舟上的亲外运动"
 newfrontiers_decision_event.7.desc: "方舟号上的殖民者们正在积极讨论他们发觉自身所处的危机，并想知道未来等待他们的是什么。许多人担心[Root.Owner.GetSpeciesNamePlural]如果没有其他外星文明的支持，将无法在冰冷的虚空中生存。在方舟人口中，亲外主义有了更高的吸引力。"
 newfrontiers_decision_event.7.tooltip: "在方舟的新文明中，亲外主义变得更有吸引力！"
 newfrontiers_decision_event.8.name: "方舟上的排外运动"
 newfrontiers_decision_event.8.desc: "方舟号上的殖民者们正在积极讨论他们发觉自身所处的危机，并思考未来等待他们的是什么。许多人大声疾呼其他外星文明对他们的存续带来的危险。应该尽量减少并且尽可能避免和外星人的接触。这将提高我们这个濒临灭绝之危物种的生存率。在方舟人口中，排外主义有了更高的吸引力。"
 newfrontiers_decision_event.8.tooltip: "在方舟的新文明中，排外主义变得更有吸引力！"
 newfrontiers_decision_event.9.name: "方舟上的和平运动"
 newfrontiers_decision_event.9.desc: "方舟上的殖民者们正在积极讨论他们发觉自身所处的危机，并想知道未来等待他们的是什么。许多人谈到了猖獗的军国主义是如何分散了[Root.Owner.GetSpeciesNamePlural]对于旧世界的真正问题的注意力。他们渴望在新殖民地上有一个更和平、更繁荣的文化。和平的呼声已经席卷了方舟上的所有人。"
 newfrontiers_decision_event.9.tooltip: "在方舟的新文明中，和平主义变得更有吸引力！"
 newfrontiers_decision_event.10.name: "方舟上的军国运动"
 newfrontiers_decision_event.10.desc: "方舟号上的殖民者们正在积极讨论他们发觉自身所处的危机，并想知道未来等待他们的是什么。许多人大声疾呼要保卫[Root.Owner.GetSpeciesNamePlural]免受银河系诸多危险之害。他们已经有了创建新防御令的想法，并且正在考虑如何遏制可能的威胁。军国主义热潮已经传遍了整个方舟。"
 newfrontiers_decision_event.10.tooltip: "在方舟的新文明中，军国主义变得更有吸引力！"
 newfrontiers_decision_event.11.name: "方舟上的威权活动"
 newfrontiers_decision_event.11.desc: "方舟上的殖民者们正在积极讨论他们发觉自身所处的危机，不知道未来等待他们的是什么。一个强大的领袖从他们中出现，并将大多数人团结在他的周围。他呼吁建立一个强大的中央集权政府来继续保护[Root.Owner.GetSpeciesNamePlural]，引导他们走向未来，即使这意味着有些人可能需要为更大的利益做出牺牲。在他看来，如果没有这些严厉的措施，新的文明将无法生存。在方舟的人口中，威权主义有了更高的吸引力。"
 newfrontiers_decision_event.11.tooltip: "在方舟的新文明中，威权主义变得更有吸引力！"
 newfrontiers_decision_event.12.name: "方舟上的平等运动"
 newfrontiers_decision_event.12.desc: "方舟上的殖民者们正在积极讨论他们发觉自身所处的危机，并想知道未来等待他们的是什么。许多人都在谈论着个人自由的重要性。他们提出了在新文明中保护公民的权利和自由的想法，这将为快速发展带来新的机遇。在方舟的民众中，平等主义正变得更有吸引力。"
 newfrontiers_decision_event.12.tooltip: "在方舟的新文明中，平等主义变得更有吸引力！"
 newfrontiers_decision_event.13.name: "方舟上的唯物运动"
 newfrontiers_decision_event.13.desc: "方舟上的殖民者们正在积极讨论他们发觉自身所处的危机，并想知道未来等待他们的是什么。许多人说，他们的家园毁灭本来是可以避免的。这场灾难本来可以预料——以及更为重要的是——可以阻止，要是对科学发展给予更多关注就好了。他们说，知识就是力量，为了他们的生存，[Root.Owner.GetSpeciesNamePlural]必须重视知识胜过一切！在方舟的民众里，唯物主义越来越受到人们的青睐。"
 newfrontiers_decision_event.13.tooltip: "在方舟的新文明中，唯物主义变得更有吸引力！"
 newfrontiers_decision_event.14.name: "方舟上的唯心运动"
 newfrontiers_decision_event.14.desc: "方舟上的殖民者们正在积极讨论他们发觉自身所处的危机，并想知道未来等待他们的是什么。许多人直言，与深不可测的广袤太空相比，[Root.Owner.GetSpeciesNamePlural]显得微不足道。在追逐科学中的粗心大意和自以为是可能导致（并且已经导致）可怕的后果，我们的人民渴望了解自己在星空中的地位和目的。在方舟的人口中，唯心主义变得更有吸引力。"
 newfrontiers_decision_event.14.tooltip: "在方舟的新文明中，唯心主义变得更有吸引力！"
 newfrontiers_decision_event.15.name: "档案库火灾"
 newfrontiers_decision_event.15.desc: "方舟档案库发生了事故。由于火灾，大部分的信息存储服务器都被烧毁了。船上的电脑虽然保存了最重要的数据，让我们不至于倒车回石器时代，但大量的科学知识却无可挽回地丢失了。"
 newfrontiers_decision_event.15.tooltip: "方舟的新文明已经失去了所有科技，除了起始部分。"
 newfrontiers_decision_event.16.name: "方舟导航计算机崩溃"
 newfrontiers_decision_event.16.desc: "舰载计算机导航模块被不明病毒破坏。计算机关闭了自己的所有外部连接，之后删除了所有的导航数据。我们不知道病毒是怎么上了方舟的。也许是来自仍然活跃的方舟计划反对者所做的破坏，或者只是一些过度疲劳的信息安全工作者的疏忽。然而，通讯方式失灵，方舟号的船员们一筹莫展，殖民者们陷入了心理上的恐慌之中。方舟号在漆黑而又陌生的空旷宙域里，孤立无援。"
 newfrontiers_decision_event.16.tooltip: "方舟的新文明丢失了所有关于恒星和行星的数据，方舟只能盲目地飞行。"
 newfrontiers_decision_event.33.name: "远古世界发掘完成"
 newfrontiers_decision_event.33.desc: "我们在[From.GetName]上挖掘出了大部分被掩埋的设施，这里曾经是一个巨大的都市星球。发掘基础设施需要进行大规模的地质工程，但我们的科学家现在已经找到了数个考古遗址。"
 
 
