 # Action Events
 ####################################
 
 newfrontiers_action.4.desc: "§Y[FromFrom.GetName]§!拥有高压和对大多数生命形式都是剧毒的大气圈。然而，这里已经发展出了一个繁荣的生物圈，使用氨来代替水作为溶剂。此处的生命发展遵循着与我们所知截然不同的生态模式。对这个系统的研究将极大丰富我们对异种生物学的知识。"
 
 
