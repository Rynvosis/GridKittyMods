 ####################################
 # Terraforming Events
 ####################################
 
 newfrontiers_terraforming_event.27.name: "[Target.GetName]: Frigid World"
 newfrontiers_terraforming_event.27.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. The change in temperature led to the formation of a harsh rocky world, constrained by constant frost. Most of the planet is a frozen wasteland, blown by cold winds. The few life forms mainly live in mountain caves."
 newfrontiers_terraforming_event.28.name: "[Target.GetName]: Moraine World"
 newfrontiers_terraforming_event.28.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. Temperature changes have created a world locked in a cycle of short periods of glaciation and warming. As a result, the planet's ice sheet is in constant motion. Most of the planet's surface is a moving layer of rock fragments and ice."
 newfrontiers_terraforming_event.29.name: "[Target.GetName]: Iceberg World"
 newfrontiers_terraforming_event.29.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. Temperature changes have led to the formation of an oceanic world, which is rapidly freeing itself from its icy captivity. Ice shelves at the poles constantly produce many icebergs, some of which can be several kilometers in diameter."
 newfrontiers_terraforming_event.30.name: "[Target.GetName]: Taiga World"
 newfrontiers_terraforming_event.30.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. The change in temperature led to the formation of a world with relatively moderate seasonal climate and humidity. Due to this, this planet has extensive forest cover in the equatorial zone. The harsh taiga forests are well adapted to long winters. Closer to the poles there are many areas of forest-tundra and swamps, which give way to frozen wastelands."
 newfrontiers_terraforming_event.31.name: "[Target.GetName]: Plateau World"
 newfrontiers_terraforming_event.31.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. The change in temperature has led to the formation of a cold world in which most of the surface is a vast plateau, cut by gorges and separated by hollows. Higher areas are great for power plants, and eroded deposits make mineral mining easier."
 newfrontiers_terraforming_event.32.name: "[Target.GetName]: Boreal World"
 newfrontiers_terraforming_event.32.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. Temperature changes led to the formation of a world with a moderately cold climate. Raging rivers and geothermal zones hidden in the depths of retreating glaciers will provide a good source of energy. The low temperature and not rich frozen lands are very harsh and only coniferous plants were able to survive here and become dominant in this world, competing with various mosses and lichens."
 newfrontiers_terraforming_event.33.name: "[Target.GetName]: Mesa World"
 newfrontiers_terraforming_event.33.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. Changing temperatures have created a world in which frequent, and sometimes unpredictable, changes in warm and cold seasons lead to strong winds and drought. Constant weathering has transformed the planet's topography into canyoned plateaus and vast mesas formations. The planet's meager biosphere thrives only near rare bodies of water in the polar zone."
 newfrontiers_terraforming_event.34.name: "[Target.GetName]: Atoll World"
 newfrontiers_terraforming_event.34.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. Temperature changes led to the formation of a world in which there are no large continents, but hundreds and thousands of volcanoes have always risen from under its water surface. Gradually fading away, they eroded and, with the participation of corals, turned into beautiful atolls. Almost evenly distributed from one pole to the other, these atolls are a true tropical paradise."
 newfrontiers_terraforming_event.35.name: "[Target.GetName]: Veld World"
 newfrontiers_terraforming_event.35.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. Changing temperatures have created a world with a semi-arid subtropical climate and a predominantly mountainous landscape that is like a patchwork quilt of lush coastal prairies, flooded grasslands, hot savannas and desert plateaus. The local biosphere develops around certain tree species that develop extensive root systems to compensate for long dry seasons. The extensive root system can hardly survive for more than a few decades, but those that continue to grow allow the trees to develop into mega-acacias and create around themselves a kind of oases with constant centers of blooming life."
 newfrontiers_terraforming_event.36.name: "[Target.GetName]: Swamp World"
 newfrontiers_terraforming_event.36.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. Changing temperatures led to the formation of a world of gloomy swamps, toxic fumes and coal forests. There are almost no open sources of water on the planet, and the hydrosphere consists of endless swamps and flooded jungles with small muddy islands. Thanks to such conditions, this world is an excellent source of various gases of organic origin."
 newfrontiers_terraforming_event.37.name: "[Target.GetName]: Dune World"
 newfrontiers_terraforming_event.37.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. The change in temperature has created a world entirely made up of an endless sand sea of dunes with occasional mountain ranges. There are completely no open water sources here. Water can only be found in the scarce polar ice caps and deep underground. Frequent sandstorms can be very strong and destructive."
 newfrontiers_terraforming_event.38.name: "[Target.GetName]: Megaflora World"
 newfrontiers_terraforming_event.38.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. The change in temperature has created a world of steamy, dense jungles and giant creeping roots covering the entire surface. The rich flora of this world shows incredible persistence and growth rate in attempts to take over any free area of ​​space. In the face of such an aggressive spread of native vegetation, the development and maintenance of infrastructure seems to be a very difficult task."
 newfrontiers_terraforming_event.39.name: "[Target.GetName]: Mesocyclonic World"
 newfrontiers_terraforming_event.39.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. The change in temperature led to the formation of a flat world with strong pressure differences in the atmosphere. Which lead to the frequent formation of many air vortices of various sizes. In this harsh world of destructive tornadoes, only the hardiest life forms survive."
 newfrontiers_terraforming_event.40.name: "[Target.GetName]: Adiabatic World"
 newfrontiers_terraforming_event.40.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. The change in humidity created a world where excessive mountain building in the past had trapped the planet's initially meager hydrosphere. As a result of constant cooling processes and compression of moisture in the upper parts of the atmosphere, most of the planet is in the rain shadow. Rare life exists near bodies of water, while 90% of the surface is very dry desert."
 newfrontiers_terraforming_event.41.name: "[Target.GetName]: Dust World"
 newfrontiers_terraforming_event.41.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. The change in humidity created an extremely arid world that suffered tremendous soil degradation, causing the surface to suffer from continuous and uncontrolled wind erosion. Powerful winds wear down mountains and periodically raise huge dust storms that can plunge the entire planet into darkness."
 newfrontiers_terraforming_event.42.name: "[Target.GetName]: Oasis World"
 newfrontiers_terraforming_event.42.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. The change in humidity led to the formation of a desert world that has a single ocean occupying approximately 15% of the surface. The rest of the planet is covered in vast desert biomes that receive little to no rainfall. On the coast of the inland sea there is an abundance of vegetation, which can sometimes spread far into the continental part of the planet."
 newfrontiers_terraforming_event.43.name: "[Target.GetName]: Bog World"
 newfrontiers_terraforming_event.43.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. The change in humidity created a cold world with virtually no solid ground to build on. The entire surface of the planet is covered with peat bogs and dirty lakes. Despite the cold, harsh climate of the planet, high humidity and fertile soil make this world attractive for agriculture."
 newfrontiers_terraforming_event.44.name: "[Target.GetName]: Mediterranean World"
 newfrontiers_terraforming_event.44.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. The change in humidity led to the formation of an arid, rocky world with several large inland seas, the coasts of which are less affected by the hot climate. Many fertile regions are concentrated in coastal areas, where a temperate climate prevails with rare dry seasons."
 newfrontiers_terraforming_event.45.name: "[Target.GetName]: Highland World"
 newfrontiers_terraforming_event.45.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. The change in humidity led to the formation of a cold world, most of the surface of which is a very intricate system of mountain ranges. These mountain ranges form a relief of basins, plateaus and valleys with inland seas. This world is characterized by strong elevation changes and an almost complete absence of vast plains."
 newfrontiers_terraforming_event.46.name: "[Target.GetName]: Steppe World"
 newfrontiers_terraforming_event.46.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. The change in humidity has created a world that is almost completely devoid of trees. The surface is covered by many inland seas, which are separated by endless plains of grassy meadows and steppe pastures."
 newfrontiers_terraforming_event.47.name: "[Target.GetName]: Snow World"
 newfrontiers_terraforming_event.47.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. The change in humidity led to the formation of a mountainous world in which most of the flat surfaces, free from extensive mountain ranges, are covered with glaciers. The equatorial zone is dominated by a temperate boreal climate with uneven seasonal temperature changes. Inland seas retain heat for a long time, and mountain ranges hold back cold air currents. Thus, constant changes in atmospheric pressure occur. There is a constant struggle between cold glacial and warm equatorial air masses on the planet, which generate strong snow storms."
 newfrontiers_terraforming_event.48.name: "[Target.GetName]: Forest World"
 newfrontiers_terraforming_event.48.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. The change in humidity led to the formation of a world with forests and jungles of giant trees that can touch the clouds with their crowns. Endless forests are a network and have a level structure. The fauna is just as diverse, but often becomes food for carnivorous plants. Which are present in abundance on this planet."
 newfrontiers_terraforming_event.49.name: "[Target.GetName]: Reef World"
 newfrontiers_terraforming_event.49.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. The change in humidity led to the formation of an oceanic world with almost no water depths. The entire surface of the planet consists of shallow oceans with complex systems of rocky reefs of volcanic origin."
 newfrontiers_terraforming_event.50.name: "[Target.GetName]: Monsoon World"
 newfrontiers_terraforming_event.50.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. The change in humidity has created a world where the unusual arrangement of land and oceans creates regular seasonal changes in wind directions. In summer, the depths of the continents are abundantly irrigated with precipitation and even completely flooded, while in winter, on the contrary, a dry climate sets in. This world could be called almost ideal for life, if not for the regular and devastating hurricanes and typhoons generated by these winds."
 newfrontiers_terraforming_event.51.name: "[Target.GetName]: Glacial World"
 newfrontiers_terraforming_event.51.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. The change in humidity led to the formation of a world in which a significant part of the surface is covered with a huge ice shell. Incredible cold reigns here, and deadly snow storms prevent the already meager biosphere from developing. A lifeless landscape of icy rocks is occasionally punctuated by weather-beaten cliffs, providing access to rare minerals beneath the planet's surface."
 newfrontiers_terraforming_event.52.name: "[Target.GetName]: Panthalassic World"
 newfrontiers_terraforming_event.52.desc: "As a result of prolonged terraforming, the climate on the planet [Target.GetName] has undergone changes. The change in humidity led to the formation of an oceanic world completely devoid of land. The entire surface of the planet is covered by a solid ocean, which is constantly in motion and rarely calm. The construction of buildings on this planet is possible only at depth, under the water surface, or on specially constructed floating platforms."
 newfrontiers_terraforming_event.53.name: "[Target.GetName]: Karst World"
 newfrontiers_terraforming_event.53.desc: "During the process of terraforming the oceanic planet [Target.GetName], an unfortunate mistake occurred that led to disaster. The planet's hydrosphere began to rapidly evaporate, revealing a surface covered with deep scars and caverns. Now the entire planet is covered with giant gorges and a huge network of caves, which greatly simplifies access to minerals. Moreover, the presence of such a huge number of hidden places will also attract many pirate and terrorist groups."
 UNEXPECTED_RESULT: "Unexpected result..."
 newfrontiers_terraforming_event.55.name: "[Target.GetName]: Effusive World"
 newfrontiers_terraforming_event.55.desc: "As a result of geological intervention, the appearance of the planet [Target.GetName] has undergone great changes. Poisonous fumes of sulfur and other gases escape from the many volcanic crevices of this world."
 newfrontiers_terraforming_event.56.name: "[Target.GetName]: Primal World"
 newfrontiers_terraforming_event.56.desc: "As a result of geological intervention, the appearance of the planet [Target.GetName] has undergone great changes. Now the lush jungle of this world can suddenly be replaced by dead wastelands. Streams of lava escaping from the bowels of the planet spread across valleys and canyons, consuming the once flourishing region and turning it into a hellish landscape."
 newfrontiers_terraforming_event.57.name: "[Target.GetName]: Geothermal World"
 newfrontiers_terraforming_event.57.desc: "As a result of geological intervention, the appearance of the planet [Target.GetName] has undergone great changes. Many areas of this world have become completely free of ice. It is now a planet of hot springs and frequent geysers, where glacial wastelands meet lush jungles."
 newfrontiers_terraforming_event.58.name: "[Target.GetName]: Salt World"
 newfrontiers_terraforming_event.58.desc: "During the process of terraforming the oceanic planet [Target.GetName], an unfortunate mistake occurred that led to disaster. The planet's hydrosphere began to rapidly evaporate. Now the little remaining moisture is over-salted to the limit, and in place of the oceans there are endless salt plateaus, heated by hot air and suitable only for extremophile organisms."
 newfrontiers_terraforming_event.59.name: "[Target.GetName]: Supercontinental World"
 newfrontiers_terraforming_event.59.desc: "During the process of geological intervention on the planet [Target.GetName], an unfortunate error occurred that led to disaster. Tectonic plates suddenly began to move and the appearance of the planet changed beyond recognition. During weeks of incessant and destructive earthquakes, all the continents of this one merged into one supercontinent. Now life flourishes mainly on the coasts of the seas. In the depths of the continent, far from the fertile river valleys, there are dry steppes and half-deserts scorched by the sun. They stretch for many thousands of kilometers, blown by monstrous winds."
 newfrontiers_terraforming_event.60.name: "[Target.GetName]: Mineral World"
 newfrontiers_terraforming_event.60.desc: "During the process of geological intervention on the planet [Target.GetName], an unfortunate error occurred that led to disaster. Tectonic plates suddenly began to move and the appearance of this mountainous planet changed beyond recognition. During weeks of continuous and destructive earthquakes, new mountain ranges were formed from ore-rich rock formations with a predominantly crystalline structure. At the same time, now this world is practically devoid of soft soil cover, and harsh climatic conditions do not allow the planet’s biosphere to actively develop."
 newfrontiers_terraforming_event.61.name: "[Target.GetName]: Mushroom World"
 newfrontiers_terraforming_event.61.desc: "An error occurred while greening the planet [Target.GetName]. The composition of microelements with which we treated the soil led to the mutation of local fungal forms. As a result, all other types of life were almost completely replaced by fungi. Now the surface of this cold world is a collection of islands of vibrant life, consisting of forests of giant mushrooms separated by swampy tundra and windy wastelands."
 newfrontiers_terraforming_event.62.name: "[Target.GetName]: Young World"
 newfrontiers_terraforming_event.62.desc: "As a result of prolonged terraforming, the appearance of the planet [Target.GetName] has undergone changes. The planet's surface consists of endless rocky wastelands and ash valleys with active volcanoes, and complex life forms develop in the depths of the oceans."
 newfrontiers_terraforming_event.63.name: "[Target.GetName]: Lava World"
 newfrontiers_terraforming_event.63.desc: "As a result of prolonged terraforming, the appearance of the planet [Target.GetName] has undergone changes. The entire surface of this planet is a huge lava cauldron. Hundreds of volcanoes simultaneously emit magma to the surface, which spreads over the surface and forms entire seas of hot rock. Due to pollution by volcanic emissions, the poor nitrogen-oxygen atmosphere is almost unbreathable."
 newfrontiers_terraforming_event.64.name: "[Target.GetName]: Ash World"
 newfrontiers_terraforming_event.64.desc: "As a result of prolonged terraforming, the appearance of the planet [Target.GetName] has undergone changes. This rocky world is experiencing an acute phase of a global volcanic winter. Active tectonic processes on the planet have stopped, but the atmosphere is heavily polluted with ash and sulfur dioxide gases. The dense cover of volcanic emissions has led to an anti-greenhouse effect and almost no sunlight reaches the surface."
 newfrontiers_terraforming_event.65.name: "[Target.GetName]: Archean World"
 newfrontiers_terraforming_event.65.desc: "As a result of prolonged terraforming, the appearance of the planet [Target.GetName] has undergone changes. This planet is at a very early stage in the formation of organic life. Thanks to photosynthesis of microbiota, which actively develops in shallow seas, a stable nitrogen-oxygen atmosphere has formed. The continuing increase in atmospheric oxygen saturation will one day lead to an oxygen catastrophe and the onset of global glaciation."
 newfrontiers_terraforming_event.66.name: "[Target.GetName]: Sterile World"
 newfrontiers_terraforming_event.66.desc: "As a result of prolonged terraforming, the appearance of the planet [Target.GetName] has undergone changes. This rocky world with a nitrogen-oxygen atmosphere is practically devoid of life. Extreme conditions on the surface are caused by sharp temperature changes and an atmosphere mixed with various harmful gases from volcanic activity."
 newfrontiers_terraforming_event.67.name: "[Target.GetName]: Aeolian World"
 newfrontiers_terraforming_event.67.desc: "During the process of climate change on the planet [Target.GetName], an unfortunate mistake occurred that led to disaster. A wave of monstrous hurricanes swept across the entire surface of this world, sweeping away everything in its path. Weeks of continuous erosion of volcanic rocks have created bizarre distortions of the rock masses. The sandstorms raging here are extremely destructive due to large and sharp grains of sand, which are accelerated by hurricane winds to such speeds that they can deform even the most durable structures."
 newfrontiers_terraforming_event.68.name: "[Target.GetName]: Lava World"
 newfrontiers_terraforming_event.68.desc: "During the process of geological intervention on the planet [Target.GetName], an unfortunate error occurred that led to disaster. The entire surface of this world has turned into a huge lava cauldron. Hundreds of volcanoes simultaneously emit magma to the surface, which spreads over the surface and forms entire seas of hot rock. Due to pollution by volcanic emissions, the poor nitrogen-oxygen atmosphere is almost unbreathable."
 newfrontiers_terraforming_event.71.name: "[Target.GetName]: Fallout World"
 newfrontiers_terraforming_event.71.desc: "As a result of the ecosystem restoration process, the appearance of the planet [Target.GetName] has undergone changes. This world has plunged even further into the abyss of a nuclear apocalypse, which caused a chain reaction that is rapidly destroying the planet's ecosystem. Large-scale radioactive contamination of the environment has led to the almost complete extinction of life. There are practically no places left that have not been affected by a man-made disaster. The planet is on the verge of destruction."
 newfrontiers_terraforming_event.72.name: "[Target.GetName]: Tomb World"
 newfrontiers_terraforming_event.72.desc: "As a result of the ecosystem restoration process, the appearance of the planet [Target.GetName] has undergone changes. Now there is a nuclear winter here, and the atmosphere contains large amounts of soot particles. Strong radioactive radiation on the surface. Minimal signs of life."
 newfrontiers_terraforming_event.73.name: "[Target.GetName]: Wasteland World"
 newfrontiers_terraforming_event.73.desc: "As a result of the ecosystem restoration process, the appearance of the planet [Target.GetName] has undergone changes. The Great War, which destroyed most of life, died down on this planet long ago. Almost the entire surface has turned into a hot desert, tormented by dust storms, and in some areas of this world there is still a high background radiation."
 newfrontiers_terraforming_event.74.name: "[Target.GetName] not a Dead World Anymore!"
 newfrontiers_terraforming_event.74.desc: "The project to create an ecosystem on the planet [Target.GetName] has been successfully completed! There is now a stable and ever-evolving biosphere, lush jungles and green meadows everywhere, despite the still active tectonics of this young world."
 
 newfrontiers_terraforming_event.200.name: "[Root.GetName]: Significant consequences of water exports"
 newfrontiers_terraforming_event.200.desc.monsoon: "Significant losses of water resources for terraforming projects on uninhabitable worlds have led to significant changes in the climate of [Root.GetName]. The change in humidity has led to a greenhouse effect, which causes a hot climate to reign over the entire surface. Excessive vegetation and swamps cover the entire planet."
 newfrontiers_terraforming_event.200.desc.swamp: "$newfrontiers_terraforming_event.200.desc.monsoon$"
 newfrontiers_terraforming_event.200.desc.panthalassic: "Significant losses of water resources for terraforming projects on uninhabitable worlds have led to significant changes in the climate of [Root.GetName]. The change in humidity has resulted in the formation of a water world with a temperate climate. Almost the entire surface is covered by endless oceans with a scattering of many island archipelagos."
 newfrontiers_terraforming_event.200.desc.storm: "$newfrontiers_terraforming_event.200.desc.panthalassic$"
 newfrontiers_terraforming_event.200.desc.snow: "The significant loss of water resources for terraforming projects on uninhabitable worlds has led to significant changes in the climate of [Root.GetName]. The change in humidity has resulted in a cold world with many mountainous regions. High snow-capped peaks separate valleys with frozen lakes where frost-resistant plants can survive."
 
 
 
 
