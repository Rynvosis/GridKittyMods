 ####################################
 # Modifiers
 ####################################
 
 ####################################
 # Planet Modifiers
 ####################################
 
 nf_death_world: "死亡世界"
 nf_death_world_desc: "乍一看，这个星球似乎是一个天堂，但在这个世界虚假的美丽和诱人的丰饶外表下，只有死亡。动植物之间不断的生物竞争，迫使每一个物种都发展出致命的可怕特征。生物圈因此对殖民者充满敌意，但能够适应并生存下来的定居者将成为坚韧的战士。"
 ancient_cities: "古老城市"
 ancient_cities_desc: "这颗星球曾是一个高度发达文明的家园，昔日宏伟城市的废墟仍然遍布地表。对于想沉浸于历史奇迹中的考古学家来说，这里是一个天堂。"
 meteorite_showers: "陨石淋浴"
 meteorite_showers_desc: "这颗星球的大气层无法保护它免受经常性的流星雨的侵袭，因此它的表面经常受到大规模的撞击。"
 incessant_thunderstorm: "连续雷暴"
 incessant_thunderstorm_desc: "由于不稳定太阳活动和不均匀受热，该星球的大气层在不断地运动。猛烈的雷暴频繁在星球表面肆虐。"
 terrible_hurricanes: "恐怖飓风"
 terrible_hurricanes_desc: "该星球的表面温度变幻无常，为极端灾害性天气创造了有利的环境。可怕的风暴和龙卷风在许多地区不断肆虐，带来的只有混乱和破坏。"
 heavy_sandstorms: "无情沙暴"
 heavy_sandstorms_desc: "巨大而猛烈的沙尘暴席卷了这个星球，地表仅有的表层土壤被剥离殆尽。在这个星球上生存非常不易，但天然暴露的固体岩石为采矿作业提供了良好的机会。"
 heavy_blizzards: "密集暴雪"
 heavy_blizzards_desc: "星球几乎不断的暴风雪阻碍了通讯设施的运行，使殖民者的通讯往来变得非常困难，这就是为什么这个星球上的定居点会周期性地彼此隔绝。"
 prolonged_drought: "持久干旱"
 prolonged_drought_desc: "星球上的水资源极其稀缺，在太阳活动增强阶段，可能导致数十年之久的持续旱季。"
 toxic_atmosphere: "剧毒大气"
 toxic_atmosphere_desc: "该星球大气中存在非常罕见的有毒气体。殖民者冒险离开密封生活舱时不得不使用特殊的防护装备，但这种独特气体在生物研究方面带来了巨大的回报。"
 picturesque_rings: "绚丽星环"
 picturesque_rings_desc: "围绕着这颗星球的小行星环赋予了它令人叹为观止的外表。成群的游客都渴望来到这里，欣赏那不可思议的风景。"
 desynchronous_rings: "异步星环"
 desynchronous_rings_desc: "环绕这颗星球的星环有着与星球自转相反的运动方向和速度。这种奇怪的反常现象引起了科学界的兴趣，并展开了激烈的讨论。"
 long_night: "漫漫长夜"
 long_night_desc: "这颗星球上的极端日蚀由邻近的天体引起，这将导致一场持续数月的漫长夜晚。"
 eternal_night: "永恒之夜"
 eternal_night_desc: "由于恒星昏暗，这颗星球几乎总是笼罩在夜色中。低温和稀疏的植被导致地表条件非常恶劣，所有人都不愿意在此定居。"
 geomagnetic_storm: "地磁暴"
 geomagnetic_storm_desc: "母星的恒星风对地磁场造成强烈的混乱，导致星球表面的电磁异常，严重扰乱了殖民者的生产能力。"
 coriolis_storm: "科氏力风暴"
 coriolis_storm_desc: "这个星球的极端自转使得地表风速非常荒谬，从而形成破坏性的全球沙暴。"
 ion_storm: "离子风暴"
 ion_storm_desc: "这颗星球的磁场太过微弱，大量的宇宙粒子流不断地轰击着上层大气。"
 wild_hunt: "狂猎"
 wild_hunt_desc: "星球表面成群的掠食者在疯狂猎杀。这里的所有种群最终都会屈服于这些野生动物。"
 insatiable_swarm: "贪婪虫群"
 insatiable_swarm_desc: "成群的可怕昆虫从星球表面的巢穴中蜂拥而出，疯狂觅食。这里的任何殖民者最终都会屈服于这些生物。"
 abyssal_devourers: "深渊巨口"
 abyssal_devourers_desc: "在这个星球的大洋深处，可怕的海怪会吞噬所有阻碍它们前进的东西。这里的任何殖民者最终都会屈服于这些深不可测的恐怖之中。"
 sea_monsters: "海中巨怪"
 sea_monsters_desc: "大洋深处的海怪已经涌现，不断威胁着所有星球上的定居点。不幸的是，这些利维坦似乎发现这些殖民者特别美味，时不时会回来享用盛宴。"
 tremor_earth: "破土而出"
 tremor_earth_desc: "巨大的怪兽突然出现在定居点中，并对定居点造成严重的破坏。"
 vast_beasts: "巨兽横行"
 vast_beasts_desc: "成群的巨兽已经离开了它们的藏身之地，任何挡道的东西都被它们践踏摧毁。"
 iron_planet: "铁质星球"
 iron_planet_desc: "这颗铁星几乎完全由一个金属内核组成，其地幔层薄到几乎没有。"
 coreless_planet: "无核星球"
 coreless_planet_desc: "这颗星球完全没有金属内核，整个星球只有一层巨大的地幔，所以它根本没有磁场。"
 old_star: "年老恒星"
 old_star_desc: "这颗恒星正处于演化的最后阶段，其内部的氢几乎完全燃烧殆尽。"
 cold_subdwarf: "冷亚矮星"
 cold_subdwarf_desc: "这些都是非常古老，低质量的含重元素恒星，它们属于第一代恒星，事实上是创世之初的遗留物，能存活至今不过是因为质量很小。冷亚矮星属于G至M级，特点是金属丰度低。"
 hot_subdwarf: "热亚矮星"
 hot_subdwarf_desc: "这些是B级和O级恒星。它们出现在一些恒星演化的晚期阶段。热亚矮星是红巨星在其引力中心附近开始涉及氦气的反应之前，在外层失去氢气形成的。"
 rich_rings: "富矿星环"
 rich_rings_desc: "这颗星球的星环富含高品质矿藏。"
 diamond_rings: "钻石星环"
 diamond_rings_desc: "这颗星球的星环富含钻石和其他珍奇矿藏。"
 active_processes: "在途核变"
 active_processes_desc: "这颗褐矮星的内核表现出了活跃的核反应，尽管根据现有物理定律这是不可能发生的。"
 planemo: "行质天体"
 planemo_desc: "这颗红矮星的热核活动很低，接近于褐矮星的早期阶段。随着未来数十亿年的冷却，这颗晚期M型矮星将成为典型的L级褐矮星。"
 hot_jupiter: "热木星"
 hot_jupiter_desc: "这颗气态巨星离它的母星太近了，它的表面被加热到了骇人的温度，大气逐渐蒸发。未来，这个气态巨星的大气将演变出一种松散、不稳定的化学成分。"
 puffy_planet: "气胀星球"
 puffy_planet_desc: "这颗星球离恒星非常近，质量也不大，星球没有因为引力而停止受热，这导致了其强烈的热膨胀，星球密度也下降到一个极低的值。在未来这颗星球会更像一团无法聚拢的气体云，这个气态巨星将会被完全蒸发，或者留下一个固体内核，成为一颗星骸。"
 alien_star: "奇异恒星"
 alien_star_desc: "这颗恒星诞生于一个系外星团中，现在只能作为一个无声的提醒，提醒它自己因星系碰撞而屈辱的死亡。"
 beautiful_sky: "绚丽天空"
 beautiful_sky_desc: "这颗行星的星系处在一片非常美丽而明亮的星云中。许多游客都盼望着一饱眼福。"
 apocalypse: "末世天劫"
 apocalypse_desc: "这颗星球面临着一场可怕的大灾难，将摧毁其表面所有的生命。星球的居民必须立即离开，否则就来不及了。"
 protective_equipment: "保护性设备"
 protective_equipment_desc: "作为提高殖民地生存能力项目的一部分，星球上的每一个殖民者都获得了能够承受这个恶劣世界条件的设备。"
 secret_disaster: "一无所知"
 secret_disaster_desc: "这个星球的居民不知道他们的世界正面临着可怕的命运。"
 moon_collision: "卫星撞击"
 moon_collision_desc: "很快这个卫星就会被灾难击中。它的轨道将会改变，与母行星的碰撞将不可避免。"
 moon_fall: "卫星陨落"
 moon_fall_desc: "这颗卫星很快就会撞上行星表面，全球范围内将会造成一场巨大灾难。"
 orbit_reduction: "轨道收缩"
 orbit_reduction_desc: "这颗星球的公转轨道正在缩小。它正迅速接近它的母恒星。"
 orbit_increase: "轨道扩展"
 orbit_increase_desc: "这颗星球的公转轨道不断增大。它正迅速远离母恒星。"
 volcanic_activity: "火山活动"
 volcanic_activity_desc: "这颗星球将被表面上越来越活跃的火山摧毁。有毒气体的不断排放很快就会使它变得不再适合居住。"
 production_boost: "产能刺激"
 production_boost_desc: "这个星球上所有生产原材料的行业领域都在经历着前所未有的产能增长。"
 significant_damage: "严重损坏"
 significant_damage_desc: "这个星球上发生了一起严重事件。需要时间来修理它造成的损坏。"
 melting_glaciers: "冰川融化"
 melting_glaciers_desc: "星球上最后的冰川随着漫长冰河时代的结束而融化。每个月都会有越来越多的宜居地区从消退的冰川中出现。"
 new_home: "新家园"
 new_home_desc: "建立新家园后，生产积极增长，未开发领地的发展速度创下新高。"
 preserve_planet: "Planet-preserve"
 preserve_planet_desc: "This world has been declared a protected natural area. Mineral extraction and any industrial activity are prohibited. Civil society has committed to meticulously preserving this unique natural environment."
 civil_disobedience: "Civil Disobedience"
 civil_disobedience_desc: "Civil society in the empire reacted very strongly to the refusal to grant special protection to the ecosystem of this unique place. Active protests by environmentalists are taking place across the planet."
 rejected_beauty: "Rejected Beauty"
 rejected_beauty_desc: "The Empire's inhabitants are frustrated by the news broadcast by environmentalists. Colorful reports from an exotic planet about how yet another beautiful corner of the galaxy will be lost forever are fueling melancholy and despondency."
 environmentalists_protests: "Environmentalists Protests"
 environmentalists_protests_desc: "Environmental protests have taken a serious turn around the world. Activists are attacking factories and blocking production. Discontent is flaring up across the planet."
 