  pc_sterile: "Sterile World"
  pc_sterile_desc: "A rocky world with a nitrogen-oxygen atmosphere and an almost complete absence of complex life forms. Extreme conditions on the surface are caused by a sharp temperature drop and an atmosphere mixed with various harmful gases from volcanic activity."
  
