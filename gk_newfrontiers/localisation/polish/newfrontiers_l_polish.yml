  trait_subterranean: "Subterranean"
  trait_subterranean_desc: "§LThis species has lived underground for a long time and is accustomed to cramped quarters.§!\n"
  
  trait_pc_sterile_preference: "Sterile World Preference"
  trait_pc_sterile_preference_desc: "$trait_pc_arctic_preference_desc$"
  
  
