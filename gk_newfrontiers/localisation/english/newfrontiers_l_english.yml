l_english:
 
  ####################################
  # Planet Decision
  ####################################

  decision_ark_project: "Launch the Ark project"
  decision_ark_project_desc: "Our homeworld will be destroyed by catastrophe. One of the measures proposed to save our civilization was the Ark project. A huge colonial ship, provided with everything for long flights, will embark in search of a new home."
  decision_ark_project_effect_desc: "The construction of the Ark spaceship will begin.\n\n§YAfter the planet dies, the Ark will become a new empire. If the Ark colonizes a new world before the planet is destroyed, a new empire will be created. You will be able to choose which empire you continue to rule.§!"
  decision_planetary_excavation: "Start planetary excavation"
  decision_planetary_excavation_desc: "Underneath the overgrown surface of this ancient world are the ruins of a huge planetary city. Planetary excavations will destroy the natural beauty of this world, but this is a necessary step to study valuable long-lost technologies and ultimately restore the former greatness of the planet."
  decision_planetary_excavation_effect_desc: "Turns the planet into §Y$pc_relic$§!."
  decision_start_ecosystem_creation_project_effect_desc: "Triggers a special terraforming process. To progress, you will need various terraforming structures."
  
  
  ####################################
  # Origins
  ####################################
  
  origin_subterranean: "Subterranean"
  origin_subterranean_desc: "The change in the activity of the sun turned the homeworld of this civilization into a lifeless wasteland and they had to go deep underground. For many centuries they dug tunnels and built cities, until they finally realized that this underground crypt could not be their home forever."
  origin_scavengers: "Scavengers"
  origin_scavengers_desc: "It is still not known exactly how this civilization found a home on a devastated world. It is known only that the industrial ruins were not created by them. Maybe the ancient masters of this planet brought them in as pets or slaves. However, they were able to adapt and quickly developed by studying the abandoned technology of this planet. "
  civic_tooltip_scavengers_effects: "You start the game in §YDepleted World§!, which contains §Y$d_subway_tunnel_network$§!.\nYou have the ability to receive £alloys£ §Yalloys§! after clearing the §Y$d_industrial_boneyard$§! blockers."
  origin_ark: "Ark"
  origin_ark_desc: "The homeworld of this civilization was destroyed. In search of a new home, a few survivors boarded a giant spaceship and braved a long journey through endless void."
  civic_tooltip_ark_effects: "You start the game with one single ship, the §YSpace Ark§!, in orbit of your destroyed homeworld. You need to bring the Ark into orbit of a habitable planet that you want to make the capital of your empire."
  
  
