  zone_food_volcanic: "Agricultural Focus"
  zone_food_volcanic_desc: "Terraced beds of volcanic soil climb the caldera walls, warmed from below and fed by ash the mountain has been laying down for millennia."
  zone_food_volcanic_unavailable: "§HSpecialization Requires:§!\n$primal_world$"
  district_vault: "Vault Complex"
  district_vault_plural: "Vault Complexes"
  district_vault_desc: "Nothing grows on the surface, so everything of value is carried below it. Sealed galleries cut into dead rock hold whatever the colony cannot afford to lose, and the crews who keep the ledgers rarely see daylight."
  mod_district_vault_max_add: "Max $district_vault_plural$"
  zone_vault_hydroponics: "Hydroponics Vault"
  zone_vault_hydroponics_desc: "Racked trays under artificial suns, fed by water the planet never had. Nothing here grew from soil, and every calorie is accounted for."
  zone_vault_archive: "Archive Vault"
  zone_vault_archive_desc: "A dead world keeps records well. No weather, no roots, no rot, only cold stone and the patient work of cataloguing what the galaxy would rather forget."
  zone_vault_stockpile: "Stockpile Vault"
  zone_vault_stockpile_desc: "Gallery after gallery of sealed containers, logged twice and traded thrice. When the empire runs short this is where it looks first, and the brokers who work the vault rarely see daylight."
  zone_vault_garrison: "Garrison Vault"
  zone_vault_garrison_desc: "Barracks sunk into bedrock, proof against bombardment and siege alike. A world with nothing to burn is a difficult world to take."
