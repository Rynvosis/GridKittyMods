l_french:
 
 #bloker deposits
 
 d_dune_sea: "Dune Sea"
 d_dune_sea_desc: "The huge dune sea stretches for hundreds of kilometers, covering the region with moving sands."
 d_thick_forest: "Thick Forest"
 d_thick_forest_desc: "This harsh region is covered with dense coniferous forests and waterlogged windbreaks, which are very difficult to overcome."
 d_large_ice_ridge: "Large Ice Ridge"
 d_large_ice_ridge_desc: "This ice barrier rises high up like a mountain range."
 d_blocked_tunnell: "Blocked Tunnel"
 d_blocked_tunnell_desc: "This natural tunnel collapsed and blocked a passage leading to the vast cave."
 d_ice_crust: "Ice Crust"
 d_ice_crust_desc: "A natural cave is sealed off by a thick layer of ice."
 d_industrial_boneyard: "Iindustrial Boneyard"
 d_industrial_boneyard_desc: "This region is covered by many abandoned metal structures and radioactive waste landfills."
 d_igneous_traps: "Igneous Traps"
 d_igneous_traps_desc: "From the numerous cracks in this region, colossal lava flows are constantly pouring out, filling huge areas. Lava rivers first fill gorges and natural depressions, and then flow into flat areas."
 d_exofungus_contamination: "Exofungus Contamination"
 d_exofungus_contamination_desc: "$exofungus_blocker_desc$"
 
 #event bloker deposits
 
 d_rusty_debris: "Rusty Debris"
 d_rusty_debris_desc: "Giant mountains of ancient machinery wreckage are grim evidence of the old battles of primitive machines."
 d_giant_fossils: "Giant Fossils"
 d_giant_fossils_desc: "An extensive graveyard of the bones of huge organic creatures that inhabited this once blooming world."
 
 #planet deposits
 
 d_turbulent_currents: "Turbulent Currents"
 d_turbulent_currents_desc: "There is a very strong and constant current in this region of the ocean."
 d_underground_springs: "Underground Springs"
 d_underground_springs_desc: "These caves are thermal springs of groundwater, which are heated by the bowels of the planet."
 d_salt_flat: "Salt Flat"
 d_salt_flat_desc: "Once upon a time there was an ocean here, but it has long dried up into hundreds of kilometers of salt flats."
 d_peat_moors: "Peat Moors"
 d_peat_moors_desc: "These vast swamps are rich deposits of peat that can serve as excellent fuel for power plants."
 d_submerged_gas_eruption: "Submerged gas emissions"
 d_submerged_gas_eruption_desc: "In this region of the ocean floor, various gases are released, which accumulate under the surface as a result of the planet's internal geological processes."
 d_ice_geyser: "Ice Geyser"
 d_ice_geyser_desc: "In this place, from under the ice crust of the planet, huge fountains of water are thrown onto the surface under pressure."
 d_gaseous_eruption: "Gaseous Eruption"
 d_gaseous_eruption_desc: "Various gases are emitted from giant faults, which accumulate under the surface of the planet as a result of geological processes."
 d_scorched_badlands: "Scorched Badlands"
 d_scorched_badlands_desc: "Night never falls in this region. The scorching sun heats the surface and the air to monstrous temperatures, rendering this region lifeless, but this place has enormous energy potential."
 d_offshore_fields: "Offshore Fields"
 d_offshore_fields_desc: "This mineral-rich oceanic plateau has risen from the depths to shallow waters as a result of geological processes."
 d_abundant_atoll: "Abundant Atoll"
 d_abundant_atoll_desc: "In the depths of this ancient coral formation, many valuable minerals have been accumulated."
 d_rich_lodes: "Rich Lodes"
 d_rich_lodes_desc: "This region of underground caves is replete with deposits of various minerals."
 d_seagrass_shelf: "Seagrass Shelf"
 d_seagrass_shelf_desc: "This shallow water region is covered with vast fields of sea grass."
 d_kelp_forest: "Kelp Forest"
 d_kelp_forest_desc: "This ocean area is a unique biome with a wide variety of marine life."
 d_estuary_meadows: "Estuary Meadows"
 d_estuary_meadows_desc: "The region's vast river deltas form large irrigated fields that are excellent for agriculture."
 d_huge_tree: "Huge Tree"
 d_huge_tree_desc: "Trees of colossal size form a unique biome housing a huge variety of life."
 d_underground_reservoir: "Underground Reservoir"
 d_underground_reservoir_desc: "On the shores and under the surface of this underground lake, an amazing biome blooming with a variety has formed."
 
 #rare deposits
 
 d_great_vortex: "Great Vortex"
 d_great_vortex_desc: "The significant circulation of air masses in this region gave rise to a giant tornado."
 d_stormy_water: "Stormy Water"
 d_stormy_water_desc: "The crossing of air currents in this ocean region forms a monstrous storm."
 d_sand_worm: "Sand Worm"
 d_sand_worm_desc: "This vast desert has a master who it is better not to bother."
 d_grand_canyon: "Grand Canyon"
 d_grand_canyon_desc: "A deep, picturesque canyon with many branches and gorges stretches for thousands of kilometers."
 d_vast_crevasse: "Vast Crevasse"
 d_vast_crevasse_desc: "A deep crack has formed in the massive shell of the relic glacier."
 d_maze_cliff_formations: "Maze Cliff Formations"
 d_maze_cliff_formations_desc: "The erosion of volcanic rocks in shallow waters has created bizarre rocky reliefs. The surf and many grottoes form a dense fog that covers the entire area."
 d_boneyard: "Boneyard"
 d_boneyard_desc: "Many bones of the giant inhabitants of this world keep the secret of a long-past disaster."
 d_ancient_ruins: "Ancient Ruins"
 d_ancient_ruins_desc: "In this valley, bizarre remnants of a long-forgotten era stretch to the very edge of the horizon."
 d_relic_landfill: "Relic Landfill"
 d_relic_landfill_desc: "Mountains of technological waste, thrown here by some ancient highly developed civilization."
 d_levitating_rocks: "Levitating Rocks"
 d_levitating_rocks_desc: "Unknown physical processes cause these massive rocks to float chaotically above the surface."
 d_karst_cave: "Karst Cave"
 d_karst_cave_desc: "An extensive network of deep underground caves with their own ecosystem."
 d_serene_coastline: "Serene Coastline"
 d_serene_coastline_desc: "Fascinating nature, golden beaches and an alluring ocean. This extraordinarily beautiful place is perfect for relaxation."
 
 #starting deposits
 
 d_urban_agglomeration: "Urban Agglomeration"
 d_urban_agglomeration_desc: "Many megacities of the planet have united into a single infrastructure cluster."
 d_reactor_zone: "Reactor Zone"
 d_reactor_zone_desc: "The entire infrastructure of this region is aimed at maintaining the stable operation of powerful thermonuclear reactors."
 d_reserve_deposits: "Reserve Deposits"
 d_reserve_deposits_desc: "Some discovered deposits of the planet were mothballed and remained untouched for a long time."
 d_deep_ore_mines: "Deep Ore Mines"
 d_deep_ore_mines_desc: "A large infrastructure network for the extraction of minerals from the bowels of the planet."
 d_rich_abyss: "Rich Abyss"
 d_rich_abyss_desc: "In the deepest regions of the ocean, there is a huge amount of untouched mineral resources."
 d_hydroponic_complex: "Hydroponic Complex"
 d_hydroponic_complex_desc: "These agricultural facilities are capable of growing various food crops without the need for fertile soil."
 d_agrothermal_plains: "Agrothermal Plains"
 d_agrothermal_plains_desc: "With special thermal reclamation measures, this cold region has been converted for agriculture."
 d_converted_lands: "Converted Lands"
 d_converted_lands_desc: "These areas were cleared of jungle and turned into fertile fields with fertilizers."
 d_irrigated_fields: "Irrigated Fields"
 d_irrigated_fields_desc: "The infrastructure of this once desert region is aimed at maintaining sufficient water for the soil."
 d_agrarian_dome: "Agrarian Dome"
 d_agrarian_dome_desc: "This dome is specially designed to maintain a favorable climate and soil for agricultural needs."
 d_algae_tracts: "Algae Tracts"
 d_algae_tracts_desc: "$d_pacific_algae_tracts_desc$"
 
 #special deposits
 
 d_subway_tunnel_network: "Subway Tunnel Network"
 d_subway_tunnel_network_desc: "This old network of planet-spanning transport tunnels, left over from the previous owners of the planet, now serves as a shelter from the radioactive rains."
 d_remains_of_ark: "Remains of the Ark"
 d_remains_of_ark_desc: "These are the remains of the Ark, which landed on the Planet and served as the foundation of a new colony. This is a memorial serving as a reminder of the civilization that once inhabited this world."
 d_settler_camp: "Settler Camp"
 d_settler_camp_desc: "The inhabitants of the Ark erected this vast settlement in a short time from scrap materials."
 d_ancient_temple_ruins: "Ancient Temple Ruins"
 d_ancient_temple_ruins_desc: "The mysterious temple of the old gods attracts pilgrims, scientists and representatives of various sects."
 d_enigmatic_remnants: "Enigmatic Remnants"
 d_enigmatic_remnants_desc: "The vast ruins of the agglomerate of ancient cities of a forgotten era covered with sand are the dream of any archaeologist."
 d_medicinal_algae: "Medicinal Algae"
 d_medicinal_algae_desc: "A unique species of algae has been discovered in this region, with healing properties surpassing many modern medications. This valuable resource significantly increases global trade and opens up new opportunities for biologists and the pharmaceutical industry."
 d_crystalline_array: "Crystalline Array"
 d_crystalline_array_desc: "The enormous crystalline formations in this region are absolutely unique and unparalleled in the galaxy. This place contains a virtually inexhaustible resource of rare crystals and minerals."
 
 #event deposits
 
 d_collapsed_caves: "Collapsed Cave"
 d_collapsed_caves_desc: "The subterranean tunnels in this area have collapsed."
 d_sunken_cavity: "Sunken Cavity"
 d_sunken_cavity_desc: "This region of glacial caves has been completely flooded by ocean waters."
 d_troubled_waters: "Troubled Waters"
 d_troubled_waters_desc: "The vigorous activity of the massive lifeforms in this area has led to serious anomalies in water currents and the appearance of whirlpools."
 d_dooms_rift: "Doom's Rift"
 d_dooms_rift_desc: "A large number of massive lifeforms emerged from the ground in this region, leaving behind a deep and wide fissure in the land."
 d_destruction_marks: "Destruction Marks"
 d_destruction_marks_desc: "The herds of massive lifeforms that passed through this area left destruction in their wake."

