 ####################################
 # Modifiers
 ####################################
 
 ####################################
 # Planet Modifiers
 ####################################
 
 nf_death_world: "Death World"
 nf_death_world_desc: "At first glance, this planet may seem like a paradise, but beneath the treacherous beauty and enticing richness of this world lies nothing but death. Constant biological competition between flora and fauna forces every species to develop deadly and horrific features. The biosphere is thus hostile towards colonizers, but settlers who are able to adapt and survive will emerge as hardened warriors."
 ancient_cities: "Ancient Cities"
 ancient_cities_desc: "This planet was once home to an highly developed civilization, and the ruins of its once great-cities still dot the surface. It is a paradise for archaeologists who want to immerse themselves in the wonders of history."
 toxic_atmosphere: "Toxic Atmosphere"
 toxic_atmosphere_desc: "There are very rare and toxic gases in the atmosphere of this planet. Colonists  would be forced to use special protective equipment to venture beyond sealed living modules, but the unique gases promise great rewards in terms of biological research."
 picturesque_rings: "Picturesque Rings"
 picturesque_rings_desc: "The asteroid ring that surrounds this planet gives it an awe-inspiring appearance. Crowds of tourists are eager to flock here to experience the incredible scenery."
 desynchronous_rings: "Misaligned Rings"
 desynchronous_rings_desc: "The multiple asteroid rings around this planet differ in speed and tilt. This strange anomaly arouses interest in scientific circles and by itself provokes heated theories."
 long_night: "Long Night"
 long_night_desc: "Caused by the neighboring celestial bodies, the solar eclipses on this planet can last several months."
 eternal_night: "Eternal Night"
 eternal_night_desc: "Because of its star's dimness, the planet is almost always shrouded in night. The low temperatures and sparse vegetation lead to very harsh conditions on the surface for anyone willing to settle."
 iron_planet: "Iron Planet"
 iron_planet_desc: "The planet’s outher mantle is nearly absent, almost entirely revealing the metal core."
 coreless_planet: "Coreless Planet"
 coreless_planet_desc: "This planet has no metal core. The entire planet consists only of a thick mantle and completely lacks any magnetic field."
 old_star: "Old Star"
 old_star_desc: "This star is in the final stage of its evolution, its hydrogen almost completely burned out."
 cold_subdwarf: "Cold Subdwarf"
 cold_subdwarf_desc: "These are very old, low-mass stars with heavy elements. They belong to the first generation of stars and are, in fact, relics from the very beginning of creation. They have survived into the present thanks only to their small mass. Cold subdwarfs belong to classes G to M and are characterized by low metallicity."
 hot_subdwarf: "Hot Subdwarf"
 hot_subdwarf_desc: "These are class B and O stars. They occur in the late evolutionary stage of some stars. A hot subdwarf is formed when a red giant loses hydrogen from its outer layers before reactions involving helium begin near its gravitational center."
 rich_rings: "Rich Rings"
 rich_rings_desc: "This planet's rings are rich in valuable minerals."
 diamond_rings: "Diamond Rings"
 diamond_rings_desc: "The planet's rings are rich in deposits of diamonds and other precious stones."
 active_processes: "Active Processes"
 active_processes_desc: "This brown dwarf shows active nuclear reactions, although under all known physical laws this should not happen."
 planemo: "Planemo"
 planemo_desc: "The thermonuclear activity of this red dwarf is low, bordering the early stage of a brown dwarf. As it cools down over the next billions of years, this late M dwarf will become a characteristic class L brown dwarf."
 hot_jupiter: "Hot Jupiter"
 hot_jupiter_desc: "This gas giant is too close to its parent star, heating its surface to monstrous temperatures and gradually vaporizing the atmosphere. In the future, this gas giant will develop a loose, unstable chemical composition."
 puffy_planet: "Bloated Planet"
 puffy_planet_desc: "Being very close to its star, the planet's gravity could not counter its thermal expansion. Its density has dropped to extremely low values, making it more of a gas giant than a solid planet. In the future it could vaporize completely or leave behind only a solid core, becoming a chthonic planet."
 alien_star: "Alien Star"
 alien_star_desc: "This star was born in an alien cluster, and now serves only as a silent reminder of its own inglorious death as the result of a galactic collision."