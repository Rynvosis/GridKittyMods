 ####################################
 # Modifiers
 ####################################
 
 ####################################
 # Planet Modifiers
 ####################################
 
 nf_death_world: "죽음의 행성"
 nf_death_world_desc: "처음에는, 이 행성은 낙원같았습니다. 하지만 그 매력적인 아름다움과 풍요로움의 밑에는 죽음 뿐입니다. 동식물간의 끊임없는 생물학적 경쟁으로 인해 모든 생명체가 치명적이고 끔찍한 능력을 발전시키게 되었습니다. 따라서 이 곳의 생물권은 개척자들에게 가혹하겠지만, 적응하고 살아남을 수 있는 정착민들은 강한 전사로 거듭날 것입니다."
 ancient_cities: "고대의 도시"
 ancient_cities_desc: "이 행성은 한 때 고등 문명의 고향이었고, 과거 위대했던 도시의 폐허가 여전히 행성에 퍼져있습니다. 역사의 경이로움에 빠지고 싶어하는 고고학자들에게는 낙원입니다."
 meteorite_showers: "운석우"
 meteorite_showers_desc: "이 행성의 대기층은 주기적인 운석우를 막아낼 능력이 없습니다. 따라서 이 곳의 지표면은 항상 광범위한 운석 폭격에 노출되어있습니다."
 incessant_thunderstorm: "끊임없는 뇌우"
 incessant_thunderstorm_desc: "불안정한 항성의 활동과 불규칙적인 가열 때문에, 이 행성의 대기는 끊임없이 움직입니다. 강력한 뇌우가 빈번하게 나타나 행성의 지표면에 분노를 토해내고 있습니다."
 terrible_hurricanes: "끔찍한 폭풍"
 terrible_hurricanes_desc: "이 곳의 지표면의 온도는 빠르게 변하하기 때문에, 극단적인 기후 현상이 잘 일어납니다. 끔찍한 폭풍과 회오리바람이 많은 지역에서 계속 발생하고 파괴와 혼돈을 가져옵니다."
 heavy_sandstorms: "계속되는 모래 폭풍"
 heavy_sandstorms_desc: "거대하고 극심한 모래 폭풍이 불면서 이 행성의 지표면 전체에 작은 표토를 흩뿌립니다. 이 행성에서 살아남는 것은 쉬운 일이 아니지만, 단단한 돌이 자연에 드러나있기 때문에 채굴하기에는 좋은 기회입니다."
 heavy_blizzards: "극심한 눈보라"
 heavy_blizzards_desc: "사실상 끊임없는 눈폭풍과 눈보라가 통신을 발해하여, 이 행성과의 통신을 주기적으로 끊어버립니다."
 prolonged_drought: "장기 가뭄"
 prolonged_drought_desc: "행성의 수자원이 매우 부족하기 때문에, 태양 활동이 고조되는 동안 수십년간 이어질 수도 있는 가뭄의 계절이 도래합니다."
 toxic_atmosphere: "독성 대기"
 toxic_atmosphere_desc: "이 행성의 대기에는 매우 희귀한 독성 가스가 존재합니다. 개척자들은 봉쇄된 거주 모듈 바깥으로 나가려면 특수한 보호 장비를 착용해야 하지만, 그 독특한 가스는 생물학적 연구의 측면에서 상당한 도움이 됩니다."
 picturesque_rings: "그림 같은 고리"
 picturesque_rings_desc: "이 행성을 둘러싼 소행성 고리의 모습은 경외심을 불러 일으킵니다. 관광객들은 이 놀라운 광경을 경험하기 위해 이곳으로 몰려듭니다."
 desynchronous_rings: "어긋난 고리"
 desynchronous_rings_desc: "이 행성을 둘러싸고 있는 다양한 소행성 고리는 저마다 속도와 각도가 다릅니다. 이 이상한 현상은 과학계의 흥미를 불러일으키며 그 자체로도 열띤 학설들의 원인이 됩니다."
 long_night: "긴 밤"
 long_night_desc: "근처의 천체에 의해 발생하는 일식이 수개월 간 지속될 수도 있습니다."
 eternal_night: "영원한 밤"
 eternal_night_desc: "별의 어두움 때문에, 행성은 거의 항상 밤의 장막에 갇혀 있습니다. 낮은 기온과 희박한 식물들 때문에 환경이 매우 혹독하며 아무도 이곳에 정착하고 싶어하지 않습니다."
 geomagnetic_storm: "지자기적 폭풍"
 geomagnetic_storm_desc: "모천체의 태양풍 때문에 자기권이 크게 요동칩니다. 이에 따라, 전자기적 이상현상이 행성의 생산 능력을 저해합니다."
 coriolis_storm: "코리올리 폭풍"
 coriolis_storm_desc: "이 행성의 자전으로 인해 터무니 없는 속도의 바람이 불며, 결과적으로 전국적인 모래 폭풍이 행성을 휩쓸고 있습니다."
 ion_storm: "이온 폭풍"
 ion_storm_desc: "행성의 약한 자기권으로 인해, 우주 입자들이 대기 상층부를 파괴하고 있습니다."
 wild_hunt: "유령 사냥"
 wild_hunt_desc: "행성의 포식자 무리가 광란의 사냥을 벌이고 있습니다. 이곳의 모든 식민지는 결국 야생동물의 앞에 무릎 꿇을 것입니다."
 insatiable_swarm: "탐욕스러운 벌레"
 insatiable_swarm_desc: "괴물같은 벌레들이 둥지에서 나타나 미친듯이 먹이를 찾고 있습니다. 이곳의 모든 식민지는 결국 야생동물의 앞에 무릎 꿇을 것입니다."
 abyssal_devourers: "심연의 아귀"
 abyssal_devourers_desc: "바다 저 깊은 곳에 사는 끔찍한 괴물이 눈 앞의 모든 것을 먹어 치웁니다. 이곳의 모든 식민지는 결국 야생동물의 앞에 무릎 꿇을 것입니다."
 sea_monsters: "바다 괴물"
 sea_monsters_desc: "저 깊은 곳으로부터 바다 괴물이 나타나 행성의 해양 정착지가 공포에 떨고 있습니다. 안타깝게도, 그 레비아탄들은 개척자들에 맛을 들여서 정기적으로 배를 채우려 돌아옵니다."
 tremor_earth: "떨리는 대지"
 tremor_earth_desc: "거대한 괴물이 정착지 한복판에서 나타나 끔찍한 파괴를 남겼습니다."
 vast_beasts: "베헤모스"
 vast_beasts_desc: "거대한 괴물들이 자신의 은신처에서 나와 눈 앞의 모든 것을 파괴하고 있습니다."
 iron_planet: "철의 행성"
 iron_planet_desc: "행성의 외부 맨틀은 거의 존재하지 않으며, 행성의 금속 핵을 거의 다 드러냈습니다."
 coreless_planet: "핵이 없는 행성"
 coreless_planet_desc: "이 행성에는 금속 핵지 존재하지 않습니다. 행성 전체가 두꺼운 맨틀로만 이루어져 있으며 자기장이 전혀 없습니다."
 old_star: "오래된 별"
 old_star_desc: "이 별은 진화의 마지막 단계를 겪고 있으며, 별 내부의 수소가 거의 완전히 소모되었습니다."
 cold_subdwarf: "차가운 준왜성"
 cold_subdwarf_desc: "중원소를 가지는 매우 오래된 저질량 행성들입니다. 이것들은 별들 중 첫 번째 세대이며, 사실 창조의 시작에서 태어난 유물입니다. 이제까지 낮은 질량 덕분에 살아남아 있으며, G형에서 M형에 속하는 차가운 준왜성들의 특징은 낮은 금속성입니다."
 hot_subdwarf: "뜨거운 준왜성"
 hot_subdwarf_desc: "B형과 O형 항성들입니다. 몇몇 별들의 마지막 진화 단계에서 태어나는데, 적생 거성의 중력 중심 근처에서 헬륭 반응이 일어나기 전, 외층의 수소가 다 소모되면 형성되는 것들입니다."
 rich_rings: "풍부한 고리"
 rich_rings_desc: "이 행성의 고리에는 귀중한 광물이 풍부합니다."
 diamond_rings: "다이아몬드 고리"
 diamond_rings_desc: "행성의 고리에 다이아몬드와 다른 보석들이 풍부합니다."
 active_processes: "활발한 과정"
 active_processes_desc: "이 갈색 왜성은 활발한 핵반응을 보이지만, 알려진 물리 법칙에 따르면 이 반응은 일어나서는 안됩니다."
 planemo: "플라네모"
 planemo_desc: "이 적색왜성의 열핵 반응은 약하고, 갈색왜성의 초기 단계에 가깝습니다. 향후 수십억년 간 냉각되면서 이 M형 왜성은 특유의 L형 갈색왜성이 될 것입니다."
 hot_jupiter: "뜨거운 목성"
 hot_jupiter_desc: "이 거대 가스 행성은 모항성에 너무 가까이 있어, 그 표면은 말도 안되게 뜨겁고 대기가 점점 증발하고 있습니다. 나중에 이 거대 가스 행성은 유리된 불안정한 화합물을 만들어낼 것입니다."
 puffy_planet: "부풀어오른 행성"
 puffy_planet_desc: "별에 매우 가까이 있기 때문에, 행성의 중력이 열팽창을 이길 수 없었습니다. 밀도는 극히 낮아졌고, 이 정도면 거대 가스 행성이 더 단단한 행성처럼 보일 정도입니다. 나중에, 이 행성은 완전히 증발해버릴 수도 있고, 아니면 단단한 핵만 남게될지도 모릅니다."
 alien_star: "외계의 별"
 alien_star_desc: "이 별은 외계 성단에서 탄생했으며, 이제는 은하 충돌로 수치스럽게 죽어버린 자신의 은하를 조용히 기억하는 유일한 존재일 뿐입니다."
 beautiful_sky: "아름다운 하늘"
 beautiful_sky_desc: "이 행성의 성계에는 매우 아름답고 밝은 성운이 존재합니다. 수많은 여행자들이 이 장관을 보러옵니다."
 apocalypse: "종말"
 apocalypse_desc: "이 행성에 재앙이 일어났으며, 모든 생명체가 파괴되었습니다. 늦기전에 모두 대피해야합니다."
 protective_equipment: "보호 장비"
 protective_equipment_desc: "식민지의 생존성을 높이기 위한 프로젝트의 일환으로, 모든 개척자들에게 행성의 혹독한 조건을 버틸 수 있는 장비가 제공되었습니다."
 secret_disaster: "감추어진 재앙"
 secret_disaster_desc: "이 행성의 주민들은 자신이 마주하게될 끔찍한 운명을 모르고 있습니다."
 moon_collision: "충돌하는 위성"
 moon_collision_desc: "곧 이 위성이 재앙을 맞이할 것입니다. 궤도가 바뀔 것이며 모천체와의 충돌은 피할 수 없습니다."
 moon_fall: "추락하는 위성"
 moon_fall_desc: "이 위성이 곧 행성의 지표면에 처박힐 것입니다. 대규모의 재앙이 일어날 것입니다."
 orbit_reduction: "줄어드는 궤도"
 orbit_reduction_desc: "이 행성의 궤도가 줄어들고 있습니다. 항성과 빠르게 가까워지고 있습니다."
 orbit_increase: "늘어나는 궤도"
 orbit_increase_desc: "이 행성의 궤도가 늘어나고 있습니다. 천체로부터 빠르게 멀어지고 있습니다."
 volcanic_activity: "화산 활동"
 volcanic_activity_desc: "지표면에서 늘어나는 화산 활동으로 인해 이 행성은 곧 황폐화될 것입니다. 독성 가스가 계속 뿜어져나오고 있으며, 이곳은 거주 불가능 행성으로 바뀔 것입니다."
 production_boost: "생산 증가"
 production_boost_desc: "원자재를 생산하고 있는 이 행성의 모든 섹터의 생산량이 증가했습니다."
 significant_damage: "심각한 피해"
 significant_damage_desc: "이 행성에서 큰 사고가 일어났습니다. 피해를 고치려면 시간이 걸릴 것입니다."
 melting_glaciers: "녹아내리는 빙하"
 melting_glaciers_desc: "기나긴 빙하기의 끝에 행성의 마지막 빙하가 녹아내리고 있습니다. 매달 얼음이 녹고 있으며, 점점 더 많은 지역이 살만 해지고 있습니다."
 new_home: "새로운 고향"
 new_home_desc: "새로운 고향을 얻음으로써, 생산 능력의 활발한 성장과 미개척지에 대한 개발 속도가 기록적인 수준을 달성했습니다."
 preserve_planet: "Planet-preserve"
 preserve_planet_desc: "This world has been declared a protected natural area. Mineral extraction and any industrial activity are prohibited. Civil society has committed to meticulously preserving this unique natural environment."
 civil_disobedience: "Civil Disobedience"
 civil_disobedience_desc: "Civil society in the empire reacted very strongly to the refusal to grant special protection to the ecosystem of this unique place. Active protests by environmentalists are taking place across the planet."
 rejected_beauty: "Rejected Beauty"
 rejected_beauty_desc: "The Empire's inhabitants are frustrated by the news broadcast by environmentalists. Colorful reports from an exotic planet about how yet another beautiful corner of the galaxy will be lost forever are fueling melancholy and despondency."
 environmentalists_protests: "Environmentalists Protests"
 environmentalists_protests_desc: "Environmental protests have taken a serious turn around the world. Activists are attacking factories and blocking production. Discontent is flaring up across the planet."