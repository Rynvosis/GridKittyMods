l_korean:
 
  ####################################
  # Planet Decision
  ####################################

  decision_protective_equipment: "보호 장비"
  decision_protective_equipment_desc: "정부 프로그램이 가혹한 행성의 주민들에게 의무 착용의 개인 보호 장비를 제공합니다."
  decision_ark_project: "방주 프로젝트 실행"
  decision_ark_project_desc: "우리의 고향이 재앙으로 파괴될 것입니다. 제안된 조치 중 하나는 우리 문명을 방주 프로젝트로 구하자는 것입니다. 장기 비행을 위한 모든 것이 준비된다면 거대한 개척선은 새로운 고향을 찾아 나설 것입니다."
  decision_ark_project_effect_desc: "방주 우주선의 건조가 시작될 것입니다.\n\n§Y행성이 죽은 뒤, 방주는 새로운 제국이 될 것입니다. 행성이 파괴되기 전 방주가 새로운 행성을 개척한다면 새로운 제국이 생성될 것입니다. 여러분은 어떤 제국을 통치해 나갈지 선택할 수 있습니다.§!"
  decision_planetary_excavation: "행성 발굴 시작"
  decision_planetary_excavation_desc: "이 고대 행성에 잡초가 무성한 땅, 그 밑에 거대한 도시의 폐허가 잠들어 있습니다. 행성을 채굴하면 이 행성의 자연미는 파괴되겠지만, 오래 전 사라진 귀중한 기술을 연구하고 궁극적으로는 행성에게 과거의 위대함을 되돌려주기 위해서는 필요한 수순입니다."
  decision_planetary_excavation_effect_desc: "행성이 §Y$pc_relic$§!으로 바뀝니다."
  decision_build_cloud_platform: "구름 플랫폼 건설 시작"
  decision_build_cloud_platform_desc: "도시 전체가 올라갈 수 있는 특수 플랫폼의 건설을 통해, 독성 안개로 덮인 지역을 개발할 수 있을 것이고 채광이 가능해질 것입니다."
  decision_demolish_cloud_platform: "구름 플랫폼 제거"
  decision_demolish_cloud_platform_desc: "하늘 플랫폼을 유지할 가치가 없다면, 없애버릴 수 있습니다."  
  decision_start_ecosystem_creation_project: "생태계 조성 프로젝트 시작"
  decision_start_ecosystem_creation_project_desc: "이 결정은 행성을 테라포밍하기 위한 프로젝트 중 하나를 시작합니다.\n\n죽은 행성은 행성 표면과 대기에 유리한 조건을 조성함으로써 되살릴 수 있습니다. 그런 다음 생명의 씨앗을 심고 우리의 감독 아래 이 세상의 따뜻한 바다에서 빠르게 성장할 새싹을 조심스럽게 돌봐주세요."
  decision_start_ecosystem_creation_project_effect_desc: "특별한 테라포밍 과정을 시작합니다. 진행하려면 다양한 테라포밍 구조물이 필요합니다."
  decision_end_ecosystem_creation_project: "생태계 조성 프로젝트 종료"
  decision_end_ecosystem_creation_project_desc: "이 결정으로 생태계 조성 프로젝트는 중단됩니다. 결과는 달성되지 않을 것입니다."
  decision_abolish_nature_preserves: "Abolish Nature Preserves"
  decision_abolish_nature_preserves_desc: "This decision will revoke the planet's status as a nature reserve and open the way for mineral extraction. However, civil society environmental organizations will almost certainly be displeased."
  
  
  ####################################
  # Origins
  ####################################
  
  origin_subterranean: "지저인"
  origin_subterranean_desc: "태양의 활동이 변함에 따라, 이 문명의 고향은 생명이라고는 없는 황무지가 되었고 그들은 지하 깊숙한 곳으로 내려가야만 했습니다. 수세기 동안 그들은 땅굴을 파고 도시를 지었습니다. 하지만 그들은 이 지하실이 평생의 집이 될 수 는 없다는 것을 깨달았습니다."
  origin_scavengers: "남겨진 자들"
  origin_scavengers_desc: "어떻게 황폐화된 행성에 문명을 세웠는가에 대해서는 아직도 정확히 알려진 바가 없습니다. 알려진 것이라고는 그 산업 폐허지가 그들이 만든 것이 아니라는 점 뿐입니다. 이 행성에 살았던 고대인들이 그들을 애완동물이나 노예로 데려왔을지도 모르는 일입니다. 그러나 그들은 적응했고, 이 행성의 첨단 기술을 연구함으로써 빠르게 발전했습니다."
  civic_tooltip_scavengers_effects: "§Y$d_subway_tunnel_network$§!이 있는 §Y고갈된 행성§!에서 시작합니다.\n장애물인 §Y$d_industrial_boneyard$§!을 제거하면 £alloys£ §Y합금§!을 얻을 수 있습니다."
  origin_ark: "방주"
  origin_ark_desc: "이 문명의 고향은 파괴되었습니다. 새로운 집을 찾기 위해, 소수의 생존자들이 거대한 우주선에 탑승해 무한한 공허로의 긴 여정에 나섰습니다."
  civic_tooltip_ark_effects: "파괴된 고향 행성의 궤도에 §Y우주 방주§! 하나 만을 가지고 시작합니다. 제국의 수도로 삼고 있는 거주 가능 행성의 궤도에 방주를 위치시켜야 합니다."

  
