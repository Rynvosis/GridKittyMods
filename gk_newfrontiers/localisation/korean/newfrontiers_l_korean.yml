  NO_TERRAFORM_HOLLOW_WORLD: "§R땅굴 행성은 테라포밍할 수 없습니다.§!"
  NO_BOMBING_HOLLOW_WORLD: "§R모든 건물이 지하 깊은 곳에 존재하기 때문에, 이 행성을 폭격해도 의미는 없습니다.§!"
  NO_TERRAFORM_OVERMIND: "§R자살? .. 말도 안 돼!§!"
 
  requires_actor_exomycosis: "외계 진균증을 제거하려면 연구해야합니다."
