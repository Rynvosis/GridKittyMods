  ####################################
  # Technology
  ####################################
  
  tech_blocked_tunnell: "열 사용 굴착법"
  tech_blocked_tunnell_desc: "암석을 녹는 점까지 가열하는 특수한 방식을 개발함으로써 단시간 내에 그리고 효율적으로 지하 땅굴망을 만들 수 있게 되었습니다."
  tech_igneous_traps: "분출 활동 안정화"
  tech_igneous_traps_desc: "행성 지각 내부 과정에 대해 충분히 알게 되면, 대규모 지질학적 작전을 시행할 수 있을 것입니다. 복잡한 기술적 방법으로 인해 강한 분출 활동의 중심을 찾고 뜨거운 암석이 있는 지역을 식힐 수 있을 것입니다."
  tech_ice_crust: "얼음 굴착"
  tech_ice_crust_desc: "극도로 추운 행성에서 살아남기 위해서는 빙하 동굴을 안정화시킬 방법을 만들어야합니다."
  tech_dune_sea: "모래 교체"
  tech_dune_sea_desc: "복잡한 간척 작업을 위해 중장비를 사용하는 것은 테라포밍이 불가능한 행성에서의 다음 단계입니다. 자동화 지형 개간 스테이션은 모래의 움직임을 멈추고 움직이는 흙은 고정시킬 수 있습니다."
  tech_thick_forest: "친환경 시설 계획"
  tech_thick_forest_desc: "분기별 산림 계획에 인공지능 프로토콜을 사용하면, 취약한 환경적 균형을 갈아엎지 않고도 행성의 자원을 사용할 수 있을 것입니다."
  tech_large_ice_ridge: "빙하 압력 제어"
  tech_large_ice_ridge_desc: "자동 잠금 체계를 통해, 추운 행성의 얼음 대륙의 움직임을 통제할 수 있을 것입니다."
  tech_igneous_traps: "분출 활동 안정화"
  tech_igneous_traps_desc: "행성 지각 내부 과정에 대해 충분히 알게 되면, 대규모 지질학적 작전을 시행할 수 있을 것입니다. 복잡한 기술적 방법으로 인해 강한 분출 활동의 중심을 찾고 뜨거운 암석이 있는 지역을 식힐 수 있을 것입니다."
  tech_cloud_platform: "구름 플랫폼 구조"
  tech_cloud_platform_desc: "자원에 접근하기 위해 독성 행성에 폐쇄된 지역을 개발할 필요가 있습니다. 특수한 공학적 해결책을 개발할 필요가 있습니다."
  
  
  ####################################
  # Buildings
  ####################################
  
  building_ark: "방주의 잔해"
  building_ark_desc: "이것은 새 식민지가 세워진 행성에 착륙했던 방주의 선체입니다. 이 거대한 건물의 내부 복합 단지는 개척자들에게 거주 공간을 제공합니다."
  building_pharmaceutical_production_complex: "Pharmaceutical Production Complex"
  building_pharmaceutical_production_complex_desc: "This facility uses the planet's unique algae to produce more advanced medical products."
  
  
  ####################################
  # Starbase Modules
  ####################################
  
  sm_stellar_reducer: "항성 축소기"
  sm_stellar_reducer_desc: "§Y이 장치는 이 성계의 항성을 멈추고 재앙을 피하기 위한 것입니다.§!"
 
  project_ark_ship: "우주 방주"
  project_ark_ship_plural: "우주 방주"
 
  ####################################
  # Planet Classes
  ####################################
  pc_sterile: "살균된 행성"
  pc_sterile_desc: "질소-산소 대기가 있고 복잡한 생명체가 거의 완전히 존재하지 않는 암석 행성입니다. 극한의 환경 조건으로 인해 기온이 급격하게 낮아지고 대기는 화산에서 나온 다양한 유해 가스와 섞여있습니다."
 
