  trait_subterranean: "지저인"
  trait_subterranean_desc: "§L이 종족은 오랫동안 지하에서 살아왔고, 비좁은 공간에 익숙합니다.§!\n"
 
  trait_pc_sterile_preference: "살균된 행성 선호도"
  trait_pc_sterile_preference_desc: "$trait_pc_arctic_preference_desc$"
  
  
