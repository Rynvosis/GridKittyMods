l_korean:
  
 ####################################
 # Habitable worlds
 ####################################
 
 panthalassic_world: "대양 행성"
 panthalassic_world_desc: "이 해양 행성에는 육지가 전혀 없습니다. 오직 거대한 바다 뿐입니다. 이 행성에서 건물은 해저 혹은 특수 제작된 부유 플랫폼 위에만 지을 수 있습니다.\n\n유형: §B일반§!"
 poisonous_world: "맹독성 행성"
 poisonous_world_desc: "이 습한 행성은 독성 동식물로 가득한 빽빽한 열대 정글과 늪지대로 뒤덮여있습니다. 과거 이 행성은 엄청난 생물 다양성을 보여주는 열대의 낙원이었고, 지난 수백만년 간 단 한 번의 대멸종도 일어나지 않았습니다. 결과적으로, 완전히 동일한 생태계는 동식물의 경쟁으로 이어졌습니다. 생존을 위한 몸부림 때문에 보호와 사냥의 수단으로 분비 독소가 발전되었습니다. 사실상 행성의 모든 동물들은 엄청난 맹독을 지니고 있으며 중독의 위험으로 인해 잡아먹기에도 적합하지 않습니다.\n\n유형: §M특이§!"
 swamp_world: "늪 행성"
 swamp_world_desc: "이곳은 탁한 늪과 유독 가스, 석탄 숲의 행성입니다. 이 행성에는 열린 수역이 거의 없지만, 끝없는 늪지대와 작은 진흙 덩어리로 가득한 정글로 구성된 수권이 존재합니다. 이러한 조건 덕분에, 이 행성은 다양한 유기 가스가 매우 풍부합니다.\n\n유형: §B일반§!"
 karst_world: "카르스트 행성"
 karst_world_desc: "이 행성은 과거 해양 행성이었지만, 별의 활동이 변화함에 따라 바다가 천천히 증발했고 깊은 균열과 공동이 가득한 지표면이 드러나게되었습니다. 현재에는 거대한 계곡과 동굴망이 가득하며, 이 덕분에 광물 자원에 대한 접근이 매우 용이합니다. 반면, 동굴과 같은 것이 매우 많이 숨겨져 있기 때문에 해적이나 테러리스트 집단에게 매력적인 장소입니다.\n\n유형: §B일반§!"
 glacial_world: "빙하 행성"
 glacial_world_desc: "이 행성의 지표면 대부분이 거대한 얼음으로 뒤덮여있습니다. 믿을 수 없을 정도의 추위가 존재하며, 끔찍한 눈보라 때문에 빈약한 생물권 이상의 발전이 불가능합니다. 사실상 생명체가 살지 않는 지형이며 대부분이 빙하 암석이고 일부는 풍화된 암석으로 이루어져있기에 지표면 아래의 희귀 광물에 대한 접근이 가능합니다.\n\n유형: §R극한§!"
 dune_world: "모래바다 행성"
 dune_world_desc: "이 행성에는 드문드문 보이는 산맥을 제외하고는 끝없는 모래바다 뿐입니다. 이 사막의 행성에서는 물을 찾기 매우 힘들고 싸늘한 극관이나 깊은 지하에서나마 작은 수원을 찾을 수 있습니다. 모래폭풍이 잦아 지표면의 모든 것을 주기적으로 갈아버립니다.\n\n유형: §R극한§!"
 boreal_world: "아한대 행성"
 boreal_world_desc: "(천문학적 기준으로) 최근 이 행성에 빙하기가 지나갔습니다. 이제 빙하가 사라지고 있으며 이전까지 얼음에 뒤덮여 있던 대지를 드러내고 있습니다. 움직이는 빙하 깊은 곳에 숨겨진 하천과 지열 지대는 훌륭한 에너지원입니다. 하지만 저온의 얼어붙은 이 땅은 혹독합니다. 지표면을 뒤덮고 있는 침엽수 식물이 다양한 이끼와 경쟁하고 있습니다.\n\n유형: §B일반§!"
 young_world: "어린 행성"
 young_world_desc: "이 행성은 태어난지 얼마 되지 않았습니다. 거대한 화산으로 인해 개척하기에 매우 어려운 환경이지만, 맨틀의 지질학적 활동은 분명 풍부한 에너지원입니다.\n\n유형: §R극한§!"
 tempest_world: "폭풍 행성"
 tempest_world_desc: "이 곳은 근처 항성의 열로 인해 식어가고 있는 모순의 행성입니다. 사실 이는 흔한 현상으로, 항성계의 모체 항성과 행성의 중력적 위치와의 관계로 인해 대기가 끊임없이 유동하는 것입니다. 멈추지 않는 바람이 열교환을 늘리고 지표면에 남아있는 것들을 식힙니다. 폭풍이 대지를 닦아내는 이 곳은 매우 가혹한 행성입니다. 동식물은 극히 드물고 동굴이나 은신처에만 존재합니다.\n\n유형: §R극한§!"
 geothermal_world: "지열 극지 행성"
 geothermal_world_desc: "이 행성은 끝없는 우주에 있는 또 다른 얼어붙은 공이지만, 행성 내부의 놀라운 활동이 제 역할을 해냈습니다. 이 행성의 대부분의 지역에는 얼음이 완전히 없습니다. 이제 이 곳은 빙하 황무지가 무성한 정글과 공존하는 온천과 간헐천의 행성이 되었습니다.\n\n유형: §G낙원§!"
 forest_world: "숲 행성"
 forest_world_desc: "이 행성의 식물군이 번성하여 그 위대함의 기념탑을 세웠습니다. 행성은 다층 구조의 숲과 정글로 뒤덮여있으며, 무수한 나무가 하늘을 간지럽히고 있습니다. 동물군도 다양하지만, 수많은 포식자 식물의 먹이일 뿐입니다.\n\n유형: §B일반§!"
 dust_world: "먼지 행성"
 dust_world_desc: "매우 건조한 이 행성으로, 지속적이고 억제되지 않는 침식으로 인해 행성의 토지의 질이 매우 좋지 않습니다. 때때로 강한 바람이 거대한 먼지 폭풍을 일으키고 이 폭풍은 행성을 가로지르며, 수 세기 동안 산맥에게 고통을 주고 하늘을 영원히 녹슬어버린 황혼으로 빠트립니다.\n\n유형: §R극한§!"
 oasis_world: "오아시스 행성"
 oasis_world_desc: "이 사막의 낙원에는 지표면의 15%를 차지하는 단 하나의 바다가 존재합니다. 나머지 부분은 광대한 사막으로 뒤덮여있고 대부분은 비 그늘의 밑에 숨어있습니다. 초목 지대는 거대한 바다의 연안에 집중되어있으며, 오랜 시간 동안 퍼져나가 사막의 안쪽에도 닿게 되었습니다.\n\n유형: §G낙원§!"
 salt_world: "소금 행성"
 salt_world_desc: "한 때 거대하고 차가운 바다가 대부분이었던 이 행성은 습윤 기후와 풍부한 생물권 모두를 가지고 있었습니다. 그러나 알 수 없는 재앙으로 인해 대양이 갑자기 증발해버렸습니다. 아마 모체 행성의 활동이 변화한 것과 관련이 있는 듯 합니다. 이제 지표면의 절반은 극한성 생물만이 살 수 있는 끝없는 소금 평야로 뒤덮여있습니다. 남아있는 소량의 액체는 매우 염도가 높은 소금물 바다 뿐입니다.\n\n유형: §B일반§!"
 steppe_world: "스텝 행성"
 steppe_world_desc: "특수한 환경 조건과 자연 선택으로 인해, 이 행성에서 나무를 완전히 앗아가는 방향으로 식물들의 진화가 진행되었습니다. 지표면에는 내륙해가 매우 많으며 그 사이사이에는 풀로 덮인 목초지와 스텝 초원이 끝없이 펴져있습니다.\n\n유형: §B일반§!"
 snow_world: "눈 행성"
 snow_world_desc: "이 산악 행성은 최근 전체적 빙결의 시기를 겪었습니다. 넓은 산맥이 없는 평평한 지표의 대부분은 빙하로 덮여있습니다. 적도 지역은 계절적 온도 변동이 불규칙한 온대 아한대 기후입니다. 내륙해는 오랜 기간 동안 따뜻하게 유지되며, 산맥이 차가운 기류를 막고 있기에 대기압이 지속적으로 변화합니다. 행성에서는 차가운 빙하와 따뜻한 적도 기단이 서로 부딪히기를 반복해, 극심한 눈 폭풍을 만들어냅니다.\n\n유형: §B일반§!"
 melting_world: "녹아내리는 행성"
 melting_world_desc: "과거에 이 대륙형 행성에는 빙붕으로 완전히 덮인 바다가 있었습니다. 장기간의 온난화의 결과로 현재 대부분은 액체로 변했고, 극지에 남아있는 빙붕은 여전히 지름 수 km의 거대한 빙산을 형성하고 있습니다.\n\n유형: §B일반§!"
 equatorial_world: "적도 행성"
 equatorial_world_desc: "이 추운 행성에는 농업에 알맞은 좁고 온화한 적도 지역이 있습니다. 이 지역에서 사라지고 있는 빙하로 인해 피면에 수많은 광물 매장지가 드러났습니다.\n\n유형: §G낙원§!"
 cold_desert: "추운 사막"
 cold_desert_desc: "끊임없는 추위와 얼마 없는 액체형 수권을 가진 행성이며, 사실상 불모지입니다. 바위투성이의 추운 지표면에서는 내한성이 뛰어난 작물들조차 살아남기 힘듭니다.\n\n유형: §R극한§!"
 supercontinental_world: "초대륙 행성"
 supercontinental_world_desc: "현재 이 행성의 지각판과 대륙이 하나의 초대륙을 형성했습니다. 해안 지역은 살기 좋은 낙원이지만, 해안 근처의 비옥한 하곡에서 멀리 떨어진 대륙 지역은 대부분 수천 km가 넘는 건조한 스텝과 태양이 작열하는 건조한 생물군계입니다. 혹독한 날씨와 회오리바람은 대륙 깊숙한 곳까지 바람을 불어넣으며, 제대로 준비하지 않는다면 치명적입니다.\n\n유형: §R극한§!"
 atoll_world: "환초 행성"
 atoll_world_desc: "지질 구조로 인해 이 행성에서는 거대한 육지가 형성되지 못했지만, 거대한 해저 화산이 끊임없이 많들어내는 작은 섬들로 가득합니다. 오랜 세월 동안, 이러한 화산 섬 대수가 침식되고 가라앉아 거대 산호초의 집이 되었습니다. 거대 산호초는 이 열대의 낙원에 독특하고 거대한 환초를 형성했습니다. 극과 극 사이에 거의 일정하게 분포되어있는 거대한 산호섬들은 자연의 걸작입니다.\n\n유형: §G낙원§!"
 algic_seas: "해조류의 바다"
 algic_seas_desc: "매우 아름다운 이 행성은 바다를 가로질러 이동하는 해조류의 초군락으로 덮여있습니다. 이 덕분에 생생한 빨강 빛깔과 초록 빛깔로 물들어있죠. 어떤 조류가 배출하는 물질은 의학적으로 잘 사용될 수 있는 독특한 치유 성질을 지니고 있습니다.\n\n유형: §M특이§!"
 monsoon_world: "몬순 행성"
 monsoon_world_desc: "이 행성의 궤도 및 지리적 특성으로 인해, 계절마다 바람의 방향이 급격하게 바뀝니다. 여름에 빠르게 가열되는 대륙으로 인해 내륙으로 내륙으로 이동하는 장맛비가 대규모 홍수를 일으키며, 겨울에는 공기가 바다로 빠져나가기 때문에 꽤나 건조합니다. 바다가 따뜻해짐에 따라 늦여름에 생성되는 수많은 거대 폭풍만 아니었다면 이상적인 거주 가능 행성이었을 것입니다.\n\n유형: §R극한§!"
 ancient_world: "고대 행성"
 ancient_world_desc: "수천년 전, 이 행성은 어떤 잊혀진 선구자 문명의 발생지였으며, 그들의 정체는 오늘까지도 수수께끼로 남아있습니다. 이 곳은 한 때 행성도시였지만, 야생이 행성을 되찾았습니다. 거대한 건물의 잔해는 빽빽한 숲 속에서 밖을 엿보고 있으며, 과거 거대한 댐에 의해 보호받던 도시 구역 전체가 바다가 되어버렸습니다.\n\n유형: §B일반§!"
 depleted_world: "고갈된 행성"
 depleted_world_desc: "한 때 산업과 예술의 중심이었던 이 행성은 알 수 없는 재앙 이후로 수십억에 달하는 주민들에게 완전히 버려졌습니다. 수천년 동안 발전된 문명의 위험한 잔재를 지키고 있던 기반 시설이 쇠약해졌으며, 고대의 기술 재앙으로 인한 오염과 화학 약품으로 오염된 지하수면 때문에, 이 행성에서는 고등 생명체가 살아갈 수 없게 되었습니다.\n\n유형: §B일반§!"
 rocky_world: "바위 행성"
 rocky_world_desc: "이 행성의 빈번한 폭풍과 강풍으로 인해 지형이 매우 풍화되었습니다. 그러니까, 이 행성의 지표면에는 풍화된 바위가 매우 많다는 것입니다.\n\n유형: §M특이§!"
 primal_world: "원시 행성"
 primal_world_desc: "이 행성은 아직 상당히 어리고 화산 활동의 시기를 겪고 있습니다. 무성한 정글이 갑자기 황무지로 변해버릴 수 있고, 행성의 깊은 곳으로부터 솟구치는 용암이 협곡과 골짜기로 흘러가며 한 때 생기가 넘쳤던 땅을 없애고 지옥으로 만들고 있습니다.\n\n유형: §B일반§!"
 mesa_world: "메사 행성"
 mesa_world_desc: "이 행성의 따뜻하고 추운 계절은 빈번하게, 가끔씩은 예측할 수 없게 변화하며, 이러한 이유로 행성에는 강풍이 불고 가뭄이 들었습니다. 수백만 년의 시간 동안, 행성의 지형이 끊임없이 풍화되어 협곡이 있는 고원과 광대한 메사가 되었습니다. 행성의 메마른 생물권은 극지에서 발견되는 몇 안되는 물가에만 존재합니다.\n\n유형: §R극한§!"
 bog_world: "늪지 행성"
 bog_world_desc: "이 추운 행성에는 건설을 위한 단단한 토양이 사실한 존재하지 않으며, 개방된 광물 매장지에 접근할 수 없습니다. 지표면 전체를 덮고 있는 토탄 늪과 더러운 호수, 그리고 춥고 혹독한 날씨에도 불구하고 높은 습도과 비옥한 토양 때문에 이 행성은 농사에 어울립니다.\n\n유형: §B일반§!"
 storm_world: "폭풍 행성"
 storm_world_desc: "물이 많은 이 행성은 대기 중에 격렬한 폭풍이 다수 발생하기 쉽습니다. 이 행성의 작고 메마른 육지는 사실상 생명체가 존재하지 않는 돌덩이로 바뀌었습니다.\n\n유형: §R극한§!"
 mediterranean_world: "지중해 행성"
 mediterranean_world_desc: "이 건조한 암석형 행성은 거대한 내륙해 여러 곳으로 이루어져 있는데, 그곳의 연안은 뜨거운 기후의 영향을 덜 받습니다. 비옥한 지역 다수는 드물게 건조한 계절이 존재하고 온화한 기후를 가진 해안 지역에 집중되어 있습니다.\n\n유형: §B일반§!"
 plateau_world: "고원 행성"
 plateau_world_desc: "이 차가운 행성의 지표면 대부분은 협곡에 의해 움푹 패인 광대한 고원으로 이루어져 있습니다. 이 행성에는 광범위한 침식 과정의 흔적이 남아있는데, 아마도 과거에 바다였던 것 같습니다. 높은 공간은 발전소에 적합하며 침식된 퇴적물 덕분에 광물을 채굴하기 더 쉬워졌습니다.\n\n유형: §B일반§!"
 megaflora_world: "거대식물 행성"
 megaflora_world_desc: "답답하고 빽빽한 정글과 거대한 뿌리가 이 행성을 덮고 있습니다. 이 곳의 풍부한 식물들은 빈 공간을 차지하기 위해 놀라울 정도의 끈기와 성장 속도를 보입니다. 행성의 식물들이 매우 공격적으로 자라나기 때문에, 기반 시설을 발전시키고 유지 보수하는 것은 매우 어려운 작업입니다.\n\n유형: §B일반§!"
 coriolis_world: "코리올리 행성"
 coriolis_world_desc: "빠른 자전 속도 때문에, 이 행성에는 강하고 쉴새없는 바람이 항상 같은 방향으로 불고 있습니다. 적도에 가까울 수록 기류는 빨라지며, 이 지역의 바위와 공기의 마찰로 인해 지면과 대기가 매우 뜨거워집니다. 이 행성에서는 많은 생명체가 바람이 불어대는 황무지의 혹독한 환경에 적응하여, 광대한 적도 수역 근처에서 끊임없이 움직이는 기단의 닫힌 순환 공간에 존재합니다.\n\n유형: §R극한§!"
 mineral_world: "광물 행성"
 mineral_world_desc: "이 행성의 지각에는 다양한 광물이 대량으로 묻혀있습니다. 지각판의 활발한 움직임 때문에 광물이 풍부한 결정형 구조의 암반 층에서 산악 육괴가 형성됩니다. 또한, 이 행성에는 사실상 부드러운 복토가 존재하지 않고 혹독한 기후 조건을 가지고 있기 때문에 생물들이 발달할 수 없습니다.\n\n유형: §R극한§!"
 ice_world: "얼음 행성"
 ice_world_desc: "항성의 활동이 급격하게 변화하자, 이 대양 행성이 빠르게 얼어붙었습니다. 매우 짧은 시간 안에, 지표면의 바다가 두꺼운 얼음으로 뒤덮였고, 끔찍한 눈보라가 끝없는 얼음의 황무지에 분노를 쏟고 있습니다. 하지만 바다의 얼음 밑에 생명이 살아가고 있으며, 언젠가 다시 자유가 될 것입니다.\n\n유형: §R극한§!"
 crag_world: "아북극 바다 행성"
 crag_world_desc: "이 해양 행성은 화산 섬들로 점철되어 있습니다. 끝없는 바다에서 솟아오른 몇 안되는 육지는 각주상 구조를 띄고 있습니다. 이러한 노두는 다양한 분출암으로 이루어져 있고 귀중하고 희귀한 광물이 존재할지도 모릅니다.\n\n유형: §B일반§!"
 prairie_world: "대초원 행성"
 prairie_world_desc: "이 행성에는 거대한 내륙해와 산맥으로 나누어진 비옥한 토지가 존재하며, 온화한 계절 기후를 보입니다. 습하고 뜨거운 여름은 길고 춥고 혹독한 겨울은 짧습니다.\n\n유형: §B일반§!"
 veld_world: "벨드 행성"
 veld_world_desc: "반건조 아열대 기후 그리고 산악 지형 때문에 이 행성에는 무성한 해양 대초원과 범란하는 풀밭, 뜨거운 사바나와 사막형 고원이 난잡하게 퍼져있습니다. 몇몇 수종을 중심으로 형성된 국지적 생물권은 광범위한 근계를 발전시켜 길고 건조한 계절을 견딥니다.  광범위한 근계는 거의 수십 년 이상 존재할 수 있지만, 끊임없이 성장하는 그 뿌리들로 인해 사무들이 거대한 아카시아 나무로 성장하고 주변에 오아시스같은 것을 만듭니다.\n\n유형: §B일반§!"
 adiabatic_world: "단열 행성"
 adiabatic_world_desc: "과거에 과도하게 활발했던 조산 운동이 처음에는 작았던 수권을 붙잡았습니다. 초고층 대기에서 일어나는 끊임없는 냉각과 수분 응축의 결과로, 대부분의 지역은 비그늘로 덮여있습니다. 지표의 90%가 매우 건조한 사막이지만, 수역 근처에 몇 안되는 생명체가 살고 있습니다.\n\n유형: §R극한§!"
 frigid_world: "냉대 사막 행성"
 frigid_world_desc: "물이 거의 없고 추위가 지속되는 사막 행성입니다. 얼마 없는 물은 적도 지역의 툰드라에 집중되어 얼지 않은 수역으로 존재합니다. 대부분의 지역은 사막 불모지입니다.\n\n유형: §R극한§!"
 mushroom_world: "버섯 행성"
 mushroom_world_desc: "이 추운 행성의 생물 대부분은 혹독한 환경에 잘 적응한 진균류입니다. 습지 툰드라와 바람 부는 황무지로 구분된 거대한 버섯 숲은 떠들썩한 생명의 섬입니다.\n\n유형: §B일반§!"
 taiga_world: "타이가 행성"
 taiga_world_desc: "상대적으로 온화한 계절 기후와 습도로 인해, 이 행성의 적도에 넓은 숲이 존재합니다. 황량한 타이가 숲은 긴 겨울에 적응했으며, 극지방에 다가갈수록 얼어붙은 황무지로 바뀐 산림 동토대와 늪지대가 많아집니다.\n\n유형: §B일반§!"
 highland_world: "고지대 행성"
 highland_world_desc: "이 추운 행성의 지표면 대부분은 매우 복잡한 산맥으로, 내륙해가 있는 고원과 계곡을 형성합니다. 이 행성의 특징은 큰 고도 차이와 평야의 완전한 부재입니다.\n\n유형: §B일반§!"
 noxious_world: "유독성 행성"
 noxious_world_desc: "수백만년 전, 이 행성은 생명체의 낙원이었습니다. 동물들이 매우 빠르게 자라나 모든 땅을 채웠습니다. 그러나 바다조차도 생물량의 압력을 버티지 못했고, 행성은 빠르게 커지고 부패하는 늪으로 변하기 시작했습니다. 부패한 늪에서 나오는 무거운 독성 가스가 저지대를 모두 채웠기에 고지대에 존재하는 생명체들이 살아남았고, 독성 늪지대의 반대 편에는 가장 잘 적응한 동식물들만이 살고 있습니다.\n\n유형: §M특이§!"
 forgotten_world: "잊혀진 행성"
 forgotten_world_desc: "수천년 전, 이 행성은 수수께끼의 문명의 문화적 중심이었습니다. 이제 이 과거의 조각은 귀중한 유물과 금단의 지식을 찾고 호기심을 충족시키고자 하는 은하계의 모험가를 불러들이고 있습니다.\n\n유형: §Y전설§!"
 aeolian_world: "풍성 행성"
 aeolian_world_desc: "이 행성 표면의 대부분은 화산암의 심한 풍화 작용으로 형성된 다공성 암석입니다. 이 세상의 모래 폭풍은 크고 날카로운 모래 알갱이 때문에 매우 파괴적이며, 허리케인 바람에 의해 가장 강한 구조물도 변형시킬 수 있을 정도로 속도가 빨라집니다.이 행성의 모래 폭풍은 허리케인 바람에 의해 엄청난 속도로 가속되어 가장 튼튼한 구조물도 변형시킬 수 있는 크고 날카로운 모래 알갱이 때문에 극도로 파괴적입니다.\n\n유형: §R극한§!"
 mesocyclonic_world: "메조사이클론 행성"
 mesocyclonic_world_desc: "이 평평한 행성 대기의 심한 기압 변동으로 인해 다양한 크기의 많은 공기 소용돌이가 자주 형성됩니다. 파괴적인 토네이도가 많은 이 거친 행성에서는 가장 강인한 생명체만이 살아남습니다.\n\n유형: §R극한§!"
 effusive_world: "분출 행성"
 effusive_world_desc: "이 행성은 최근에야 활화산 주기에서 벗어났습니다. 이 행성의 표면은 서서히 냉각되고 있으며, 수많은 화산 틈새에서 유황과 기타 가스의 유해한 연기가 빠져나가고 있습니다.\n\n유형: §R극한§!"
 reef_world: "암초 행성"
 reef_world_desc: "이 해양 행성에는 수심이 거의 없습니다. 이 행성의 전체 표면은 화산 기원의 암초로 이루어진 복잡한 시스템으로 이루어진 얕은 바다입니다.\n\n유형: §B일반§!"
 iceberg_world: "빙산 행성"
 iceberg_world_desc: "이 해양 행성은 한때 완전히 얼어붙었으나, 오랜 기간의 온난화로 인해 수면의 대부분은 얼음이 없어졌습니다. 극지방의 빙붕 빙하는 끊임없이 많은 빙산을 생성하며, 그 중 일부는 직경이 수 킬로미터에 달하기도 합니다.\n\n유형: §B일반§!"
 moraine_world: "빙퇴석 행성"
 moraine_world_desc: "이 행성은 짧은 기간의 빙하와 온난화의 주기에 갇혀있습니다. 그 결과 행성의 빙상은 끊임없이 움직이고 있습니다. 행성 표면의 대부분은 암석과 얼음 조각으로 이루어진 움직이는 층입니다.\n\n유형: §R극한§!"
 wasteland_world: "황무지 행성"
 wasteland_world_desc: "생명체의 대부분을 파괴한 거대한 전쟁이 이 행성에서 벌어진 지 오래되었습니다. 거의 모든 지표면이 뜨거운 사막이 되어 먼지 폭풍에 시달리고 있으며, 일부 지역에서는 여전히 방사능 수치가 높습니다.\n\n유형: §B일반§!"
 fallout_world: "낙진 행성"
 fallout_world_desc: "이 행성은 최근 행성의 생태계를 급속하게 파괴하는 연쇄 반응을 일으키는 핵 대재앙을 겪었습니다. 환경의 대규모 방사능 오염은 거의 모든 생명체의 멸종으로 이어졌습니다. 스스로 자초한 재앙의 영향을 받지 않을 곳은 거의 남아 있지 않습니다. 이 행성은 멸망의 위기에 처해 있습니다.\n\n유형: §R극한§!"
 garden_world: "정원 행성"
 garden_world_desc: "이 그림 같은 행성은 글로벌 테라포밍 프로젝트의 결과로 모든 형태의 생명체가 살 수 있는 아름다운 세상으로 변모했습니다. 독특한 생태계를 가진 다양한 생물 군계는 놀랍지만 광물은 거의 존재하지 않습니다.\n\n유형: §B일반§!"
 rust_world: "녹 행성"
 rust_world_desc: "이 행성은 한때 번성했던 통신과 상업의 중심지였던 거대한 도시였습니다. 지금은 녹슨 구조물이 끝없이 미로처럼 얽혀 있는 황량한 행성으로, 과거의 위대함을 상기시키는 역할을 할 뿐입니다.\n\n유형: §B일반§!"
 algae_world: "Algae World"
 algae_world_desc: "It's a world of many colors and hues. Giant algae colonies surround the entire planet, painting the oceans red and green. The acid from some types of algae has unique healing properties and can be used in many areas of medicine.\n\nType: §Mexotic§!"
 bioluminescent_world: "Bioluminescent World"
 bioluminescent_world_desc: "This world's intense volcanic activity has led to permanent atmospheric shading across virtually its entire surface. However, thanks to its hot interior, the planet hasn't hibernated and has retained a largely tropical climate. The local flora and fauna have quickly adapted to the near-total absence of sunlight. The natural environment of this unique world captivates with a riot of light and color, creating iridescent landscapes of incredible beauty.\n\nType: §Mexotic§!"
 crystal_world: "Crystal World"
 crystal_world_desc: "This cold, harsh-climate world is the galaxy's greatest treasure. The planet's crust and interior are composed almost entirely of valuable mineral formations and crystalline structures with various properties.\n\nType: §Mexotic§!"
 
 flaming_world: "불타는 행성"
 flaming_world_desc: "조석 고정된 이 행성은 항성에 너무 가깝습니다. 황혼 지대도 끔찍한 열기와 강한 바람으로 인해 생명체가 살아가기 극히 어려우며, 해가 떠 있는 지역에서는 불타는 태풍이 휘몰아치고 고지대에서 흘러내리는 용암의 강이 계곡을 채웁니다.\n\n유형: §R극한§!"
 eyeball_world: "눈알 행성"
 eyeball_world_desc: "조석 고정된 이 행성에서, 죽지 않는 거친 바다 폭풍이 돌아다니고 있습니다. 낮의 지역에서 바다는 끓고 있지만, 밤의 지역에서 형성된 얼음들이 바람에 밀려 황혼 지역에서 녹아내리고 굴러다닙니다.\n\n유형: §B일반§!"
 meridiem_world: "낮의 행성"
 meridiem_world_desc: "조석 고정된 이 행성은 매우 포근한 환경이 특징입니다. 황혼 지대는 거의 매일 추운 날씨가 지속되지만, 해가 떠있는 지역은 온화한 열대기후를 가지고 있습니다.\n\n유형: §G낙원§!"
 
 
 ash_world: "잿더미 행성"
 ash_world_desc: "이 암석형 행성은 현재 전국적인 극심한 화산 겨울의 시기를 겪고 있습니다. 지각의 움직임은 멈췄지만, 대기가 재와 유황 가스로 심각하게 오염되었습니다. 짙은 화산 가스로 인해 반-온실효과가 발생하고 있으며, 햇빛이 지면에 닿는 곳이 거의 없습니다.\n\n유형: §R극한§!"
 archean_world: "시생대 행성"
 archean_world_desc: "이 행성에는 매우 초기 단계의 생명체들이 있습니다. 얕은 바다에서 성장중인 미생물들의 광합성 덕분에 안정적인 질소-산소 대기가 형성되었습니다. 대기의 산소 포화도가 계속 증가하고 있으며, 언젠가 산소 대폭발이 일어나 빙하기가 도래할 것입니다.\n\n유형: §B일반§!"
 
 magma_world: "마그마 행성"
 magma_world_desc: "한 때 이 용암형 행성의 상당 부분이 수분이었는데, 아마 이 수권의 움직임으로 인해 행성의 지하에 거대한 동공과 땅굴들이 생겨난 듯 합니다. 지각의 변화와 지표면의 급과열의 결과로, 닫힌 동굴망이 생성된 것입니다. 놀랍게도, 이 불타는 지옥의 지하에는 질소-산소 대기를 가진 숨겨진 세상이 존재합니다. 이 극한성 생물권은 주로 지하의 섬세한 균형을 유지하는 단순한 생물체로 구성되어 있습니다.\n\n유형: §R극한§!"
 subglacial_world: "빙하저 행성"
 subglacial_world_desc: "이 얼어붙은 행성의 얼음 밑에는 거대한 동굴망과 행성의 지각까지 이어지는 바다가 숨어있습니다. 인상적이지만 구조적으로 불안정한 행성으로, 질소-산소 대기와 초라하지만 완전히 발달되고 안정적인 생물권을 가지고 있습니다.\n\n유형: §R극한§!"
 
 
 sulfur_world: "유황 행성"
 sulfur_world_desc: "이 곳은 녹아버리고 지질의 활동이 멈추지 않는 행성으로, 대부분 다양한 규소암과 황화합물로 구성되어 있습니다. 이 행성의 화산 활동으로 인해 대기의 성질이 빈번하게 바뀌며, 화산 폭발로 인한 황화합물 때문에 이 행성을 궤도에서 내려다 보면 노랑색, 흰색, 빨간색, 검은색, 초록색 등 다양한 색깔을 관찰할 수 있습니다. 중력이 약하기 때문에 마그마 중 일부만 지표면으로 끌어 당겨지며, 일부는 용융황 비의 형태로 행성에 떨어집니다. 또 일부는 우주로 바로 방출되어 행성의 대기 너머로 사라집니다."
 planetoid: "미행성"
 planetoid_desc: "이 행성은 구체 형태를 유지할 정도의 질량을 지닌 소행성 또는 왜행성입니다."
 ice_planetoid: "얼음 미행성"
 ice_planetoid_desc: "이 행성은 작은 행성 또는 왜소 행성으로, 주로 얼어붙은 H2O로 구성되어 있습니다."
 frozen_ocean: "얼어붙은 바다"
 frozen_ocean_desc: "두꺼운 얼음 지각에 덮인 추운 행성입니다. 얼음 밑에는 액체 상태의 물이 존재할지도 모릅니다."
 scorched_world: "불타는 행성"
 scorched_world_desc: "이 행성은 천천히 성계의 중심성을 향해 이동했습니다. 원래는 푸르른 행성이었으나, 중심성 가까이에서 대기를 계속 잃어 일부가 녹아버린 잿더미가 되었습니다."
 carbon_world: "탄소 행성"
 carbon_world_desc: "진짜 이상한 곳입니다. 이 행성의 주요 성분은 일반적인 규소암과 금속이 아닌 탄소입니다. 탄화수소의 바다가 석탄 산맥과 그래핀 평야 사이에 존재하며, 거대한 다이아몬드 수정들이 하늘을 향해 튀어나와있어 장관을 연출합니다. 이 행성의 쾌적한 조건에도 불구하고, 일반적인 생명체를 형성하고 유지하는데 필요한 산소와 물이 없습니다."
 hot_barren_world: "뜨거운 불모형 행성"
 hot_barren_world_desc: "대기가 거의 없는 뜨거운 불모형 행성으로 성계의 중심성과 가까이 있습니다. 낮 동안에는 견딜 수 없는 열과 함께 급격한 기온 변화가 일어나며, 밤에는 거의 절대영도에 가까운 기온을 유지합니다."
 ammonia_world: "암모니아 행성"
 ammonia_world_desc: "이 놀라운 행성의 대기의 주요 구성성분은 질소와 산소 그리고 암모니아입니다. 지표면은 액체 암모니아 호수와 바다가 생길 정도로 차가우며, 이러한 호수에서 태어난 독특한 생명체들은 세포 성분으로 물 대신 암모니아를 사용합니다."
 
 