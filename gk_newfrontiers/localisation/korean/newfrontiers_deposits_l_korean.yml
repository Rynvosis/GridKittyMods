l_korean:
 
 #bloker deposits
 
 d_dune_sea: "모래바다"
 d_dune_sea_desc: "수백km에 달하는 거대한 모래바다이며, 움직이는 모래가 그곳을 덮고 있습니다."
 d_thick_forest: "빽빽한 숲"
 d_thick_forest_desc: "이 지역은 빽빽한 침엽수와 물을 잔뜩 머금은 방품림으로 덮여있기 때문에 정복하기 매우 어렵습니다."
 d_large_ice_ridge: "거대한 빙산"
 d_large_ice_ridge_desc: "산맥처럼 서있는 얼음 방벽입니다."
 d_blocked_tunnell: "막혀있는 굴"
 d_blocked_tunnell_desc: "자연 땅굴이 붕괴되어 거대한 둥굴로 이어지는 길을 막고 있습니다."
 d_ice_crust: "얼음층"
 d_ice_crust_desc: "두터운 얼음 때문에 자연 동굴로의 길이 막혀있습니다."
 d_industrial_boneyard: "산업 폐기장"
 d_industrial_boneyard_desc: "이 지역에는 금속 구조물이 버려져있고 방사성 폐기물이 매립되어있습니다."
 d_igneous_traps: "화성암 지대"
 d_igneous_traps_desc: "이 지역의 수많은 균열에서 대량의 용암이 끊임없이 흘러 나오고 있습니다. 용암의 강이 협곡과 함몰된 땅을 채웠고 평지로 흘러나가고 있습니다."
 d_exofungus_contamination: "외계 진균류 오염 지역"
 d_exofungus_contamination_desc: "$exofungus_blocker_desc$"
 
 #event bloker deposits
 
 d_rusty_debris: "녹슨 잔해"
 d_rusty_debris_desc: "고대 기계의 잔해가 산처럼 쌓여있습니다. 고대의 전쟁에 대한 음울한 증거입니다."
 d_giant_fossils: "거대한 화석"
 d_giant_fossils_desc: "한 때 이 곳은 생기가 가득한 행성이었습니다. 이 지역은 그 시절 살았던 거대한 유기체의 뼈의 무덤입니다."
 
 #planet deposits
 
 d_turbulent_currents: "거친 해류"
 d_turbulent_currents_desc: "이 지역의 바다에 매우 강하고 지속적인 해류가 흐르고 있습니다."
 d_underground_springs: "지하 온천"
 d_underground_springs_desc: "행성의 깊은 곳에서 가열되는 지하수가 온천이 된 동굴입니다."
 d_salt_flat: "소금 평야"
 d_salt_flat_desc: "옛적에 이 곳에는바다가 있었습니다. 하지만 이미 다 말라버려 수십만 km의 소금 평야만이 남아있습니다."
 d_peat_moors: "토탄 늪"
 d_peat_moors_desc: "이 광대한 늪지대에는 발전에 사용되는 훌륭한 연료인 토탄이 잔뜩 묻혀있습니다."
 d_submerged_gas_eruption: "해저 가스"
 d_submerged_gas_eruption_desc: "이 곳의 해저에서는 다양한 가스가 방출됩니다. 이러한 가스는 행성 내부의 지질학적 과정으로 인해 지표면 아래에 쌓이게 됩니다."
 d_ice_geyser: "얼음 간헐천"
 d_ice_geyser_desc: "행성의 얼음 지각 아래에 있는 물이 압력에 의해 지표면으로 솟구치고 있는 지역입니다."
 d_gaseous_eruption: "가스 분출구"
 d_gaseous_eruption_desc: "거대한 단층에서 다양한 가스가 방출되고 있으며, 이러한 가스는 행성의 지질학적 과정으로 인해 지표면 아래에 쌓이게 됩니다."
 d_scorched_badlands: "불 타버린 불모지"
 d_scorched_badlands_desc: "이 지역에 밤은 없습니다. 타오르는 태양이 지표면과 대기를 엄청난 온도로 달구었기에 이 곳에 생명은 존재하지 않습니다. 하지만 이 지역의 에너지적 잠재성은 엄청납니다."
 d_offshore_fields: "융기한 해저 대지"
 d_offshore_fields_desc: "광물이 풍부한 이 해저 대지는 지질학적 과정으로 인해 얕은 물가로까지 솟아 올랐습니다."
 d_abundant_atoll: "자원이 풍부한 환초"
 d_abundant_atoll_desc: "이 오래된 산호 지대의 깊은 곳에 귀중한 광물이 잔뜩 쌓여있습니다."
 d_rich_lodes: "풍부한 광맥"
 d_rich_lodes_desc: "이 지역의 지하 동굴은 귀중한 광물로 넘쳐납니다."
 d_seagrass_shelf: "해초 지대"
 d_seagrass_shelf_desc: "이 얕은 물 지역에는 해초가 엄청나게 많습니다."
 d_kelp_forest: "켈프 숲"
 d_kelp_forest_desc: "이 바다는 매우 다양한 해양 생물이 살고 있는 독특한 생물군계입니다."
 d_estuary_meadows: "강 하구의 목초지"
 d_estuary_meadows_desc: "이 지역의 광대한 삼각주는 농사를 짓기에 좋은 거대한 관개지를 형성합니다."
 d_huge_tree: "거대한 나무"
 d_huge_tree_desc: "엄청나게 거대한 나무는 다양한 생물이 살고 있는 독특한 생물군계를 형성합니다."
 d_underground_reservoir: "지하 저수지"
 d_underground_reservoir_desc: "이 지하 호수의 물가와 그 수면의 아래에는 다양한 생명체가 살아가는 놀라운 생물군계가 존재합니다."
  
 #rare deposits

 d_great_vortex: "거대한 소용돌이"
 d_great_vortex_desc: "이 지역에서 발생하는 기단의 순환으로 인해 거대한 폭풍이 발생했습니다."
 d_stormy_water: "폭풍의 바다"
 d_stormy_water_desc: "이 바다를 지나가는 기류가 거대한 폭풍우를 형성합니다."
 d_sand_worm: "모래 벌레"
 d_sand_worm_desc: "이 광대한 사막의 주인을 깨우지 않는 편이 좋을 것입니다."
 d_grand_canyon: "거대한 협곡"
 d_grand_canyon_desc: "수많은 골짜기가 있는 그림같은 깊은 협곡이 수십만 km에 걸쳐 뻗어있습니다."
 d_vast_crevasse: "거대한 크레바스"
 d_vast_crevasse_desc: "거대한 고대의 빙하에 깊은 균열이 생겼습니다."
 d_maze_cliff_formations: "미로같은 절벽"
 d_maze_cliff_formations_desc: "얕은 물에서 침식된 화산암이 기묘한 모양의 돌덩이를 만들었습니다. 파도와 많은 동굴이 지역 전체를 덮어버리는 짙은 안개를 형성합니다."
 d_boneyard: "뼈무덤"
 d_boneyard_desc: "이 행성에 살았던 거대한 생명체의 수많은 뼈는 고대의 재양에 대한 비밀을 간직하고 있습니다."
 d_ancient_ruins: "고대 유적"
 d_ancient_ruins_desc: "이 골짜기에, 오래전 잊혀진 시대의 기묘한 유물들이 지평선 끝까지 이어져있습니다."
 d_relic_landfill: "유물 매립지"
 d_relic_landfill_desc: "어떤 고대의 고등 문명이 내다버린 기술적 폐기물들이 산처럼 쌓여있습니다."
 d_levitating_rocks: "떠오르는 암석"
 d_levitating_rocks_desc: "알 수 없는 물리학적 요인으로 인해 이 거대한 암석들이 지표면 위에 어지럽게 떠다닙니다."
 d_karst_cave: "카르스트 동굴"
 d_karst_cave_desc: "고유의 생태계가 존재하는 광대한 지하 동굴망입니다."
 d_serene_coastline: "고요한 해안"
 d_serene_coastline_desc: "아름다운 자연과 황금빛 해변, 매혹적인 바다. 말도 안되게 아름다운 이 장소는 휴식에 딱 맞습니다."
 
 #starting deposits
 
 d_urban_agglomeration: "도시 복합체"
 d_urban_agglomeration_desc: "행성의 많은 거대도시들이 하나의 복합 시설로 합쳐졌습니다."
 d_reactor_zone: "반응로 지역"
 d_reactor_zone_desc: "이 지역의 모든 기반 시설은 강력한 열핵 융합로의 안정적인 동작을 목표로 합니다."
 d_reserve_deposits: "보존된 매장지"
 d_reserve_deposits_desc: "행성에서 발견된 몇 매장지들은 오랫 동안 쓰이지 않고 사람의 손이 닿지 않은채로 남아있었습니다."
 d_deep_ore_mines: "행성 심핵 광산"
 d_deep_ore_mines_desc: "행성의 깊은 곳으로부터 광물을 채광하는 거대한 시설망입니다."
 d_rich_abyss: "광물이 풍부한 심연"
 d_rich_abyss_desc: "바다에서 가장 깊은 지역에 대량의 광물 자원이 그대로 남아있습니다."
 d_hydroponic_complex: "수경 농업 복합 단지"
 d_hydroponic_complex_desc: "이 농업 시설은 비옥한 토양 없이도 다양한 식용 작물을 재배할 수 있습니다."
 d_agrothermal_plains: "농업-지열 평야"
 d_agrothermal_plains_desc: "특수한 지열 재개발 방식을 통해, 이 추운 지역이 농업 지대로 바뀌었습니다."
 d_converted_lands: "개간지"
 d_converted_lands_desc: "이 지역에서 정글이 사라졌고 비옥한 토지가 되었습니다."
 d_irrigated_fields: "관개지"
 d_irrigated_fields_desc: "과거 사막 지대였던 이곳의 기반 시설은 토양에 충분한 양의 물을 공급하는데 초점이 맞추어져 있습니다."
 d_agrarian_dome: "농업 돔"
 d_agrarian_dome_desc: "이 돔은 농업적 필요에 따른 좋은 기후와 토양을 유지하기 위해 특별히 고안된 것입니다."
 d_algae_tracts: "해조류 지대"
 d_algae_tracts_desc: "$d_pacific_algae_tracts_desc$"
 
 #special deposits
 
 d_subway_tunnel_network: "지하철 터널망"
 d_subway_tunnel_network_desc: "행성 전체를 관통하는 고대의 수송 터널망으로, 과거에 이곳에 살았던 자들의 잔재입니다. 현재는 방사능 비를 피하는 장소로 사용됩니다."
 d_remains_of_ark: "방주의 잔해"
 d_remains_of_ark_desc: "행성에 착륙하여 새로운 식민지의 기초로써 사용된 방주의 잔해입니다. 과거 이 행성에 살았던 문명을 떠올리게 하는 기념비입니다."
 d_settler_camp: "정착민 야영지"
 d_settler_camp_desc: "방주의 사람들이 고철을 사용해 거대한 정착지를 만들었습니다."
 d_cloud_platform: "구름 플랫폼"
 d_cloud_platform_desc: "이 거대한 구조물은 끔찍한 안개로 덮인 지표면에서 안전할 정도로 높이 올라와 있습니다."
 d_ancient_temple_ruins: "고대 신전 유적"
 d_ancient_temple_ruins_desc: "고대의 신들을 숭배하는 수수께끼의 사원으로, 순례자들과 과학자, 다양한 종파의 대표단들이 흥미를 느낍니다."
 d_enigmatic_remnants: "수수께끼의 유물"
 d_enigmatic_remnants_desc: "잊혀진 시대에 존재했던 고대 도시 복합체의 거대한 폐허가 모래로 덮여있습니다. 고고학자들에겐 꿈만 같은 장소입니다."
 d_medicinal_algae: "Medicinal Algae"
 d_medicinal_algae_desc: "A unique species of algae has been discovered in this region, with healing properties surpassing many modern medications. This valuable resource significantly increases global trade and opens up new opportunities for biologists and the pharmaceutical industry."
 d_nature_preserve: "Nature Preserve"
 d_nature_preserve_desc: "This region with its unique ecosystem is protected by conservation organizations."
 has_preserve_planet: "$TRIGGER_FAIL$§RThis blocker will remain uncleanable as long as §Y$preserve_planet$§!.§! exists."
 d_crystalline_array: "Crystalline Array"
 d_crystalline_array_desc: "The enormous crystalline formations in this region are absolutely unique and unparalleled in the galaxy. This place contains a virtually inexhaustible resource of rare crystals and minerals."
 
 #event deposits
 
 d_collapsed_caves: "붕괴된 동굴"
 d_collapsed_caves_desc: "이 지역의 지하 땅굴은 붕괴되었습니다."
 d_sunken_cavity: "가라앉은 구멍"
 d_sunken_cavity_desc: "이 지역의 빙하 동굴이 완전히 바다로 가라앉았습니다."
 d_troubled_waters: "거친 수역"
 d_troubled_waters_desc: "이 지역에서 다수의 생명체들이 활발하게 활동하여, 해류에 심각한 이상현상이 발생했고 소용돌이가 나타났습니다."
 d_dooms_rift: "파멸의 균열"
 d_dooms_rift_desc: "이 지역에서는 엄청난 수의 거대 생명체들이 땅을 뚫고 나와, 넓고 깊은 균열만이 남아있습니다."
 d_destruction_marks: "파괴의 흔적"
 d_destruction_marks_desc: "거대한 생명체들이 이 지역을 지나가며 모든 것을 파괴했습니다."
 
 #starlord deposits

 d_crazymans_labyrinth: "크레이시만의 미궁"
 d_crazymans_labyrinth_desc: "$d_maze_cliff_formations_desc$"
 d_rahmans_canyon: "라만의 협곡"
 d_rahmans_canyon_desc: "$d_grand_canyon_desc$"
 d_bynums_dale: "바이넘의 계곡"
 d_bynums_dale_desc: "$d_alien_pets_deposit_desc$"
 d_matterns_formation: "마턴의 지층"
 d_matterns_formation_desc: "$d_levitating_rocks_desc$"
 d_bluehawks_cavities: "푸른매의 공동"
 d_bluehawks_cavities_desc: "$d_levitating_rocks_desc$"
 d_stevens_fields: "스티븐의 들판"
 d_stevens_fields_desc: "$d_betharian_deposit_desc$"
 d_moonizer_fossils: "무니저의 화석"
 d_moonizer_fossils_desc: "$d_boneyard_desc$"
 d_region_ariess6: "양자리 S6 지역"
 d_region_ariess6_desc: "$d_stormy_water_desc$"
 d_dagwimweaper_range: "그윔 위퍼의 산맥"
 d_dagwimweaper_range_desc: "$d_rich_mountain_desc$"
 d_zhenn_sea: "Zhenn Sea"
 d_zhenn_sea_desc: "$d_kelp_forest_desc$"
 d_edholm_caverns: "Edholm Caverns"
 d_edholm_caverns_desc: "$d_ore_rich_caverns_desc$"
 d_grigorievsky_oasis: "Grigorievsky Oasis"
 d_grigorievsky_oasis_desc: "$d_marvelous_oasis_desc$"
 d_ushakov_geysers: "Ushakov Geysers"
 d_ushakov_geysers_desc: "$d_geothermal_vent_desc$"