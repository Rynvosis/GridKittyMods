 ####################################
 # Decision Events
 ####################################
 
 newfrontiers_decision_event.2.name: "방주 건조 완료!"
 newfrontiers_decision_event.2.desc: "해냈습니다! 방주 프로젝트의 건설 단계가 오나료되었고, 함선이 우리의 고향 행선 주위를 돌고 있습니다. 우리는 이미 그 함선에 선택된 개척자들을 배치하기 시작했습니다. [Root.Owner.GetSpeciesName] 종족 중 최고의 대표자들이 [Root.Capital.GetName]의 죽음 이후 새로운 행성에서 우리의 문명을 부흥시킬 수 있을 것입니다.\n\n§Y방주는 [Root.Capital.GetName]의 주위를 돌고 있습니다. [Root.Owner.GetSpeciesNamePlural]들이 살아남기 위해서 그 방주는 다른 거주 가능한 행성에 안전하게 도착해야만 합니다. 여러분의 시간은 이제 [Root.Capital.GetName]의 죽음 이후에도 남아있습니다.  [Root.Capital.GetName]에서 여러분의 문명이 파괴된 뒤, 방주의 개척자들은 새로운 제국이 될 것입니다. 만약 [Root.Capital.GetName]의 문명이 죽기 전에 방주가 새로운 행성을 개척한다면, 새로운 제국이 형성될 것입니다. 여러분은 어떤 제국을 이어서 통치해나갈지 선택할 수 있습니다.§!"
 newfrontiers_decision_event.2.a: "행운을 빕니다! 모든 [Root.Owner.GetSpeciesName]들을 위해!"
 newfrontiers_decision_event.3.name: "적합한 행성이 발견되다!"
 newfrontiers_decision_event.3.desc: "방주가 [From.GetName]의 궤도에 들어섰습니다. 이 행성의 대기에는 질소과 산소가 있으며 개척하기에 적합할지도 모릅니다. 이 행성에 정착할지 아니면 별들을 향한 여정을 계속 해야할지 선택해야합니다."
 newfrontiers_decision_event.3.a: "왕복선을 준비하고 개척자들을 대기시켜라! 이곳이 우리의 새로운 고향이다!"
 newfrontiers_decision_event.3.a.tooltip: "알립니다! 이 선택은 되돌이킬 수 없습니다.\n[From.GetName] 행성은 여러분 제국의 수도가 될 것이며 방주는 해체될 것입니다. 함선의 일부는 항성의 궤도에 머무는 전초기지가 될 것이고, 나머지는 새로운 제국의 주춧돌로서 지표면으로 이동할 것입니다.\n[From.GetName]은(는) 이제 우리의 고향 행성입니다.\n행성에 고유의 기능이 추가되었습니다: §Y$d_remains_of_ark$§!."
 newfrontiers_decision_event.3.b: "이 행성은 우리에게 적합하지 않다. 더 탐사를 진행해야한다."
 newfrontiers_decision_event.3.c: "이 행성은 우리의 새로운 고향이 될 것이다! 우리는 우리의 고향 행성을 잊지 않을 것이다!"
 newfrontiers_decision_event.3.c.tooltip: "§R알립니다! 이 선택은 되돌이킬 수 없습니다.\n여러분은 새로운 방주 제국을 통제하게 될 것입니다. [From.GetName] 행성은 여러분 제국의 수도가 될 것입니다. 방주의 일부는 접근 가능하게 되고 궤도를 돌게 될 것입니다. 항성은 우리 새로운 제국의 유산의 일부가 될 것입니다.\n[From.GetName] 행성은 이제 우리의 고향 행성입니다.\n행성에 고유의 기능이 추가되었습니다: §Y$d_remains_of_ark$§!."
 newfrontiers_decision_event.3.d: "이 행성은 우리의 후손을 위한 새로운 기회이다! 그들의 앞길에 축복이 가득하길!"
 newfrontiers_decision_event.3.d.tooltip: "§R알립니다! 이 선택은 되돌이킬 수 없습니다.§!\n방주는 새로운 독립 제국을 생성할 것입니다. [From.GetName]은(는) 이 제국의 수도가 될 것입니다.\n우리가 우리의 세상을 구하거나 죽어버릴 동안, 우리 문명의 씨앗은 우리와 별개로 싹을 틔울 것입니다."
 newfrontiers_decision_event.4.name: "새로운 고향을 발견한 [FromFrom.Owner.GetSpeciesName]"
 newfrontiers_decision_event.4.desc: "고향 행성의 죽음이 임박하자 [FromFrom.Owner.GetSpeciesName]들은 거대한 방주를 만들 수 밖에 없었다는 정보를 받았습니다. 그들은 자신들 중 최고의 대표자들을 보내 새로운 고향 행성을 찾을 것입니다. 이제 그들은 [FromFrom.Owner.Capital.solar_system.GetName]에서 사명을 완수했습니다."
 newfrontiers_decision_event.6.name: "방주에서의 혁명"
 newfrontiers_decision_event.6.desc: "방주의 몇 개척자들이 과거와의 관계를 끊기로 결정했고, 새로운 형태의 정부를 수립하길 원합니다. 그들은 혁명을 시작했고 방주의 사람 다수를 자신의 편으로 끌어들였고 방주의 장교들을 제거했습니다. 이제, [Root.Owner.GetSpeciesNamePlural]들은 새로운 미래를 세우기 위해 목적지로 향할 것입니다."
 newfrontiers_decision_event.6.tooltip: "새로운 방주 문명은 더 이상 부모 제국의 정치적 원칙을 계승하지 않을 것입니다."
 newfrontiers_decision_event.7.name: "방주에서의 외계종 친화주의 활동"
 newfrontiers_decision_event.7.desc: "방주의 개척자들이 자신들이 처한 재앙에 대해 적극적으로 논하고 있고 미래에 자신들을 기다리는 것이 무엇인지 궁금해하고 있습니다. 많은 이들은 외계 문명의 도움을 받지 않고는 [Root.Owner.GetSpeciesNamePlural]들이 우주의 차가운 공허 속에서 살아남지 못하리라고 두려워하고 있습니다. 방주의 사람들 사이의 외계종 선호도가 높아지고 있습니다."
 newfrontiers_decision_event.7.tooltip: "방주에서 외계종 선호도가 더욱 높아지고 있습니다."
 newfrontiers_decision_event.8.name: "방주에서의 외계종 혐오주의 활동"
 newfrontiers_decision_event.8.desc: "방주의 개척자들이 자신들이 처한 재앙에 대해 적극적으로 논하고 있고 미래에 자신들을 기다리는 것이 무엇인지 궁금해하고 있습니다. 많은 이들이 자신의 생존에 대한 외계 제국의 위험에 대해 공개적으로 이야기하고 있습니다. 외계종들과의 접촉은 최소화해야하며 가능하다면 피해야합니다. 이는 멸종을 마주하고 있는 우리 종족의 생존 확률을 높일 것입니다. 방주의 사람들 사이의 외계종 혐오도가 높아지고 있습니다."
 newfrontiers_decision_event.8.tooltip: "방주에서 외계종 혐오도가 더욱 높아지고 있습니다!"
 newfrontiers_decision_event.9.name: "방주에서의 평화주의 활동"
 newfrontiers_decision_event.9.desc: "방주의 개척자들이 자신들이 처한 재앙에 대해 적극적으로 논하고 있고 미래에 자신들을 기다리는 것이 무엇인지 궁금해하고 있습니다. 많은 이들이 걷잡을 수 없는 군국화가 [Root.Owner.GetSpeciesNamePlural]들이 과거 고향의 진짜 문제들에 집중하지 못하게했다고 공개적으로 이야기하고 있습니다. 그들은 자신의 새로운 식민지에서 보다 평화적이고 행복한 문화가 꽃피우기를 원합니다. 평화주의에 대한 매력이 방주를 휩쓸었습니다."
 newfrontiers_decision_event.9.tooltip: "방주에서 평화주의 선호도가 더욱 높아지고 있습니다!"
 newfrontiers_decision_event.10.name: "방주에서의 군국주의 활동"
 newfrontiers_decision_event.10.desc: "방주의 개척자들이 자신들이 처한 재앙에 대해 적극적으로 논하고 있고 미래에 자신들을 기다리는 것이 무엇인지 궁금해하고 있습니다. 많은 이들은 은하의 많은 위협으로부터 [Root.Owner.GetSpeciesNamePlural]들을 지키기 위해 필요한 것에 대해 공개적으로 이야기하고 있습니다. 그들은 새로운 국방 지령을 만들자는 생각을 전개했고 잠재적인 위협을 억제하는 방법을 고려하고 있습니다. 군국주의적 광신이 방주를 휩쓸었습니다."
 newfrontiers_decision_event.10.tooltip: "방주에서 군국주의 선호도가 더욱 높아지고 있습니다!"
 newfrontiers_decision_event.11.name: "방주에서의 권위주의 활동"
 newfrontiers_decision_event.11.desc: "방주의 개척자들이 자신들이 처한 재앙에 대해 적극적으로 논하고 있고 미래에 자신들을 기다리는 것이 무엇인지 궁금해하고 있습니다. 그들 중에서 강력한 지도자가 부상했고 다수의 사람들을 자신의 주위로 단결시켰습니다. 그는 [Root.Owner.GetSpeciesNamePlural]들을 지키고 미래로 인도하기 위해서는, 대의를 위한 희생이 필요할지도 모른다 하더라도 강력하고 중앙집권화된 권력이 필요함을 주장했습니다. 그는 이러한 가혹한 조치가 없다면 새로운 문명은 살아남지 못할 것이라고 믿고 있습니다. 방주의 사람들 사이의 권위주의 선호도가 높아지고 있습니다."
 newfrontiers_decision_event.11.tooltip: "방주에서 권위주의 선호도가 더욱 높아지고 있습니다!"
 newfrontiers_decision_event.12.name: "방주에서의 평등주의 활동"
 newfrontiers_decision_event.12.desc: "방주의 개척자들이 자신들이 처한 재앙에 대해 적극적으로 논하고 있고 미래에 자신들을 기다리는 것이 무엇인지 궁금해하고 있습니다. 많은 이들이 개인의 자유의 중요성에 대해 이야기하고 있습니다. 그들은 새로운 문명에서 시민들의 권리와 자유를 보호하자는 생각을 전개시켰으며, 이는 분명 빠른 발전을 위한 새로운 기회를 열어줄 것입니다. 방주의 사람들 사이의 평등주의 선호도가 높아지고 있습니다."
 newfrontiers_decision_event.12.tooltip: "방주에서 평등주의 선호도가 더욱 높아지고 있습니다!"
 newfrontiers_decision_event.13.name: "방주에서의 물질주의 활동"
 newfrontiers_decision_event.13.desc: "방주의 개척자들이 자신들이 처한 재앙에 대해 적극적으로 논하고 있고 미래에 자신들을 기다리는 것이 무엇인지 궁금해하고 있습니다. 많은 이들이 자신의 고향 행성의 죽음은 막을 수 있었다고 말하고 있습니다. 재앙은 예측 가능한 것이었고, 더 중요한 것은 그것을 막을 수 있었다는 것입니다. 과학의 발전에 더 신경을 썼더라면 말입니다. 그들은 말합니다. 지식은 힘이고 [Root.Owner.GetSpeciesNamePlural]들은 생존을 위해서라면 무엇보다도 지식에 집중해야합니다! 주의 사람들 사이의 물질주의 선호도가 높아지고 있습니다."
 newfrontiers_decision_event.13.tooltip: "방주에서 물질주의 선호도가 더욱 높아지고 있습니다!"
 newfrontiers_decision_event.14.name: "방주에서의 정신주의 활동"
 newfrontiers_decision_event.14.desc: "방주의 개척자들이 자신들이 처한 재앙에 대해 적극적으로 논하고 있고 미래에 자신들을 기다리는 것이 무엇인지 궁금해하고 있습니다. 많은 이들이 불가해하고 광대한 우주를 보고 [Root.Owner.GetSpeciesNamePlural]들의 무의미에 대해 이야기하고 있습니다. 과학의 추구에 있어서 경솔함과 오만이 끔찍한 결과로 이어질 수 있고, 이어졌으며 우리의 사람들은 별들 자이세어 자신의 위치와 목적을 이해하기를 갈망하고 있습니다. 방주의 사람들 사이의 정신주의 선호도가 높아지고 있습니다."
 newfrontiers_decision_event.14.tooltip: "방주에서 정신주의 선호도가 더욱 높아지고 있습니다!"
 newfrontiers_decision_event.15.name: "기록 보관소의 화재"
 newfrontiers_decision_event.15.desc: "방주의 기록 보관소에서 사고가 일어났습니다. 화재입니다. 대부분의 정보 저장 서버가 파괴되었습니다. 선상의 컴퓨터가 중요한 데이터 대부분을 지킨 덕분에 구석기 시대로 돌아가지는 않겠지만, 대량의 과학적 지식이 소실되었습니다."
 newfrontiers_decision_event.15.tooltip: "방주의 새로운 문명이 시작 기술을 제외한 모든 기술을 잃어버렸습니다."
 newfrontiers_decision_event.16.name: "방주 항해 컴퓨터 충돌"
 newfrontiers_decision_event.16.desc: "선상 컴퓨터의 항해 모듈이 알 수 없는 바이러스로 인해 손상을 받았습니다. 컴퓨터가 선외 연결을 모두 끊은 후, 항해 데이터를 전부 삭제했습니다. 바이러스가 어떻게 방주로 침입했는지는 모릅니다. 어쩌면 방주 프로젝트를 비판하는 자들의 사보타주일 수도 있고, 아니면 그냥 과로한 보안 담당자의 과실일지도 모릅니다. 어쨌거나 통신 채널이 망가졌습니다. 함선의 승무원은 갈팡질팡하고 있고, 개척자들은 심리적 어려움을 겪고 있습니다. 방주는 검고 낯선 우주의 공허 속에 완전히 홀로 남겨지게 되었습니다."
 newfrontiers_decision_event.16.tooltip: "방주의 새로운 문명은 별과 행성에 대한 모든 데이터를 잃어버렸습니다. 방주의 눈이 멀어버렸습니다."

 
