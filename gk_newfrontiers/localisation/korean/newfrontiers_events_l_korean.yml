 newfrontiers_action.4.desc: "§Y[FromFrom.GetName]§!은(는) 대부분의 생명체에게 독성인 고압 대기를 가지고 있습니다. 그럼에도 이곳에서는 상당한 생물군집이 발달했고, 물 대신에 암모니아를 용매로 사용하고 있습니다. 우리가 아는 생태계적 모델과는 크게 다른 형태로 발달했으며, 이를 연구하면 외계 생물학에 큰 도움이 될 것입니다."
 
 
