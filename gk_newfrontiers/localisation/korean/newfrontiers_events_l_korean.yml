 newfrontiers.8.name: "New Frontiers: 시작 행성 하위유형 선택"
 newfrontiers.8.desc: "§WNew Frontiers§! 모드는 새로운 행성 등급 다수를 추가하지 않고도 다양한 행성 유형을 만들어냅니다. 대신, 여러분이 선택한 기본 행성 등급은 고유의 생김새와 특수한 성질을 가지는 다양한 하위유형을 가지게될 수 있습니다.\n\n하위유형은 3가지가 있습니다: §B일반§!과 §R극한§!, §G낙원§!.\n\n다음은 여러분의 시작 유형으로 선택 가능한 옵션의 목록입니다."
