 d_cau_crisis_among_us: "Crise parmi nous"
 d_cau_crisis_among_us.desc: "Des fluctuations d'énergie étranges ont été ressenties par tous les êtres de la galaxie. Quelque chose de terrible a commencé."
 d_cau_crisis_among_us.a: "Inquiétant."
 d_cau_crisis_among_us.b: "£menace£ §GUn allié s'est réveillé.§!"
 
 d_cau_crisis_picked.desc: "Les fluctuations d'énergie étaient ressenties par tous les êtres de la galaxie. La galaxie entière est désormais consciente de notre réveil. Bien qu'ils ne sachent pas qui c'est exactement. Pour le moment."
 d_cau_crisis_picked.a: "Ils soupçonnent."