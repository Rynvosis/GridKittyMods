 d_cau_crisis_among_us: "Crisis entre nosotros"
 d_cau_crisis_among_us.desc: "Todos los seres de la galaxia sintieron extrañas fluctuaciones de energía. Algo terrible ha comenzado."
 d_cau_crisis_among_us.a: "Perturbador."
 d_cau_crisis_among_us.b: "£menace£ §GUn aliado ha despertado.§!"
 
 d_cau_crisis_picked.desc: "Todos los seres de la galaxia sintieron fluctuaciones de energía. Toda la galaxia es ahora consciente de nuestro despertar. Aunque no saben quién es exactamente. Por ahora."
 d_cau_crisis_picked.a: "Ellos sospechan."