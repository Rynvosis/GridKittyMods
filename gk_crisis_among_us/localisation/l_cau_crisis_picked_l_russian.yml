l_russian:
 d_cau_crisis_among_us: "Кризис Среди Нас"
 d_cau_crisis_among_us.desc: "Все в галактике почуствовали странные колебания энергии. Началось что-то ужасное."
 d_cau_crisis_among_us.a: "Тревожно."
 d_cau_crisis_among_us.b: "£menace£ §GСоюзник пробудился.§!"
 
 d_cau_crisis_picked.desc: "Все в галактике скоро почувствуют странные колебания энергии. Вся галактика узнает о нашем пробуждении. Однако они не узнают кто это точно. Пока что."
 d_cau_crisis_picked.a: "Они подозревают."

 operation_determine_crisis: "Определить Кризис"
 operation_determine_crisis_on_success: "$IF_SUCCESSFUL|E$\nУзнать является ли [root.target.GetName] империей Кризиса."
 cau_determine_crisis_desc: "Прикажите своим шпионам узнать является ли [root.target.GetName] империей Кризиса."
 cau_operations.1.title: "Исследуемая империя - КРИЗИС!"
 cau_operations.1.desc: "Наши шпионы нашли доказательства того, что расследуемая империя является Кризисом!"
 cau_operations.2.title: "Не обнаружено никаких доказательств того, что исследуемая империя является Кризисом"
 cau_operations.2.desc: "Наши шпионы не нашли никаких доказательств того, что расследуемая империя - Кризис."
 cau_operations.1000.title: "Проникновение глубже"
 cau_operations.1000.desc: "Наши шпионы пытаются проникнуть в области которые важны для нашего расследования."
 cau_operations.1001.title: "Ищем что-нибудь подозрительное"
 cau_operations.1001.desc: "У нас есть агенты в разных областях, которые активно ищут любую технологию, связанную с Кризисом"